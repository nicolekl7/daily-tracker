const { useState, useEffect, useRef, useMemo } = React;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const todayStr = () => new Date().toISOString().split("T")[0];
const daysUntil = d => Math.max(0, Math.ceil((new Date(d) - new Date()) / 86400000));
const fmt12 = t => { if(!t) return ""; const [h,m]=t.split(":").map(Number); return ((h%12)||12)+":"+String(m).padStart(2,"0")+(h>=12?" PM":" AM"); };

function useLS(key, init) {
  const [v,sv] = useState(() => { try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;} });
  useEffect(() => { try{localStorage.setItem(key,JSON.stringify(v));}catch(e){} }, [key,v]);
  return [v,sv];
}

function getCyclePhase(startDate, length=28) {
  if(!startDate) return null;
  const elapsed = Math.floor((new Date()-new Date(startDate))/86400000);
  const day = (elapsed % length)+1;
  const phase = day<=5?"menstrual":day<=13?"follicular":day<=16?"ovulatory":"luteal";
  return { phase, day };
}

function sleepDuration(bed, wake) {
  if(!bed||!wake) return null;
  const [bh,bm]=bed.split(":").map(Number), [wh,wm]=wake.split(":").map(Number);
  let mins=(wh*60+wm)-(bh*60+bm); if(mins<0)mins+=1440;
  return { h:Math.floor(mins/60), m:mins%60, total:mins, label:Math.floor(mins/60)+"h"+(mins%60>0?" "+(mins%60)+"m":"") };
}

function getStreak(hid, logs) {
  let n=0; const d=new Date();
  while(true){ const k=d.toISOString().split("T")[0]; if(!(logs[k]?.habits||[]).includes(hid))break; n++; d.setDate(d.getDate()-1); }
  return n;
}

function getLongest(hid, logs) {
  let max=0,cur=0;
  Object.keys(logs).sort().forEach(k=>{ if((logs[k]?.habits||[]).includes(hid)){cur++;max=Math.max(max,cur);}else cur=0; });
  return max;
}

function weekStart(ds) {
  const d=new Date(ds+"T12:00:00"), day=d.getDay(), diff=(day===0?-6:1)-day;
  d.setDate(d.getDate()+diff); return d.toISOString().split("T")[0];
}

// ─── GOOGLE SHEETS SYNC ──────────────────────────────────────────────────────
async function syncToSheets(log, date, sheetsUrl, cycleStart, cycleLength) {
  if(!sheetsUrl) return { ok:false, msg:"Paste your Apps Script URL first" };
  const phase = getCyclePhase(cycleStart, cycleLength);
  const timedMeds = log.timedMeds||{};
  const spendItems = log.spendItems||[];
  const fmtTimes = id => (timedMeds[id]||[]).map(d=>fmt12(d.time)).join(", ");
  const sl = sleepDuration(log.bedtime, log.wakeTime);
  const dailyRow = {
    sheet:"Daily Log", date,
    mood:log.mood||"", anxiety:log.anxiety||"", anger:log.anger||"", energy:log.energy||"", notes:log.notes||"",
    bedtime:log.bedtime||"", wakeTime:log.wakeTime||"", sleepHours:sl?sl.label:"", sleepQuality:log.sleepQuality||"",
    sleepSupps:(log.sleepSupps||[]).join(", "), hairWashed:log.hairWash||"",
    breakfast:log.breakfast||"", breakfastFlags:((log.mealSensitivity||{}).breakfast||[]).join(", "),
    lunch:log.lunch||"", lunchFlags:((log.mealSensitivity||{}).lunch||[]).join(", "),
    dinner:log.dinner||"", dinnerFlags:((log.mealSensitivity||{}).dinner||[]).join(", "),
    snacks:log.snacks||"", snackFlags:((log.mealSensitivity||{}).snacks||[]).join(", "),
    dayFlags:(log.foodTagsDay||[]).join(", "), foodNotes:log.foodNotes||"",
    symptoms:Object.entries(log.symptoms||{}).map(([k,v])=>k+" ("+v+")").join(", "),
    vyvanse:fmtTimes("vyvanse"), adderallIR:fmtTimes("adderall_ir"), adderallXR:fmtTimes("adderall_xr"),
    ativan:fmtTimes("ativan"), propranolol:fmtTimes("propranolol"),
    supplements:(log.meds||[]).join(", "), habits:(log.habits||[]).join(", "),
    ouraSleep:log.ouraSleep||"", ouraHrv:log.ouraHrv||"", ouraReadiness:log.ouraReadiness||"",
    ouraSteps:log.ouraSteps||"", ouraRhr:log.ouraRhr||"",
    skinRating:log.skinRating||"", skinConcerns:(log.skinConcerns||[]).join(", "),
    skincareAM:((log.skincare||{}).AM||[]).join(", "), skincarePM:((log.skincare||{}).PM||[]).join(", "),
    skinNotes:log.skinNotes||"",
    totalSpend:spendItems.reduce((s,i)=>s+i.amount,0).toFixed(2),
    netSpend:spendItems.filter(i=>!i.returnLikely).reduce((s,i)=>s+i.amount,0).toFixed(2),
    cycleDay:phase?phase.day:"", cyclePhase:phase?PHASES[phase.phase].label:""
  };
  const spendRows = spendItems.map(item=>({ sheet:"Spend Items", date, note:item.note||"", category:item.category||"Other", amount:item.amount.toFixed(2), returnLikely:item.returnLikely?"TRUE":"FALSE" }));
  try {
    await fetch(sheetsUrl, { method:"POST", mode:"no-cors", headers:{"Content-Type":"text/plain"}, body:JSON.stringify({dailyRow,spendRows}) });
    return { ok:true, msg:"Synced ✓ "+date };
  } catch(e) { return { ok:false, msg:"Network error — check URL" }; }
}

function MiniChart({data=[],height=64,colors={}}){
  const allV=data.flatMap(d=>Object.values(d.values||{}).filter(v=>v!=null&&!isNaN(+v)));
  const max=Math.max(...allV,1);
  if(allV.length===0) return null;
  return(
    <div style={{display:"flex",alignItems:"flex-end",gap:4,height}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,height:"100%"}}>
          <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"flex-end",gap:2,width:"100%"}}>

            ):null)}
          </div>
          {d.label&&<div style={{fontSize:9,color:C.faint,textAlign:"center"}}>{d.label}</div>}
        </div>
      ))}
    </div>
  );
}

        {children}
      </div>
    </div>
  );
}

// ─── EUR/USD ─────────────────────────────────────────────────────────────────
function useEurUsd(){
  const [rate,setRate]=useLS("nm_eurusd_rate",null);
  const [fetched,setFetched]=useLS("nm_eurusd_date",null);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const fetchRate=async()=>{
    setLoading(true);setError(null);
    const urls=["https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/eur.json","https://latest.currency-api.pages.dev/v1/currencies/eur.json"];
    let ok=false;
    for(const url of urls){try{const res=await fetch(url);if(!res.ok)continue;const data=await res.json();const usd=data?.eur?.usd;if(!usd)continue;setRate(+usd.toFixed(6));setFetched(todayStr());ok=true;break;}catch(e){continue;}}
    if(!ok)setError("Could not fetch — check internet connection");
    setLoading(false);
  };
  useEffect(()=>{if(fetched!==todayStr())fetchRate();},[]);
  return {rate,fetched,loading,error,refresh:fetchRate};
}

// ─── TIMED MED LOGGER ────────────────────────────────────────────────────────
function TimedMedLogger({log,upd}){
  const timedMeds=log.timedMeds||{};
  const nowT=()=>{const d=new Date();return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");};
  const addDose=id=>{const ex=timedMeds[id]||[];upd("timedMeds",{...timedMeds,[id]:[...ex,{id:Date.now(),time:nowT()}]});};
  const rmDose=(mid,did)=>{const n={...timedMeds};const u=(timedMeds[mid]||[]).filter(d=>d.id!==did);if(u.length===0)delete n[mid];else n[mid]=u;upd("timedMeds",n);};
  const updTime=(mid,did,t)=>upd("timedMeds",{...timedMeds,[mid]:(timedMeds[mid]||[]).map(d=>d.id===did?{...d,time:t}:d)});
  return(
    <div>
      {TIMED_MEDS.map(med=>{
        const doses=timedMeds[med.id]||[];const taken=doses.length>0;
        return(
          <div key={med.id} style={{marginBottom:8,borderRadius:9,overflow:"hidden",border:`1px solid ${taken?med.color+"55":C.border}`,background:taken?med.color+"08":"transparent",transition:"all 0.2s"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 13px"}}>
              <div><div style={{fontSize:13,fontWeight:taken?500:400,color:taken?C.text:C.muted}}>{med.label}</div><div style={{fontSize:10,color:med.color+"88",marginTop:1}}>{med.note}</div></div>
              <button onClick={()=>addDose(med.id)} style={{padding:"4px 12px",borderRadius:7,cursor:"pointer",fontSize:11,fontWeight:500,background:taken?med.color+"22":C.surface,border:`1px solid ${taken?med.color+"66":C.border}`,color:taken?med.color:C.muted}}>+ Dose</button>
            </div>
            {doses.length>0&&(
              <div style={{borderTop:`1px solid ${med.color}22`,padding:"7px 13px",display:"flex",flexWrap:"wrap",gap:6}}>
                {doses.map((dose,i)=>(
                  <div key={dose.id} style={{display:"flex",alignItems:"center",gap:5,background:med.color+"14",border:`1px solid ${med.color}33`,borderRadius:7,padding:"4px 9px"}}>
                    <span style={{fontSize:10,color:med.color+"88"}}>Dose {i+1}</span>
                    <input type="time" value={dose.time} onChange={e=>updTime(med.id,dose.id,e.target.value)} style={{...inp,width:"auto",padding:"1px 5px",fontSize:12,background:"transparent",border:"none",color:med.color,fontWeight:500}} />
                    <span style={{fontSize:10,color:med.color+"77"}}>{fmt12(dose.time)}</span>
                    <button onClick={()=>rmDose(med.id,dose.id)} style={{background:"none",border:"none",color:med.color+"55",cursor:"pointer",fontSize:14,lineHeight:1,padding:0}}>×</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── SPEND LOGGER ────────────────────────────────────────────────────────────
function SpendLogger({log,upd}){
  const [form,setForm]=useState({amount:"",category:"",note:"",returnLikely:false});
  const items=log.spendItems||[];
  const addItem=()=>{if(!form.amount||isNaN(parseFloat(form.amount)))return;upd("spendItems",[...items,{id:Date.now(),amount:parseFloat(form.amount),category:form.category||"Other",note:form.note,returnLikely:form.returnLikely}]);setForm({amount:"",category:"",note:"",returnLikely:false});};
  const total=items.reduce((s,i)=>s+i.amount,0);
  const net=items.filter(i=>!i.returnLikely).reduce((s,i)=>s+i.amount,0);
  return(
    <div>
      {items.length>0&&(
        <div style={{display:"flex",gap:16,marginBottom:12,padding:"10px 14px",background:C.surface,borderRadius:10}}>
          <div><div style={lbl}>Total</div><div style={{...serif,fontSize:22,color:C.sage}}>${total.toFixed(2)}</div></div>
          {total!==net&&<div><div style={lbl}>Net</div><div style={{...serif,fontSize:22,color:C.accent}}>${net.toFixed(2)}</div></div>}
        </div>
      )}
      {items.map(item=>(
        <div key={item.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",marginBottom:5,borderRadius:8,background:item.returnLikely?C.gold+"0A":C.surface,border:`1px solid ${item.returnLikely?C.gold+"33":C.border}`}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:1}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:CAT_COLORS[item.category]||C.muted,flexShrink:0}} />
              <span style={{fontSize:11,color:C.muted}}>{item.category}</span>
              {item.returnLikely&&<span style={{fontSize:9,color:C.gold,background:C.gold+"18",borderRadius:8,padding:"1px 6px"}}>↩ return</span>}
            </div>
            {item.note&&<div style={{fontSize:12,color:C.text,paddingLeft:12}}>{item.note}</div>}
          </div>
          <div style={{...serif,fontSize:17,color:item.returnLikely?C.gold:C.text,textDecoration:item.returnLikely?"line-through":"none"}}>${item.amount.toFixed(2)}</div>
          <button onClick={()=>upd("spendItems",items.map(i=>i.id===item.id?{...i,returnLikely:!i.returnLikely}:i))} style={{background:"none",border:`1px solid ${item.returnLikely?C.gold+"66":C.border}`,borderRadius:5,color:item.returnLikely?C.gold:C.faint,cursor:"pointer",fontSize:11,padding:"2px 7px"}}>↩</button>
          <button onClick={()=>upd("spendItems",items.filter(i=>i.id!==item.id))} style={{background:"none",border:"none",color:C.faint,cursor:"pointer",fontSize:16,lineHeight:1}}>×</button>
        </div>
      ))}
      <div style={{marginTop:8}}>
        <div style={{display:"grid",gridTemplateColumns:"90px 1fr",gap:8,marginBottom:7}}>
          <div><label style={lbl}>Amount</label><div style={{display:"flex",alignItems:"center",gap:4}}><span style={{color:C.muted,fontSize:13}}>$</span><input type="number" step="0.01" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})} onKeyDown={e=>e.key==="Enter"&&addItem()} placeholder="0.00" style={{...inp,...serif,fontSize:15}} /></div></div>
          <div><label style={lbl}>Category</label><select value={form.category} onChange={e=>setForm({...form,category:e.target.value})} style={inp}><option value="">Category</option>{SPEND_CATS.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
        </div>
        <div style={{display:"flex",gap:7,alignItems:"flex-end"}}>
          <div style={{flex:1}}><label style={lbl}>Note</label><input value={form.note} onChange={e=>setForm({...form,note:e.target.value})} onKeyDown={e=>e.key==="Enter"&&addItem()} placeholder="What was it?" style={inp} /></div>
          <button onClick={()=>setForm({...form,returnLikely:!form.returnLikely})} style={{padding:"9px 11px",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:500,flexShrink:0,background:form.returnLikely?C.gold+"22":"transparent",border:`1px solid ${form.returnLikely?C.gold:C.border}`,color:form.returnLikely?C.gold:C.muted}}>↩</button>
          <button onClick={addItem} style={{padding:"9px 16px",borderRadius:8,background:C.accent,color:"#0A0908",border:"none",cursor:"pointer",fontSize:13,fontWeight:500,flexShrink:0}}>+ Add</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════
function Dashboard({dailyLogs,cycleStart,cycleLength,beautyLogs,intervals,allHabits}){
  const phase=getCyclePhase(cycleStart,cycleLength);
  const pd=phase?PHASES[phase.phase]:null;
  const today=dailyLogs[todayStr()]||{};
  const [tasks,setTasks]=useLS("nm_tasks",[]);
  const [newTask,setNewTask]=useState("");
  const hr=new Date().getHours();
  const greeting=hr<12?"Good morning":hr<17?"Good afternoon":"Good evening";
  const isLateLuteal=phase?.phase==="luteal"&&phase.day>=22;
  const mode=isLateLuteal?"gentle":pd?.mode;

  const upcoming=BEAUTY_ITEMS.map(item=>{
    const last=beautyLogs[item.id];if(!last)return null;
    const iv=intervals[item.id]||item.interval;
    const due=new Date(last+"T12:00:00");due.setDate(due.getDate()+iv);
    return {...item,daysLeft:Math.ceil((due-new Date())/86400000),dueDate:due};
  }).filter(Boolean).sort((a,b)=>a.daysLeft-b.daysLeft);

  const addTask=()=>{if(!newTask.trim())return;setTasks([...tasks,{id:Date.now(),text:newTask,done:false}]);setNewTask("");};

  return(
    <div style={{display:"flex",flexDirection:"column",gap:22}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <h1 style={{...serif,fontSize:32,fontWeight:300,color:C.white,margin:0}}>{greeting}, Nicole.</h1>
          <div style={{fontSize:13,color:C.muted,marginTop:4}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}</div>
        </div>
        {phase&&<div style={{display:"inline-flex",alignItems:"center",gap:7,background:PHASES[phase.phase].color+"18",border:`1px solid ${PHASES[phase.phase].color}44`,borderRadius:20,padding:"5px 13px",flexShrink:0}}><div style={{width:6,height:6,borderRadius:"50%",background:PHASES[phase.phase].color}} /><span style={{fontSize:11,color:PHASES[phase.phase].color,fontWeight:500}}>{PHASES[phase.phase].label} · Day {phase.day}</span></div>}
      </div>

      {/* Wedding countdowns */}
      <div style={{display:"flex",gap:10}}>
        {[
          {label:"Bridal Shower",date:"2026-06-27",color:C.accent},
          {label:"Bachelorette",date:"2026-07-30",color:C.gold},
          {label:"Nicole & Tyler",date:"2026-09-17",color:C.sage,sub:"Tuscany, Italy"},
        ].map(({label,date,color,sub})=>{
          const days=daysUntil(new Date(date));
          return(
            <div key={label} style={{...card,flex:1,textAlign:"center"}}>
              <div style={lbl}>{label}</div>
              <div style={{...serif,fontSize:44,fontWeight:300,color,lineHeight:1.1}}>{days}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:3}}>days</div>
              {sub&&<div style={{fontSize:10,color:C.faint,marginTop:2}}>{sub}</div>}
            </div>
          );
        })}
      </div>

      {/* Cycle advice — main focus */}
      {pd?(
        <div style={{borderRadius:14,overflow:"hidden",border:`1px solid ${PHASES[phase.phase].color}33`}}>
          {/* Top bar */}
          <div style={{background:PHASES[phase.phase].color+"20",padding:"16px 22px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${PHASES[phase.phase].color}22`}}>
            <div>
              <div style={{...serif,fontSize:22,color:PHASES[phase.phase].color}}>{pd.label} Phase — Day {phase.day}</div>
              <div style={{fontSize:12,color:PHASES[phase.phase].color+"88",marginTop:3}}>{pd.days} of cycle</div>
            </div>
            <div style={{padding:"7px 16px",borderRadius:24,fontWeight:600,fontSize:11,letterSpacing:"0.08em",textTransform:"uppercase",background:mode==="lockin"?C.sage+"22":C.gold+"22",border:`1px solid ${mode==="lockin"?C.sage+"77":C.gold+"77"}`,color:mode==="lockin"?C.sage:C.gold}}>
              {mode==="lockin"?"⚡ Lock In":"🌿 Be Gentle"}
            </div>
          </div>
          {/* Advice grid */}
          <div style={{background:C.card,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",borderBottom:`1px solid ${C.border}`}}>
            <div style={{padding:"16px 18px",borderRight:`1px solid ${C.border}`}}>
              <div style={lbl}>Eat today</div>
              {pd.eat.map(e=><div key={e} style={{fontSize:12,color:C.sage,marginBottom:5,display:"flex",gap:6,alignItems:"flex-start"}}><span style={{flexShrink:0,marginTop:1}}>✓</span><span>{e}</span></div>)}
            </div>
            <div style={{padding:"16px 18px",borderRight:`1px solid ${C.border}`}}>
              <div style={lbl}>Avoid</div>
              {pd.avoid.map(e=><div key={e} style={{fontSize:12,color:C.danger,marginBottom:5,display:"flex",gap:6,alignItems:"flex-start"}}><span style={{flexShrink:0,marginTop:1}}>✗</span><span>{e}</span></div>)}
            </div>
            <div style={{padding:"16px 18px"}}>
              <div style={lbl}>Move</div>
              <div style={{fontSize:12,color:C.text,marginBottom:12,lineHeight:1.5}}>{pd.move}</div>
              <div style={lbl}>Self care</div>
              <div style={{fontSize:12,color:C.muted,lineHeight:1.5}}>{pd.selfcare}</div>
            </div>
          </div>
          {/* Why + skin + med note */}
          <div style={{background:C.surface,padding:"12px 22px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            <div>
              <div style={lbl}>Skin</div>
              <div style={{fontSize:12,color:C.muted}}>{pd.skin}</div>
            </div>
            <div style={{padding:"8px 14px",background:PHASES[phase.phase].color+"12",borderRadius:8}}>
              <div style={lbl}>Vyvanse / Adderall</div>
              <div style={{fontSize:12,color:phase.phase==="luteal"?C.danger:C.text,lineHeight:1.5}}>{pd.vyvanse}</div>
            </div>
          </div>
        </div>
      ):(
        <div style={{...card,textAlign:"center",padding:32}}>
          <div style={{fontSize:28,marginBottom:10}}>🌙</div>
          <div style={{color:C.muted,fontSize:13}}>Set your cycle start date in the Cycle tab to see today's guidance.</div>
        </div>
      )}

      {/* Upcoming beauty */}
      {upcoming.length>0&&(
        <div style={card}>
          <SHead>Upcoming Appointments</SHead>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {upcoming.map(item=>{
              const overdue=item.daysLeft<0;const soon=item.daysLeft<=7&&item.daysLeft>=0;
              const col=overdue?C.danger:soon?C.gold:C.muted;
              return(
                <div key={item.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 13px",borderRadius:9,background:overdue?C.danger+"08":soon?C.gold+"08":C.surface,border:`1px solid ${overdue?C.danger+"33":soon?C.gold+"33":C.border}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:17}}>{item.icon}</span><span style={{fontSize:13}}>{item.label}</span></div>
                  <div style={{textAlign:"right"}}>
                    <div style={{...serif,fontSize:20,color:col,lineHeight:1}}>{Math.abs(item.daysLeft)}<span style={{fontSize:11}}>d</span></div>
                    <div style={{fontSize:9,color:C.faint}}>{overdue?"overdue":soon?"soon":item.dueDate.toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Today snapshot if logged */}
      {(today.mood||today.energy)&&(
        <div style={card}>
          <SHead>Today so far</SHead>
          <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
            {[{k:"mood",l:"Mood",c:C.accent},{k:"anxiety",l:"Anxiety",c:C.gold},{k:"anger",l:"Anger",c:C.danger},{k:"energy",l:"Energy",c:C.sage}].filter(x=>today[x.k]).map(x=>(
              <div key={x.k} style={{textAlign:"center"}}><div style={{...serif,fontSize:32,color:x.c,lineHeight:1}}>{today[x.k]}</div><div style={{...lbl,marginTop:3,marginBottom:0}}>{x.l}</div></div>
            ))}
            {(today.spendItems||[]).length>0&&<div style={{textAlign:"center"}}><div style={{...serif,fontSize:32,color:C.sage,lineHeight:1}}>${(today.spendItems||[]).filter(i=>!i.returnLikely).reduce((s,i)=>s+i.amount,0).toFixed(0)}</div><div style={{...lbl,marginTop:3,marginBottom:0}}>Spent</div></div>}
          </div>
        </div>
      )}

      {/* Tasks */}
      <div style={card}>
        <SHead>Tasks</SHead>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input value={newTask} onChange={e=>setNewTask(e.target.value)} placeholder="Add a task..." onKeyDown={e=>e.key==="Enter"&&addTask()} style={{...inp,flex:1}} />
          <button onClick={addTask} style={{padding:"9px 16px",borderRadius:8,background:C.accent,color:"#0A0908",border:"none",cursor:"pointer",fontSize:13,fontWeight:500}}>Add</button>
        </div>
        <div>
          {tasks.map(t=>(
            <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0",borderBottom:`1px solid ${C.border}`,opacity:t.done?0.5:1}}>
              <input type="checkbox" checked={t.done} onChange={()=>setTasks(tasks.map(x=>x.id===t.id?{...x,done:!x.done}:x))} />
              <span style={{fontSize:13,flex:1,textDecoration:t.done?"line-through":"none"}}>{t.text}</span>
              <button onClick={()=>setTasks(tasks.filter(x=>x.id!==t.id))} style={{background:"none",border:"none",color:C.faint,cursor:"pointer",fontSize:16}}>×</button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// DAILY LOG TAB

function DailyLog({logs,setLogs,allHabits,cycleStart,cycleLength}){

  const upd=(key,val)=>setLogs({...logs,[selDate]:{...log,[key]:val}});
  const [syncState,setSyncState]=useState(null);
  const [sheetsUrl,setSheetsUrl]=useLS("nm_sheets_url","");

  const runSync=async()=>{
    setSyncState("Syncing...");
    const res=await syncToSheets(log,selDate,sheetsUrl,cycleStart,cycleLength);
    setSyncState(res.msg); setTimeout(()=>setSyncState(null),3000);
  };

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:24}}>
        <PTitle sub="Track your body, mind, and data points">Daily Log</PTitle>

          <Slider label="Anxiety" value={log.anxiety||1} onChange={v=>upd("anxiety",v)} color={C.gold} emoji="🌪️" />
          <Slider label="Anger" value={log.anger||1} onChange={v=>upd("anger",v)} color={C.danger} emoji="🔥" />

          <label style={lbl}>Notes</label>
          <textarea value={log.notes||""} onChange={e=>upd("notes",e.target.value)} placeholder="How was the day?" style={{...inp,height:80}} />
        </div>

        {/* Sleep & Health */}
        <div style={card}>
          <SHead>Sleep & Recovery</SHead>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:15}}>
            <div><label style={lbl}>Bedtime</label><input type="time" value={log.bedtime||""} onChange={e=>upd("bedtime",e.target.value)} style={inp} /></div>
            <div><label style={lbl}>Wake Time</label><input type="time" value={log.wakeTime||""} onChange={e=>upd("wakeTime",e.target.value)} style={inp} /></div>
          </div>
          {log.bedtime&&log.wakeTime&&<div style={{fontSize:11,color:C.sage,marginBottom:15,textAlign:"center"}}>Duration: {sleepDuration(log.bedtime,log.wakeTime).label}</div>}
          <Slider label="Sleep Quality" value={log.sleepQuality||5} onChange={v=>upd("sleepQuality",v)} color="#8A9BAA" emoji="💤" />
          <Divider />
          <label style={lbl}>Sleep Support</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:15}}>
            {SLEEP_SUPPS.map(s=><Pill key={s} label={s} active={(log.sleepSupps||[]).includes(s)} color="#8A9BAA" onClick={()=>{const ex=log.sleepSupps||[];upd("sleepSupps",ex.includes(s)?ex.filter(x=>x!==s):[...ex,s]);}} />)}
          </div>
          <label style={lbl}>Oura Stats (Manual)</label>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(70px, 1fr))",gap:8}}>
            {[{k:"ouraSleep",l:"Sleep Score"},{k:"ouraHrv",l:"HRV"},{k:"ouraReadiness",l:"Readiness"},{k:"ouraSteps",l:"Steps"},{k:"ouraRhr",l:"RHR"}].map(x=>(
              <div key={x.k}><label style={{...lbl,fontSize:8}}>{x.l}</label><input value={log[x.k]||""} onChange={e=>upd(x.k,e.target.value)} style={{...inp,padding:"6px 8px",fontSize:12}} placeholder="--" /></div>

            {DAY_FLAGS.map(f=><Pill key={f} label={f} active={(log.foodTagsDay||[]).includes(f)} color={C.sage} onClick={()=>{const ex=log.foodTagsDay||[];upd("foodTagsDay",ex.includes(f)?ex.filter(x=>x!==f):[...ex,f]);}} />)}

            <input value={sheetsUrl} onChange={e=>setSheetsUrl(e.target.value)} placeholder="https://script.google.com/macros/s/..." style={inp} />
          </div>
          <button onClick={runSync} disabled={!sheetsUrl||syncState==="Syncing..."} style={{width:"100%",padding:"12px",borderRadius:10,background:C.accent,color:"#0A0908",border:"none",cursor:"pointer",fontWeight:600,fontSize:14,opacity:(!sheetsUrl||syncState==="Syncing...")?0.5:1}}>
            {syncState||"Sync Daily Log to Google Sheets"}
          </button>
          <div style={{fontSize:10,color:C.muted,textAlign:"center",marginTop:10}}>Synced rows appear in "Daily Log" and "Spend Items" sheets.</div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// SKIN TAB
// ═══════════════════════════════════════════════════════════════════════════════
function SkinTab({logs,setLogs}){
  const today=todayStr();
  const log=logs[today]||{};
  const upd=(d,key,val)=>setLogs({...logs,[d]:{...logs[d],[key]:val}});

  const handlePhoto=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>upd(today,"skinPhoto",ev.target.result);r.readAsDataURL(f);
  };

  return(
    <div>
      <PTitle sub="Routine tracking and visual progress">Skin & Beauty</PTitle>
      
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(320px, 1fr))",gap:20,marginBottom:24}}>
        <div style={card}>
          <SHead>Today's Rating</SHead>
          <Slider label="Skin Rating" value={log.skinRating||5} onChange={v=>upd(today,"skinRating",v)} color={C.accent} emoji="✨" />
          <Divider />
          <label style={lbl}>Concerns Today</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:15}}>
            {["Redness","Dryness","Texture","Breakout","Dullness"].map(c=>(
              <Pill key={c} label={c} active={(log.skinConcerns||[]).includes(c)} color={C.danger} onClick={()=>{
                const ex=log.skinConcerns||[];upd(today,"skinConcerns",ex.includes(c)?ex.filter(x=>x!==c):[...ex,c]);
              }} />
            ))}
          </div>
          <label style={lbl}>Skin Notes</label>
          <textarea value={log.skinNotes||""} onChange={e=>upd(today,"skinNotes",e.target.value)} placeholder="Specific observations?" style={{...inp,height:60}} />
        </div>

        <div style={card}>
          <SHead>Routine Check</SHead>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            <div>
              <div style={lbl}>Morning (AM)</div>
              {SKINCARE_AM.map(s=>(
                <Check key={s} label={s} checked={(log.skincare?.AM||[]).includes(s)} onChange={()=>{
                  const sk=log.skincare||{};const cur=sk.AM||[];
                  upd(today,"skincare",{...sk,AM:cur.includes(s)?cur.filter(x=>x!==s):[...cur,s]});
                }} />
              ))}
            </div>
            <div>
              <div style={lbl}>Evening (PM)</div>
              {SKINCARE_PM.map(s=>(
                <Check key={s} label={s} checked={(log.skincare?.PM||[]).includes(s)} onChange={()=>{
                  const sk=log.skincare||{};const cur=sk.PM||[];
                  upd(today,"skincare",{...sk,PM:cur.includes(s)?cur.filter(x=>x!==s):[...cur,s]});
                }} />
              ))}
            </div>
          </div>
        </div>

        <div style={card}>
          <SHead>Visual Log</SHead>
          {log.skinPhoto ? (
            <div style={{position:"relative",borderRadius:10,overflow:"hidden",aspectRatio:"4/3"}}>
              <img src={log.skinPhoto} style={{width:"100%",height:"100%",objectFit:"cover"}} />
              <button onClick={()=>upd(today,"skinPhoto",null)} style={{position:"absolute",top:10,right:10,background:"#00000088",color:"white",border:"none",width:24,height:24,borderRadius:"50%",cursor:"pointer"}}>×</button>
            </div>
          ) : (
            <div style={{border:`2px dashed ${C.border}`,borderRadius:10,height:180,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10}}>
              <div style={{fontSize:24}}>📸</div>
              <input type="file" accept="image/*" onChange={handlePhoto} id="skin-up" hidden />
              <label htmlFor="skin-up" style={{fontSize:12,color:C.accent,cursor:"pointer",fontWeight:500}}>Upload Morning Skin Photo</label>
            </div>
          )}
        </div>
      </div>

      <SHead>History Grid</SHead>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(140px, 1fr))",gap:12}}>
        {Object.entries(logs)
          .filter(([_,l])=>l.skinPhoto)
          .sort(([a],[b])=>b.localeCompare(a))
          .map(([date,l])=>(
            <div key={date} style={{...card,padding:0,overflow:"hidden",position:"relative"}}>
              <img src={l.skinPhoto} style={{width:"100%",aspectRatio:"1/1",objectFit:"cover",display:"block"}} />
              <div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent, #000000CC)",padding:"15px 10px 8px"}}>
                <div style={{fontSize:10,color:C.white,fontWeight:500}}>{new Date(date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
                {l.skinRating && <div style={{fontSize:9,color:C.accent}}>Rating: {l.skinRating}/10</div>}
              </div>
              <button onClick={()=>{if(confirm("Delete photo?")) upd(date,"skinPhoto",null);}} style={{position:"absolute",top:5,right:5,width:20,height:20,borderRadius:"50%",background:"#00000088",color:C.white,border:"none",cursor:"pointer",fontSize:12,lineHeight:1}}>×</button>
            </div>
          ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// HAIR & BEAUTY TAB
// ═══════════════════════════════════════════════════════════════════════════════
function HairBeautyTab({dailyLogs,beautyLogs,setBeautyLogs,intervals,setIntervals}){
  const updLog=id=>setBeautyLogs({...beautyLogs,[id]:todayStr()});
  const updIv=(id,v)=>setIntervals({...intervals,[id]:+v});

  return(
    <div>
      <PTitle sub="Maintenance and appointment tracking">Beauty Maintenance</PTitle>
      
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(300px, 1fr))",gap:20}}>
        {BEAUTY_ITEMS.map(item=>{
          const last=beautyLogs[item.id];
          const iv=intervals[item.id]||item.interval;
          const due=last ? new Date(last+"T12:00:00") : null;
          if(due) due.setDate(due.getDate()+iv);
          const daysLeft=due ? Math.ceil((due-new Date())/86400000) : null;
          const overdue=daysLeft!==null&&daysLeft<0;

          return(
            <div key={item.id} style={card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:15}}>
                <div style={{display:"flex",gap:12,alignItems:"center"}}>
                  <div style={{fontSize:28}}>{item.icon}</div>
                  <div>
                    <div style={{...serif,fontSize:18,color:C.white}}>{item.label}</div>
                    <div style={{fontSize:11,color:C.muted}}>Interval: {iv} days</div>
                  </div>
                </div>
                <button onClick={()=>updLog(item.id)} style={{padding:"6px 14px",borderRadius:8,background:C.accent,color:"#0A0908",border:"none",cursor:"pointer",fontSize:12,fontWeight:600}}>I did this</button>
              </div>
              
              <div style={{display:"flex",gap:15,alignItems:"center",background:C.surface,padding:"12px 16px",borderRadius:10}}>
                <div style={{flex:1}}>
                  <div style={lbl}>Last Done</div>
                  <div style={{fontSize:14,color:C.text}}>{last ? new Date(last+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) : "Never"}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={lbl}>Status</div>
                  <div style={{...serif,fontSize:22,color:overdue?C.danger:C.sage}}>
                    {daysLeft!==null ? (overdue ? `${Math.abs(daysLeft)}d overdue` : `${daysLeft}d left`) : "Set date"}
                  </div>
                </div>
              </div>

              <div style={{marginTop:15}}>
                <label style={lbl}>Set custom interval (days)</label>
                <input type="number" value={iv} onChange={e=>updIv(item.id,e.target.value)} style={inp} />
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// HABITS TAB
// ═══════════════════════════════════════════════════════════════════════════════
function HabitsTab({logs,setLogs,customHabits,setCustomHabits}){
  const today=todayStr();
  const log=logs[today]||{};
  const habits=log.habits||[];
  const toggle=id=>setLogs({...logs,[today]:{...log,habits:habits.includes(id)?habits.filter(x=>x!==id):[...habits,id]}});
  
  const [newHab,setNewHab]=useState({label:"",emoji:""});
  const addHab=()=>{if(!newHab.label)return;setCustomHabits([...customHabits,{...newHab,id:Date.now()}]);setNewHab({label:"",emoji:""});};
  const all=[...DEFAULT_HABITS,...customHabits];

  return(
    <div>
      <PTitle sub="Consistency is the only metric that matters">Habit Tracker</PTitle>
      
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(280px, 1fr))",gap:15,marginBottom:30}}>
        {all.map(h=>{
          const streak=getStreak(h.id,logs);
          const longest=getLongest(h.id,logs);
          const done=habits.includes(h.id);
          return(
            <div key={h.id} onClick={()=>toggle(h.id)} style={{...card,cursor:"pointer",border:`1px solid ${done?C.accent+"66":C.border}`,background:done?C.accent+"08":C.card,transition:"all 0.2s"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",gap:12,alignItems:"center"}}>
                  <div style={{fontSize:24}}>{h.emoji||"✨"}</div>
                  <div>
                    <div style={{fontSize:14,fontWeight:done?600:400,color:done?C.text:C.muted}}>{h.label}</div>
                    <div style={{fontSize:10,color:C.accent,marginTop:2}}>Streak: {streak} days</div>
                  </div>
                </div>
                <div style={{width:24,height:24,borderRadius:"50%",border:`2px solid ${done?C.accent:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",color:C.accent,fontSize:14}}>
                  {done&&"✓"}
                </div>
              </div>
              <div style={{marginTop:12,height:4,background:C.border,borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${Math.min(100,(streak/30)*100)}%`,background:C.accent}} />
              </div>
            </div>
          );
        })}
      </div>

      <div style={{maxWidth:500,margin:"0 auto"}}>
        <SHead>Add Custom Habit</SHead>
        <div style={{display:"flex",gap:10}}>
          <input value={newHab.emoji} onChange={e=>setNewHab({...newHab,emoji:e.target.value})} placeholder="🎨" style={{...inp,width:60,textAlign:"center"}} />
          <input value={newHab.label} onChange={e=>setHabit({...newHab,label:e.target.value})} onKeyDown={e=>e.key==="Enter"&&addHab()} placeholder="Meditation, Reading, etc." style={{...inp,flex:1}} />
          <button onClick={addHab} style={{padding:"0 20px",borderRadius:8,background:C.surface,color:C.text,border:`1px solid ${C.border}`,cursor:"pointer"}}>Add</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// CYCLE TAB
// ═══════════════════════════════════════════════════════════════════════════════
function CycleTab({dailyLogs}){
  const [start,setStart]=useLS("nm_cycle_start","");
  const [len,setLen]=useLS("nm_cycle_len",28);
  const phase=getCyclePhase(start,len);

  return(
    <div>
      <PTitle sub="Align your lifestyle with your biology">Biological Clock</PTitle>
      
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(320px, 1fr))",gap:20,marginBottom:30}}>
        <div style={card}>
          <SHead>Cycle Settings</SHead>
          <div style={{marginBottom:15}}>
            <label style={lbl}>Last Period Start Date</label>
            <input type="date" value={start} onChange={e=>setStart(e.target.value)} style={inp} />
          </div>
          <div>
            <label style={lbl}>Typical Cycle Length: {len} days</label>
            <input type="range" min={21} max={35} value={len} onChange={e=>setLen(+e.target.value)} />
          </div>
        </div>

        {phase && (
          <div style={{...card,border:`1px solid ${PHASES[phase.phase].color}66`,background:PHASES[phase.phase].color+"0A"}}>
            <SHead>Current State</SHead>
            <div style={{...serif,fontSize:32,color:PHASES[phase.phase].color,marginBottom:5}}>{PHASES[phase.phase].label} Phase</div>
            <div style={{fontSize:13,color:C.text,marginBottom:15}}>Day {phase.day} of {len}</div>
            <div style={{fontSize:12,color:C.muted,lineHeight:1.6,fontStyle:"italic"}}>{PHASES[phase.phase].modeNote}</div>
          </div>
        )}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(400px, 1fr))",gap:20}}>
        {Object.entries(PHASES).map(([id,p])=>(
          <div key={id} style={{...card,opacity:phase?.phase===id?1:0.6,border:phase?.phase===id?`1px solid ${p.color}`:`1px solid ${C.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:15}}>
              <div style={{...serif,fontSize:20,color:p.color}}>{p.label} <span style={{fontSize:12,color:C.muted,marginLeft:8}}>Days {p.days}</span></div>
              {phase?.phase===id && <div style={{fontSize:10,background:p.color,color:"#000",padding:"2px 8px",borderRadius:10,fontWeight:700}}>CURRENT</div>}
            </div>
            
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
              <div>
                <label style={{...lbl,color:p.color}}>Key Nutrition</label>
                {p.nutrition.map((n,i)=>(
                  <div key={i} style={{marginBottom:10}}>
                    <div style={{fontSize:12,color:C.text,fontWeight:600}}>{n.nutrient}: {n.food}</div>
                    <div style={{fontSize:10,color:C.muted}}>{n.reason}</div>
                  </div>
                ))}
              </div>
              <div>
                <label style={{...lbl,color:p.color}}>Symptoms to Expect</label>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {p.expectedSymptoms.map(s=><span key={s} style={{fontSize:10,color:C.muted,background:C.surface,padding:"2px 6px",borderRadius:4}}>{s}</span>)}
                </div>
                <label style={{...lbl,color:p.color,marginTop:15}}>Movement</label>
                <div style={{fontSize:11,color:C.text}}>{p.move}</div>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// SPEND TAB (Condensed View)
// ═══════════════════════════════════════════════════════════════════════════════
function SpendTab({logs,rate}){
  const allItems = Object.entries(logs).flatMap(([date,l])=>(l.spendItems||[]).map(i=>({...i,date})));
  const total = allItems.reduce((s,i)=>s+i.amount,0);
  const net = allItems.filter(i=>!i.returnLikely).reduce((s,i)=>s+i.amount,0);

  return(
    <div>
      <PTitle sub="Financial clarity across all currencies">Spending Overview</PTitle>
      
      <div style={{display:"flex",gap:20,marginBottom:30}}>
        <div style={{...card,flex:1}}>
          <div style={lbl}>Gross Spending</div>
          <div style={{...serif,fontSize:42,color:C.text}}>${total.toFixed(2)}</div>
        </div>
        <div style={{...card,flex:1,border:`1px solid ${C.sage}44`}}>
          <div style={lbl}>Net Spending (Excl. Returns)</div>
          <div style={{...serif,fontSize:42,color:C.sage}}>${net.toFixed(2)}</div>
          {rate && <div style={{fontSize:12,color:C.muted,marginTop:5}}>≈ €{(net/rate).toFixed(2)} <span style={{fontSize:10}}>(@ {rate})</span></div>}
        </div>
      </div>

      <div style={card}>
        <SHead>Transaction History</SHead>
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          {allItems.sort((a,b)=>b.date.localeCompare(a.date)).map((item,idx)=>(
            <div key={idx} style={{display:"flex",alignItems:"center",gap:15,padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
              <div style={{fontSize:11,color:C.muted,width:80}}>{new Date(item.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
              <div style={{width:8,height:8,borderRadius:"50%",background:CAT_COLORS[item.category]||C.muted}} />
              <div style={{flex:1}}>
                <div style={{fontSize:13,color:C.text}}>{item.note || item.category}</div>
                <div style={{fontSize:10,color:C.muted}}>{item.category}</div>
              </div>
              <div style={{...serif,fontSize:18,color:item.returnLikely?C.gold:C.text,textDecoration:item.returnLikely?"line-through":"none"}}>
                ${item.amount.toFixed(2)}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// MAIN APP COMPONENT
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  const [tab, setTab] = useLS("nm_active_tab", "dashboard");
  const [dailyLogs, setDailyLogs] = useLS("nm_daily_logs", {});
  const [beautyLogs, setBeautyLogs] = useLS("nm_beauty_logs", {});
  const [intervals, setIntervals] = useLS("nm_beauty_intervals", {});
  const [customHabits, setCustomHabits] = useLS("nm_custom_habits", []);
  const [cycleStart] = useLS("nm_cycle_start", "");
  const [cycleLength] = useLS("nm_cycle_len", 28);
  const {rate} = useEurUsd();

  const TABS = [
    { id: "dashboard", label: "Dashboard" },
    { id: "daily", label: "Daily Log" },
    { id: "skin", label: "Skin" },
    { id: "hair", label: "Beauty" },
    { id: "cycle", label: "Cycle" },
    { id: "habits", label: "Habits" },
    { id: "spend", label: "Spend" }
  ];

  return (
    <div style={{ minHeight: "100vh", color: C.text, fontFamily: "'DM Sans', sans-serif" }}>
      {/* Navigation */}
      <div style={{ position: "sticky", top: 0, zIndex: 100, background: C.bg+"F0", backdropFilter: "blur(10px)", borderBottom: `1px solid ${C.border}` }}>
        <div style={{ maxWidth: 1200, margin: "0 auto", padding: "0 20px" }}>
          <div style={{ height: 70, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ ...serif, fontSize: 24, fontWeight: 500, color: C.white, letterSpacing: "-0.02em" }}>Nicole OS</div>
            <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 0 }}>
              {TABS.map(t => (
                <button key={t.id} onClick={() => setTab(t.id)} style={{ padding: "8px 16px", borderRadius: 20, border: "none", fontSize: 11, fontWeight: 600, letterSpacing: "0.04em", cursor: "pointer", whiteSpace: "nowrap", border: `1px solid ${tab === t.id ? C.accent : C.border}`, background: tab === t.id ? C.accent + "18" : "transparent", color: tab === t.id ? C.accent : C.muted, transition: "all 0.15s" }}>{t.label}</button>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* Content Area */}
      <div style={{ position: "relative", zIndex: 1, padding: "26px 20px 80px" }}>
        <div style={{ maxWidth: 960, margin: "0 auto" }}>
          {tab === "dashboard" && <Dashboard dailyLogs={dailyLogs} cycleStart={cycleStart} cycleLength={cycleLength} beautyLogs={beautyLogs} intervals={intervals} allHabits={DEFAULT_HABITS} />}
          {tab === "daily" && <DailyLog logs={dailyLogs} setLogs={setDailyLogs} allHabits={DEFAULT_HABITS} cycleStart={cycleStart} cycleLength={cycleLength} />}
          {tab === "skin" && <SkinTab logs={dailyLogs} setLogs={setDailyLogs} />}
          {tab === "hair" && <HairBeautyTab dailyLogs={dailyLogs} beautyLogs={beautyLogs} setBeautyLogs={setBeautyLogs} intervals={intervals} setIntervals={setIntervals} />}
          {tab === "cycle" && <CycleTab dailyLogs={dailyLogs} />}
          {tab === "habits" && <HabitsTab logs={dailyLogs} setLogs={setDailyLogs} customHabits={customHabits} setCustomHabits={setCustomHabits} />}
          {tab === "spend" && <SpendTab logs={dailyLogs} rate={rate} />}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
