<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nicole OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{background:#0A0908;min-height:100vh;color:#EDE9E1;font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#131210}
::-webkit-scrollbar-thumb{background:#2D2920;border-radius:2px}
.card{background:#1A1814;border:1px solid #272420;border-radius:14px;padding:20px;margin-bottom:15px}
.nav-btn{background:transparent;border:none;color:#7A7165;cursor:pointer;padding:10px;font-size:12px;border-bottom:2px solid transparent;white-space:nowrap;text-transform:uppercase;letter-spacing:1px}
.nav-btn.active{color:#C4856A;border-bottom:2px solid #C4856A}
input,select,textarea{background:#131210;color:#EDE9E1;border:1px solid #272420;border-radius:8px;padding:8px;width:100%;font-size:14px}
button{cursor:pointer;transition:all 0.2s}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.favorable{color:#7A9B8A}.neutral{color:#C9A96E}.pressure{color:#D97070}
h1,h2,h3{font-family:'Cormorant Garamond',serif;font-weight:400}
label{font-size:10px;text-transform:uppercase;color:#7A7165;letter-spacing:1px;display:block;margin-bottom:5px}
input[type=range]{accent-color:#C4856A}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// --- HELPERS ---
const todayStr = () => new Date().toISOString().split("T")[0];
const getDaysUntil = (date) => {
  const diff = new Date(date) - new Date();
  return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
};

const NicoleOS = () => {
  const [activeTab, setActiveTab] = useState("Dashboard");
  const [eurRate, setEurRate] = useState(1.10);
  const [logs, setLogs] = useState(() => JSON.parse(localStorage.getItem("nicole_logs") || "{}"));

  useEffect(() => {
    localStorage.setItem("nicole_logs", JSON.stringify(logs));
  }, [logs]);

  useEffect(() => {
    fetch("https://open.er-api.com/v6/latest/EUR")
      .then(res => res.json())
      .then(data => setEurRate(data.rates.USD))
      .catch(() => console.log("Rate fetch failed"));
  }, []);

  const upd = (field, val) => {
    const d = todayStr();
    setLogs(prev => ({ ...prev, [d]: { ...prev[d], [field]: val } }));
  };

  // --- TAB: DASHBOARD ---
  const renderDashboard = () => (
    <div>
      <h1 style={{fontSize:'32px', marginBottom:'20px'}}>Good morning, Nicole.</h1>
      <div className="grid-2">
        <div className="card" style={{textAlign:'center'}}>
          <label>Wedding Day</label>
          <h2 style={{fontSize:'42px', color:'#7A9B8A'}}>{getDaysUntil("2026-09-17")}</h2>
          <p style={{fontSize:'12px', color:'#7A7165'}}>Tuscany, Italy</p>
        </div>
        <div className="card" style={{textAlign:'center'}}>
          <label>Bachelorette</label>
          <h2 style={{fontSize:'42px', color:'#C4856A'}}>{getDaysUntil("2026-07-30")}</h2>
          <p style={{fontSize:'12px', color:'#7A7165'}}>Delaware</p>
        </div>
      </div>
      <div className="card">
        <label>Cycle Advice: Follicular</label>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px', fontSize:'13px', marginTop:'10px'}}>
          <div><strong>Eat:</strong> Probiotics, Lean Protein</div>
          <div><strong>Move:</strong> Heavy Lifts, Cardio</div>
          <div><strong>Skin:</strong> Best for Actives</div>
          <div><strong>Self:</strong> Plan & Socialize</div>
        </div>
      </div>
    </div>
  );

  // --- TAB: DAILY LOG (WITH SLEEP UPDATES) ---
  const renderDailyLog = () => {
    const log = logs[todayStr()] || {};
    return (
      <div>
        <h2>Daily Check-in</h2>
        <div className="card">
          <label>Oura Sleep Data</label>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', marginBottom:'15px'}}>
            <div>
              <label style={{fontSize:'9px'}}>Hours</label>
              <input type="number" placeholder="Hrs" value={log.sleepHrs || ""} onChange={e => upd("sleepHrs", e.target.value)} />
            </div>
            <div>
              <label style={{fontSize:'9px'}}>Minutes</label>
              <input type="number" placeholder="Min" value={log.sleepMin || ""} onChange={e => upd("sleepMin", e.target.value)} />
            </div>
          </div>
          <div className="grid-2">
            <div>
              <label style={{fontSize:'9px'}}>Readiness</label>
              <input type="number" placeholder="Score" value={log.readiness || ""} onChange={e => upd("readiness", e.target.value)} />
            </div>
            <div>
              <label style={{fontSize:'9px'}}>HRV</label>
              <input type="number" placeholder="ms" value={log.hrv || ""} onChange={e => upd("hrv", e.target.value)} />
            </div>
          </div>
        </div>
        <div className="card">
          <label>Mood & Energy</label>
          <input type="range" min="1" max="10" value={log.mood || 5} onChange={e => upd("mood", e.target.value)} />
          <textarea style={{marginTop:'10px'}} value={log.notes || ""} onChange={e => upd("notes", e.target.value)} placeholder="How are you feeling today?" rows="3" />
        </div>
      </div>
    );
  };

  // --- TAB: SKIN + GALLERY (LIBRARY ACCESS) ---
  const [showGallery, setShowGallery] = useState(false);
  const renderSkin = () => {
    const log = logs[todayStr()] || {};
    const photoHistory = Object.entries(logs)
      .filter(([_, data]) => data.skinPhoto)
      .sort((a, b) => b[0].localeCompare(a[0]));

    const onPhoto = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onloadend = () => upd("skinPhoto", reader.result);
      reader.readAsDataURL(file);
    };

    return (
      <div>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'15px'}}>
          <h2>Skin Health</h2>
          <button onClick={() => setShowGallery(!showGallery)} style={{fontSize:'11px', padding:'5px 12px', borderRadius:'20px', border:'1px solid #C4856A', background:showGallery?'#C4856A':'transparent', color:showGallery?'#0A0908':'#C4856A'}}>
            {showGallery ? "Back to Log" : "View Gallery"}
          </button>
        </div>

        {!showGallery ? (
          <>
            <div className="card">
              <label>Condition Rating</label>
              <input type="range" min="1" max="10" value={log.skinRating || 5} onChange={e => upd("skinRating", e.target.value)} />
              <div style={{textAlign:'right', fontSize:'18px', color:'#C4856A'}}>{log.skinRating || 5}/10</div>
              <label style={{marginTop:'15px'}}>Daily Notes</label>
              <textarea value={log.skinNotes || ""} onChange={e => upd("skinNotes", e.target.value)} placeholder="SkinMedica/SkinBetter check..." rows="3" />
            </div>
            <div className="card">
              <label>Progress Photo</label>
              <div style={{display:'flex', gap:'15px', alignItems:'center'}}>
                <label style={{flex:1, height:'100px', border:'2px dashed #272420', borderRadius:'12px', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', cursor:'pointer'}}>
                  <span style={{fontSize:'20px'}}>📸</span>
                  <span style={{fontSize:'10px'}}>Upload or Take</span>
                  <input type="file" accept="image/*" onChange={onPhoto} style={{display:'none'}} />
                </label>
                {log.skinPhoto && <img src={log.skinPhoto} style={{width:'100px', height:'100px', borderRadius:'12px', objectFit:'cover'}} />}
              </div>
            </div>
          </>
        ) : (
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'10px'}}>
            {photoHistory.map(([date, data]) => (
              <div key={date}>
                <img src={data.skinPhoto} style={{width:'100%', aspectRatio:'1/1', borderRadius:'8px', objectFit:'cover'}} />
                <div style={{fontSize:'9px', textAlign:'center', marginTop:'4px', color:'#7A7165'}}>{date}</div>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

  // --- TAB: WEDDING ---
  const renderWedding = () => {
    const usd = (val) => (val * eurRate).toFixed(2);
    const status = eurRate < 1.10 ? "favorable" : eurRate > 1.15 ? "pressure" : "neutral";
    return (
      <div>
        <h2>Wedding & FX</h2>
        <div className="card" style={{textAlign:'center'}}>
          <label>Live EUR/USD Rate</label>
          <h1 style={{fontSize:'38px'}} className={status}>${eurRate.toFixed(4)}</h1>
          <p className={status} style={{fontSize:'12px', fontWeight:'bold'}}>{eurRate < 1.10 ? "Favorable: Strong USD" : eurRate > 1.15 ? "High Cost: Weak USD" : "Neutral Market"}</p>
        </div>
        <div className="card">
          <label>Quick Convert</label>
          <div style={{display:'flex', justifyContent:'space-between', padding:'8px 0', borderBottom:'1px solid #272420'}}>
            <span>€1,000 Vendor Payment:</span>
            <span style={{color:'#7A9B8A'}}>${usd(1000)}</span>
          </div>
          <div style={{display:'flex', justifyContent:'space-between', padding:'8px 0'}}>
            <span>€5,000 Venue Deposit:</span>
            <span style={{color:'#7A9B8A'}}>${usd(5000)}</span>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div style={{maxWidth:'500px', margin:'0 auto', padding:'20px'}}>
      <nav style={{display:'flex', overflowX:'auto', gap:'15px', marginBottom:'20px', paddingBottom:'10px', borderBottom:'1px solid #131210'}}>
        {["Dashboard", "Daily Log", "Skin", "Hair & Beauty", "Cycle", "Habits", "Spend", "Wedding"].map(t => (
          <button key={t} onClick={() => setActiveTab(t)} className={`nav-btn ${activeTab === t ? 'active' : ''}`}>{t}</button>
        ))}
      </nav>
      <main>
        {activeTab === "Dashboard" && renderDashboard()}
        {activeTab === "Daily Log" && renderDailyLog()}
        {activeTab === "Skin" && renderSkin()}
        {activeTab === "Wedding" && renderWedding()}
        {!["Dashboard", "Daily Log", "Skin", "Wedding"].includes(activeTab) && (
          <div className="card" style={{textAlign:'center', color:'#7A7165', padding:'40px 20px'}}>
            <h2>{activeTab}</h2>
            <p>Structure ready for data input.</p>
          </div>
        )}
      </main>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<NicoleOS />);
</script>
</body>
</html>
