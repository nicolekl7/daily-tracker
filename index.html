const { useState, useEffect, useRef, useMemo } = React;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const todayStr = () => new Date().toISOString().split("T")[0];
const daysUntil = d => Math.max(0, Math.ceil((new Date(d) - new Date()) / 86400000));
const fmt12 = t => { if(!t) return ""; const [h,m]=t.split(":").map(Number); return ((h%12)||12)+":"+String(m).padStart(2,"0")+(h>=12?" PM":" AM"); };

function useLS(key, init) {
  const [v,sv] = useState(() => { try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;} });
  useEffect(() => { try{localStorage.setItem(key,JSON.stringify(v));}catch(e){} }, [key,v]);
  return [v,sv];
}

function getCyclePhase(startDate, length=28) {
  if(!startDate) return null;
  const elapsed = Math.floor((new Date()-new Date(startDate))/86400000);
  const day = (elapsed % length)+1;
  const phase = day<=5?"menstrual":day<=13?"follicular":day<=16?"ovulatory":"luteal";
  return { phase, day };
}

function sleepDuration(bed, wake) {
  if(!bed||!wake) return null;
  const [bh,bm]=bed.split(":").map(Number), [wh,wm]=wake.split(":").map(Number);
  let mins=(wh*60+wm)-(bh*60+bm); if(mins<0)mins+=1440;
  return { h:Math.floor(mins/60), m:mins%60, total:mins, label:Math.floor(mins/60)+"h"+(mins%60>0?" "+(mins%60)+"m":"") };
}

function getStreak(hid, logs) {
  let n=0; const d=new Date();
  while(true){ const k=d.toISOString().split("T")[0]; if(!(logs[k]?.habits||[]).includes(hid))break; n++; d.setDate(d.getDate()-1); }
  return n;
}

function getLongest(hid, logs) {
  let max=0,cur=0;
  Object.keys(logs).sort().forEach(k=>{ if((logs[k]?.habits||[]).includes(hid)){cur++;max=Math.max(max,cur);}else cur=0; });
  return max;
}

function weekStart(ds) {
  const d=new Date(ds+"T12:00:00"), day=d.getDay(), diff=(day===0?-6:1)-day;
  d.setDate(d.getDate()+diff); return d.toISOString().split("T")[0];
}

// ─── GOOGLE SHEETS SYNC ──────────────────────────────────────────────────────
async function syncToSheets(log, date, sheetsUrl, cycleStart, cycleLength) {
  if(!sheetsUrl) return { ok:false, msg:"Paste your Apps Script URL first" };
  const phase = getCyclePhase(cycleStart, cycleLength);
  const timedMeds = log.timedMeds||{};
  const spendItems = log.spendItems||[];
  const fmtTimes = id => (timedMeds[id]||[]).map(d=>fmt12(d.time)).join(", ");
  const sl = sleepDuration(log.bedtime, log.wakeTime);
  const dailyRow = {
    sheet:"Daily Log", date,
    mood:log.mood||"", anxiety:log.anxiety||"", anger:log.anger||"", energy:log.energy||"", notes:log.notes||"",
    bedtime:log.bedtime||"", wakeTime:log.wakeTime||"", sleepHours:sl?sl.label:"", sleepQuality:log.sleepQuality||"",
    sleepSupps:(log.sleepSupps||[]).join(", "), hairWashed:log.hairWash||"",
    breakfast:log.breakfast||"", breakfastFlags:((log.mealSensitivity||{}).breakfast||[]).join(", "),
    lunch:log.lunch||"", lunchFlags:((log.mealSensitivity||{}).lunch||[]).join(", "),
    dinner:log.dinner||"", dinnerFlags:((log.mealSensitivity||{}).dinner||[]).join(", "),
    snacks:log.snacks||"", snackFlags:((log.mealSensitivity||{}).snacks||[]).join(", "),
    dayFlags:(log.foodTagsDay||[]).join(", "), foodNotes:log.foodNotes||"",
    symptoms:Object.entries(log.symptoms||{}).map(([k,v])=>k+" ("+v+")").join(", "),
    vyvanse:fmtTimes("vyvanse"), adderallIR:fmtTimes("adderall_ir"), adderallXR:fmtTimes("adderall_xr"),
    ativan:fmtTimes("ativan"), propranolol:fmtTimes("propranolol"),
    supplements:(log.meds||[]).join(", "), habits:(log.habits||[]).join(", "),
    ouraSleep:log.ouraSleep||"", ouraHrv:log.ouraHrv||"", ouraReadiness:log.ouraReadiness||"",
    ouraSteps:log.ouraSteps||"", ouraRhr:log.ouraRhr||"",
    skinRating:log.skinRating||"", skinConcerns:(log.skinConcerns||[]).join(", "),
    skincareAM:((log.skincare||{}).AM||[]).join(", "), skincarePM:((log.skincare||{}).PM||[]).join(", "),
    skinNotes:log.skinNotes||"",
    totalSpend:spendItems.reduce((s,i)=>s+i.amount,0).toFixed(2),
    netSpend:spendItems.filter(i=>!i.returnLikely).reduce((s,i)=>s+i.amount,0).toFixed(2),
    cycleDay:phase?phase.day:"", cyclePhase:phase?PHASES[phase.phase].label:""
  };
  const spendRows = spendItems.map(item=>({ sheet:"Spend Items", date, note:item.note||"", category:item.category||"Other", amount:item.amount.toFixed(2), returnLikely:item.returnLikely?"TRUE":"FALSE" }));
  try {
    await fetch(sheetsUrl, { method:"POST", mode:"no-cors", headers:{"Content-Type":"text/plain"}, body:JSON.stringify({dailyRow,spendRows}) });
    return { ok:true, msg:"Synced ✓ "+date };
  } catch(e) { return { ok:false, msg:"Network error — check URL" }; }
}

function MiniChart({data=[],height=64,colors={}}){
  const allV=data.flatMap(d=>Object.values(d.values||{}).filter(v=>v!=null&&!isNaN(+v)));
  const max=Math.max(...allV,1);
  if(allV.length===0) return null;
  return(
    <div style={{display:"flex",alignItems:"flex-end",gap:4,height}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,height:"100%"}}>
          <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"flex-end",gap:2,width:"100%"}}>

            ):null)}
          </div>
          {d.label&&<div style={{fontSize:9,color:C.faint,textAlign:"center"}}>{d.label}</div>}
        </div>
      ))}
    </div>
  );
}

        {children}
      </div>
    </div>
  );
}

// ─── EUR/USD ─────────────────────────────────────────────────────────────────
function useEurUsd(){
  const [rate,setRate]=useLS("nm_eurusd_rate",null);
  const [fetched,setFetched]=useLS("nm_eurusd_date",null);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const fetchRate=async()=>{
    setLoading(true);setError(null);
    const urls=["https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/eur.json","https://latest.currency-api.pages.dev/v1/currencies/eur.json"];
    let ok=false;
    for(const url of urls){try{const res=await fetch(url);if(!res.ok)continue;const data=await res.json();const usd=data?.eur?.usd;if(!usd)continue;setRate(+usd.toFixed(6));setFetched(todayStr());ok=true;break;}catch(e){continue;}}
    if(!ok)setError("Could not fetch — check internet connection");
    setLoading(false);
  };
  useEffect(()=>{if(fetched!==todayStr())fetchRate();},[]);
  return {rate,fetched,loading,error,refresh:fetchRate};
}

// ─── TIMED MED LOGGER ────────────────────────────────────────────────────────
function TimedMedLogger({log,upd}){
  const timedMeds=log.timedMeds||{};
  const nowT=()=>{const d=new Date();return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");};
  const addDose=id=>{const ex=timedMeds[id]||[];upd("timedMeds",{...timedMeds,[id]:[...ex,{id:Date.now(),time:nowT()}]});};
  const rmDose=(mid,did)=>{const n={...timedMeds};const u=(timedMeds[mid]||[]).filter(d=>d.id!==did);if(u.length===0)delete n[mid];else n[mid]=u;upd("timedMeds",n);};
  const updTime=(mid,did,t)=>upd("timedMeds",{...timedMeds,[mid]:(timedMeds[mid]||[]).map(d=>d.id===did?{...d,time:t}:d)});
  return(
    <div>
      {TIMED_MEDS.map(med=>{
        const doses=timedMeds[med.id]||[];const taken=doses.length>0;
        return(
          <div key={med.id} style={{marginBottom:8,borderRadius:9,overflow:"hidden",border:`1px solid ${taken?med.color+"55":C.border}`,background:taken?med.color+"08":"transparent",transition:"all 0.2s"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 13px"}}>
              <div><div style={{fontSize:13,fontWeight:taken?500:400,color:taken?C.text:C.muted}}>{med.label}</div><div style={{fontSize:10,color:med.color+"88",marginTop:1}}>{med.note}</div></div>
              <button onClick={()=>addDose(med.id)} style={{padding:"4px 12px",borderRadius:7,cursor:"pointer",fontSize:11,fontWeight:500,background:taken?med.color+"22":C.surface,border:`1px solid ${taken?med.color+"66":C.border}`,color:taken?med.color:C.muted}}>+ Dose</button>
            </div>
            {doses.length>0&&(
              <div style={{borderTop:`1px solid ${med.color}22`,padding:"7px 13px",display:"flex",flexWrap:"wrap",gap:6}}>
                {doses.map((dose,i)=>(
                  <div key={dose.id} style={{display:"flex",alignItems:"center",gap:5,background:med.color+"14",border:`1px solid ${med.color}33`,borderRadius:7,padding:"4px 9px"}}>
                    <span style={{fontSize:10,color:med.color+"88"}}>Dose {i+1}</span>
                    <input type="time" value={dose.time} onChange={e=>updTime(med.id,dose.id,e.target.value)} style={{...inp,width:"auto",padding:"1px 5px",fontSize:12,background:"transparent",border:"none",color:med.color,fontWeight:500}} />
                    <span style={{fontSize:10,color:med.color+"77"}}>{fmt12(dose.time)}</span>
                    <button onClick={()=>rmDose(med.id,dose.id)} style={{background:"none",border:"none",color:med.color+"55",cursor:"pointer",fontSize:14,lineHeight:1,padding:0}}>×</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── SPEND LOGGER ────────────────────────────────────────────────────────────
function SpendLogger({log,upd}){
  const [form,setForm]=useState({amount:"",category:"",note:"",returnLikely:false});

  const addItem=()=>{if(!form.amount||isNaN(parseFloat(form.amount)))return;upd("spendItems",[...items,{id:Date.now(),amount:parseFloat(form.amount),category:form.category||"Other",note:form.note,returnLikely:form.returnLikely}]);setForm({amount:"",category:"",note:"",returnLikely:false});};
  const total=items.reduce((s,i)=>s+i.amount,0);
  const net=items.filter(i=>!i.returnLikely).reduce((s,i)=>s+i.amount,0);
  return(
    <div>
      {items.length>0&&(
        <div style={{display:"flex",gap:16,marginBottom:12,padding:"10px 14px",background:C.surface,borderRadius:10}}>

              <div style={{width:6,height:6,borderRadius:"50%",background:CAT_COLORS[item.category]||C.muted,flexShrink:0}} />
              <span style={{fontSize:11,color:C.muted}}>{item.category}</span>
              {item.returnLikely&&<span style={{fontSize:9,color:C.gold,background:C.gold+"18",borderRadius:8,padding:"1px 6px"}}>↩ return</span>}
            </div>
            {item.note&&<div style={{fontSize:12,color:C.text,paddingLeft:12}}>{item.note}</div>}

          <div style={{...serif,fontSize:17,color:item.returnLikely?C.gold:C.text,textDecoration:item.returnLikely?"line-through":"none"}}>${item.amount.toFixed(2)}</div>
          <button onClick={()=>upd("spendItems",items.map(i=>i.id===item.id?{...i,returnLikely:!i.returnLikely}:i))} style={{background:"none",border:`1px solid ${item.returnLikely?C.gold+"66":C.border}`,borderRadius:5,color:item.returnLikely?C.gold:C.faint,cursor:"pointer",fontSize:11,padding:"2px 7px"}}>↩</button>
          <button onClick={()=>upd("spendItems",items.filter(i=>i.id!==item.id))} style={{background:"none",border:"none",color:C.faint,cursor:"pointer",fontSize:16,lineHeight:1}}>×</button>
        </div>
      ))}
      <div style={{marginTop:8}}>
        <div style={{display:"grid",gridTemplateColumns:"90px 1fr",gap:8,marginBottom:7}}>
          <div><label style={lbl}>Amount</label><div style={{display:"flex",alignItems:"center",gap:4}}><span style={{color:C.muted,fontSize:13}}>$</span><input type="number" step="0.01" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})} onKeyDown={e=>e.key==="Enter"&&addItem()} placeholder="0.00" style={{...inp,...serif,fontSize:15}} /></div></div>
          <div><label style={lbl}>Category</label><select value={form.category} onChange={e=>setForm({...form,category:e.target.value})} style={inp}><option value="">Category</option>{SPEND_CATS.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
        </div>
        <div style={{display:"flex",gap:7,alignItems:"flex-end"}}>
          <div style={{flex:1}}><label style={lbl}>Note</label><input value={form.note} onChange={e=>setForm({...form,note:e.target.value})} onKeyDown={e=>e.key==="Enter"&&addItem()} placeholder="What was it?" style={inp} /></div>
          <button onClick={()=>setForm({...form,returnLikely:!form.returnLikely})} style={{padding:"9px 11px",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:500,flexShrink:0,background:form.returnLikely?C.gold+"22":"transparent",border:`1px solid ${form.returnLikely?C.gold:C.border}`,color:form.returnLikely?C.gold:C.muted}}>↩</button>

        </div>

    </div>
  );

// DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════
function Dashboard({dailyLogs,setDailyLogs,cycleStart,cycleLength,beautyLogs,intervals,allHabits}){
  const phase=getCyclePhase(cycleStart,cycleLength);
  const pd=phase?PHASES[phase.phase]:null;
  const today=dailyLogs[todayStr()]||{};
  const [tasks,setTasks]=useLS("nm_tasks",[]);
  const [newTask,setNewTask]=useState("");
  const hr=new Date().getHours();
  const greeting=hr<12?"Good morning":hr<17?"Good afternoon":"Good evening";
  const isLateLuteal=phase?.phase==="luteal"&&phase.day>=22;
  const mode=isLateLuteal?"gentle":pd?.mode;

  const upcoming=BEAUTY_ITEMS.map(item=>{
    const last=beautyLogs[item.id];if(!last)return null;
    const iv=intervals[item.id]||item.interval;
    const due=new Date(last+"T12:00:00");due.setDate(due.getDate()+iv);
    return {...item,daysLeft:Math.ceil((due-new Date())/86400000),dueDate:due};
  }).filter(Boolean).sort((a,b)=>a.daysLeft-b.daysLeft);

  const addTask=()=>{if(!newTask.trim())return;setTasks([...tasks,{id:Date.now(),text:newTask,done:false}]);setNewTask("");};

  // Quick-log: write mood/energy/skin directly from Dashboard
  const quickUpd=(f,v)=>setDailyLogs(prev=>({...prev,[todayStr()]:{...(prev[todayStr()]||{}),[f]:v}}));

  // Vyvanse alert: luteal phase + any dose logged after 9am
  const vyvanseAlert=phase?.phase==="luteal"&&(today.timedMeds?.vyvanse||[]).some(d=>d.time>"09:00");

  // Flare predictor: compare today's conditions against historical skin flare days
  const flareRisk=useMemo(()=>{
    if(!phase||!cycleStart)return null;
    const flareDates=Object.entries(dailyLogs).filter(([,v])=>v?.symptoms?.["Skin flare"]).map(([d])=>d);
    if(flareDates.length<3)return null;
    const tl=dailyLogs[todayStr()]||{};
    const tc={luteal:phase.phase==="luteal",lowSleep:(tl.ouraSleep&&tl.ouraSleep<70)||(tl.sleepQuality&&tl.sleepQuality<5),alcohol:Object.values(tl.mealSensitivity||{}).some(a=>a.includes("Alcohol")),skippedAzelaic:!!(tl.skincare)&&!((tl.skincare.AM||[]).includes("Azelaic Acid 15%"))};
    if(Object.values(tc).filter(Boolean).length<2)return null;
    let matches=0;
    flareDates.forEach(d=>{
      const v=dailyLogs[d]||{};
      const el=Math.floor((new Date(d)-new Date(cycleStart))/86400000);
      const cd=(el%cycleLength)+1;
      const fp=cd<=5?"menstrual":cd<=13?"follicular":cd<=16?"ovulatory":"luteal";
      const fc={luteal:fp==="luteal",lowSleep:(v.ouraSleep&&v.ouraSleep<70)||(v.sleepQuality&&v.sleepQuality<5),alcohol:Object.values(v.mealSensitivity||{}).some(a=>a.includes("Alcohol")),skippedAzelaic:!!(v.skincare)&&!((v.skincare.AM||[]).includes("Azelaic Acid 15%"))};
      if(Object.keys(tc).filter(k=>tc[k]&&fc[k]).length>=2)matches++;
    });
    if(!matches)return null;
    const factors=Object.entries({luteal:"Luteal phase",lowSleep:"Low sleep",alcohol:"Alcohol logged",skippedAzelaic:"Azelaic skipped"}).filter(([k])=>tc[k]).map(([,v])=>v);
    return{matches,total:flareDates.length,factors};
  },[dailyLogs,phase,cycleStart,cycleLength]);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:22}}>
      {/* Header */}

          <div style={{fontSize:13,color:C.muted,marginTop:4}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}</div>
        </div>
        {phase&&<div style={{display:"inline-flex",alignItems:"center",gap:7,background:PHASES[phase.phase].color+"18",border:`1px solid ${PHASES[phase.phase].color}44`,borderRadius:20,padding:"5px 13px",flexShrink:0}}><div style={{width:6,height:6,borderRadius:"50%",background:PHASES[phase.phase].color}} /><span style={{fontSize:11,color:PHASES[phase.phase].color,fontWeight:500}}>{PHASES[phase.phase].label} · Day {phase.day}</span></div>}
      </div>

      {/* Wedding countdowns */}
      <div style={{display:"flex",gap:10}}>
        {[
          {label:"Bridal Shower",date:"2026-06-27",color:C.accent},

          {label:"Nicole & Tyler",date:"2026-09-17",color:C.sage,sub:"Tuscany, Italy"},

      </div>

      {/* Cycle advice — main focus */}
      {pd?(
        <div style={{borderRadius:14,overflow:"hidden",border:`1px solid ${PHASES[phase.phase].color}33`}}>
          {/* Top bar */}
          <div style={{background:PHASES[phase.phase].color+"20",padding:"16px 22px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${PHASES[phase.phase].color}22`}}>
            <div>
              <div style={{...serif,fontSize:22,color:PHASES[phase.phase].color}}>{pd.label} Phase — Day {phase.day}</div>
              <div style={{fontSize:12,color:PHASES[phase.phase].color+"88",marginTop:3}}>{pd.days} of cycle</div>
            </div>
            <div style={{padding:"7px 16px",borderRadius:24,fontWeight:600,fontSize:11,letterSpacing:"0.08em",textTransform:"uppercase",background:mode==="lockin"?C.sage+"22":C.gold+"22",border:`1px solid ${mode==="lockin"?C.sage+"77":C.gold+"77"}`,color:mode==="lockin"?C.sage:C.gold}}>

            </div>

              {pd.avoid.map(e=><div key={e} style={{fontSize:12,color:C.danger,marginBottom:5,display:"flex",gap:6,alignItems:"flex-start"}}><span style={{flexShrink:0,marginTop:1}}>✗</span><span>{e}</span></div>)}
            </div>

              <div style={lbl}>Move</div>

          <div style={{background:C.surface,padding:"12px 22px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            <div>
              <div style={lbl}>Skin</div>
              <div style={{fontSize:12,color:C.muted}}>{pd.skin}</div>
            </div>
            <div style={{padding:"8px 14px",background:PHASES[phase.phase].color+"12",borderRadius:8}}>
              <div style={lbl}>Vyvanse / Adderall</div>

        <div style={{...card,textAlign:"center",padding:32}}>

          <div style={{color:C.muted,fontSize:13}}>Set your cycle start date in the Cycle tab to see today's guidance.</div>
        </div>

      {/* Quick-log widget */}
      <div style={card}>
        <SHead right={<span style={{fontSize:11,color:C.faint}}>auto-saves · full entry in Daily Log</span>}>Quick Log — Today</SHead>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:20}}>
          {[{f:"mood",l:"Mood",c:C.accent,e:"🌙"},{f:"energy",l:"Energy",c:C.sage,e:"✨"},{f:"skinRating",l:"Skin",c:C.gold,e:"💧"}].map(({f,l,c,e})=>(
            <div key={f}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                <span style={lbl}>{e} {l}</span>
                <span style={{...serif,fontSize:22,color:c,lineHeight:1}}>{today[f]||5}<span style={{fontSize:10,color:C.muted}}>/10</span></span>
              </div>
              <input type="range" min={1} max={10} value={today[f]||5} onChange={ev=>quickUpd(f,+ev.target.value)} />
            </div>
          ))}

      </div>

      {/* Vyvanse timing alert */}
      {vyvanseAlert&&(
        <div style={{borderRadius:10,padding:"13px 18px",background:C.danger+"12",border:`1px solid ${C.danger}44`,display:"flex",gap:12,alignItems:"flex-start"}}>
          <span style={{fontSize:18,flexShrink:0}}>⚠️</span>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:C.danger,marginBottom:3}}>Vyvanse taken after 9am — Luteal Phase</div>
            <div style={{fontSize:12,color:C.muted,lineHeight:1.5}}>Heightened stimulant sensitivity this phase. Sleep disruption risk tonight — magnesium bath, strict 10pm screen cutoff, no caffeine after noon.</div>
          </div>

      )}

      {/* Flare predictor */}
      {flareRisk&&(
        <div style={{borderRadius:10,padding:"13px 18px",background:C.accent+"10",border:`1px solid ${C.accent}44`,display:"flex",gap:12,alignItems:"flex-start"}}>
          <span style={{fontSize:18,flexShrink:0}}>🔮</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600,color:C.accent,marginBottom:3}}>Conditions match {flareRisk.matches} of your past flare day{flareRisk.matches!==1?"s":""}</div>

          </div>

      {/* Upcoming beauty */}
      {upcoming.length>0&&(
        <div style={card}>
          <SHead>Upcoming Appointments</SHead>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {upcoming.map(item=>{
              const overdue=item.daysLeft<0;const soon=item.daysLeft<=7&&item.daysLeft>=0;
              const col=overdue?C.danger:soon?C.gold:C.muted;
              const rs=new Date(item.dueDate);rs.setDate(rs.getDate()-3);

              return(
                <div key={item.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 13px",borderRadius:9,background:overdue?C.danger+"08":soon?C.gold+"08":C.surface,border:`1px solid ${overdue?C.danger+"33":soon?C.gold+"33":C.border}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:17}}>{item.icon}</span><span style={{fontSize:13}}>{item.label}</span></div>

      {/* Pinned note */}

      <div style={card}>
        <SHead>Tasks</SHead>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input value={newTask} onChange={e=>setNewTask(e.target.value)} placeholder="Add a task..." onKeyDown={e=>e.key==="Enter"&&addTask()} style={{...inp,flex:1}} />

        {tasks.filter(t=>!t.done).map(task=>(
          <div key={task.id} style={{display:"flex",alignItems:"center",gap:9,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
            <input type="checkbox" onChange={()=>setTasks(tasks.map(t=>t.id===task.id?{...t,done:true}:t))} />
            <span style={{fontSize:13,flex:1}}>{task.text}</span>
            <button onClick={()=>setTasks(tasks.filter(t=>t.id!==task.id))} style={{background:"none",border:"none",color:C.faint,cursor:"pointer",fontSize:17,lineHeight:1}}>×</button>
          </div>
        ))}
        {tasks.filter(t=>t.done).length>0&&(
          <div style={{marginTop:8}}>
            {tasks.filter(t=>t.done).slice(-3).map(t=><div key={t.id} style={{display:"flex",alignItems:"center",gap:9,padding:"4px 0",opacity:0.35}}><input type="checkbox" checked readOnly /><span style={{fontSize:12,textDecoration:"line-through",flex:1}}>{t.text}</span></div>)}
            <button onClick={()=>setTasks(tasks.filter(t=>!t.done))} style={{fontSize:11,color:C.faint,background:"none",border:"none",cursor:"pointer",marginTop:5}}>Clear {tasks.filter(t=>t.done).length} completed</button>
          </div>
        )}
      </div>
    </div>
  );
}

// DAILY LOG
// ═══════════════════════════════════════════════════════════════════════════════
function DailyLog({logs,setLogs,allHabits,cycleStart,cycleLength}){
  const [date,setDate]=useState(todayStr());
  const [sheetsUrl,setSheetsUrl]=useLS("nm_sheets_url","");
  const [syncing,setSyncing]=useState(false);
  const [syncMsg,setSyncMsg]=useState("");
  const [syncOk,setSyncOk]=useState(null);
  const [prefillMsg,setPrefillMsg]=useState("");
  const log=logs[date]||{};
  const upd=(f,v)=>setLogs({...logs,[date]:{...(logs[date]||{}),[f]:v}});
  const updArr=(f,item,checked)=>{const list=log[f]||[];upd(f,checked?[...list,item]:list.filter(x=>x!==item));};
  const updSkin=(p,tod,checked)=>{const c=log.skincare||{};const l=c[tod]||[];upd("skincare",{...c,[tod]:checked?[...l,p]:l.filter(x=>x!==p)});};
  const cycleSymptom=sym=>{const c=(log.symptoms||{})[sym]??null;const next=SEV_CYCLE[(SEV_CYCLE.indexOf(c)+1)%SEV_CYCLE.length];const s={...(log.symptoms||{})};if(next===null)delete s[sym];else s[sym]=next;upd("symptoms",s);};
  const sl=sleepDuration(log.bedtime,log.wakeTime);
  const handleSync=async()=>{setSyncing(true);setSyncMsg("");const r=await syncToSheets(log,date,sheetsUrl,cycleStart,cycleLength);setSyncing(false);setSyncOk(r.ok);setSyncMsg(r.msg);setTimeout(()=>setSyncMsg(""),5000);};

    if(log.breakfast||log.lunch||log.dinner||log.snacks){body+=section("Food",[["Breakfast",log.breakfast],["Lunch",log.lunch],["Dinner",log.dinner],["Snacks",log.snacks]].filter(([,v])=>v).map(([l,v])=>row(l,v)).join("")+(log.foodTagsDay?.length?`<div style="margin-top:6px">${(log.foodTagsDay||[]).map(pill).join("")}</div>`:""));}
    if(Object.keys(log.symptoms||{}).length){body+=section("Symptoms",Object.entries(log.symptoms||{}).map(([s,v])=>pill(s+" ("+v+")")).join(""));}

// Compress image to max 900px / JPEG 72% before storing
function compressImage(file){
  return new Promise(res=>{
    const fr=new FileReader();
    fr.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=900;let w=img.width,h=img.height;
        if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
        const cv=document.createElement("canvas");cv.width=w;cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        res(cv.toDataURL("image/jpeg",0.72));
      };
      img.src=e.target.result;
    };
    fr.readAsDataURL(file);
  });
}

function SkinTab({logs,setLogs,cycleStart,cycleLength}){
  const [date,setDate]=useState(todayStr());
  const [compareA,setCompareA]=useState("");
  const [compareB,setCompareB]=useState("");
  const [compareMode,setCompareMode]=useState(false);
  const [expanded,setExpanded]=useState(null);
  const [openMonths,setOpenMonths]=useState({});
  const [photoError,setPhotoError]=useState("");
  const log=logs[date]||{};
  const upd=(f,v)=>setLogs({...logs,[date]:{...(logs[date]||{}),[f]:v}});
  const fileRefLeft=useRef();
  const fileRefFront=useRef();
  const fileRefRight=useRef();
  const concerns=["Rosacea flare","Breakout","Dryness","Oiliness","Sensitivity","Texture","Dullness","Redness","Puffiness","Good skin day"];
  const handlePhotoUpload=async(field,file)=>{
    setPhotoError("");
    const compressed=await compressImage(file);
    try{localStorage.setItem("__sztest__",compressed);localStorage.removeItem("__sztest__");}
    catch{setPhotoError("Storage full — browser has no space left. Export a backup (⊙ Sync) to free space, then try again.");return;}
    upd(field,compressed);
  };
  const mkPhotoSlot=(field,ref,label,legacyField=null)=>{
    const src=log[field]||(legacyField?log[legacyField]:null);
    const clearField=e=>{e.stopPropagation();if(log[field])upd(field,null);else if(legacyField&&log[legacyField])upd(legacyField,null);};

        <div style={{position:"relative",flex:1}}>
          {src
            ?<img src={src} alt={label} style={{width:"100%",aspectRatio:"3/4",objectFit:"cover",display:"block"}} />

      </div>

  // Cycle-phase diff: find photo from same cycle day ~1 cycle ago
  const cyclePhaseMatch=useMemo(()=>{
    if(!cycleStart||!cycleLength)return null;
    const phase=getCyclePhase(cycleStart,cycleLength);
    if(!phase)return null;
    // Target: same cycle day but in the previous cycle (approx cycleLength days ago)
    const prevCycleOffset=cycleLength;
    const prevDate=new Date(todayStr()+"T12:00:00");
    prevDate.setDate(prevDate.getDate()-prevCycleOffset);
    // Search ±4 days around that date for a photo
    for(let offset=-4;offset<=4;offset++){
      const d=new Date(prevDate);d.setDate(d.getDate()+offset);
      const k=d.toISOString().split("T")[0];
      if(logs[k]?.skinPhoto||logs[k]?.skinPhotoFront){
        const el=Math.floor((new Date(k)-new Date(cycleStart))/86400000);
        const cd=(el%cycleLength)+1;
        return{date:k,photo:logs[k].skinPhotoFront||logs[k].skinPhoto,rating:logs[k].skinRating,cycleDay:cd,concerns:logs[k].skinConcerns||[]};
      }
    }
    return null;
  },[logs,cycleStart,cycleLength]);

  const photos=useMemo(()=>
    Object.entries(logs)
      .filter(([,v])=>v&&(v.skinPhoto||v.skinPhotoFront||v.skinPhotoLeft||v.skinPhotoRight))
      .map(([d,v])=>({date:d,photo:v.skinPhotoFront||v.skinPhoto,photoLeft:v.skinPhotoLeft,photoRight:v.skinPhotoRight,rating:v.skinRating,concerns:v.skinConcerns||[]}))
      .sort((a,b)=>new Date(b.date)-new Date(a.date))
  ,[logs]);

  // Group by YYYY-MM
  const byMonth=useMemo(()=>{
    const groups={};
    photos.forEach(p=>{const ym=p.date.slice(0,7);if(!groups[ym])groups[ym]=[];groups[ym].push(p);});
    return groups;
  },[photos]);

  const getP=d=>photos.find(p=>p.date===d);

  const toggleMonth=ym=>setOpenMonths(prev=>({...prev,[ym]:!prev[ym]}));

  const history=Array.from({length:21},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(20-i));const k=d.toISOString().split("T")[0];return{k,rating:logs[k]?.skinRating,label:d.getDate()};}).filter(x=>x.rating);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <PTitle>Skin</PTitle>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...inp,width:"auto"}} />
          <button onClick={()=>setCompareMode(!compareMode)} style={{padding:"7px 13px",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:500,background:compareMode?C.accent+"22":"transparent",border:`1px solid ${compareMode?C.accent:C.border}`,color:compareMode?C.accent:C.muted,whiteSpace:"nowrap"}}>⊞ Compare</button>
        </div>
      </div>

      {/* Date warning */}
      {date!==todayStr()&&(
        <div style={{padding:"9px 14px",background:C.gold+"15",border:`1px solid ${C.gold}33`,borderRadius:8,fontSize:12,color:C.gold,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>Viewing <strong>{date}</strong> — photos you upload here will save to this date, not today.</span>
          <button onClick={()=>setDate(todayStr())} style={{background:"none",border:`1px solid ${C.gold}55`,borderRadius:6,color:C.gold,cursor:"pointer",fontSize:11,padding:"3px 9px",flexShrink:0,marginLeft:10}}>Go to today</button>
        </div>
      )}

      {/* Storage / upload error */}
      {photoError&&(
        <div style={{padding:"9px 14px",background:C.danger+"12",border:`1px solid ${C.danger}33`,borderRadius:8,fontSize:12,color:C.danger}}>{photoError}</div>
      )}

      {/* Photos — left / front / right */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
        {mkPhotoSlot("skinPhotoLeft",fileRefLeft,"← Left")}
        {mkPhotoSlot("skinPhotoFront",fileRefFront,"Front","skinPhoto")}
        {mkPhotoSlot("skinPhotoRight",fileRefRight,"Right →")}
      </div>

      {/* Rating + observations */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <div style={card}>
          <div style={lbl}>Skin Rating</div>
          <div style={{display:"flex",alignItems:"center",gap:10}}><input type="range" min={1} max={10} value={log.skinRating||5} onChange={e=>upd("skinRating",+e.target.value)} /><span style={{...serif,fontSize:28,color:C.accent,minWidth:36}}>{log.skinRating||5}</span></div>
        </div>
        <div style={card}>
          <label style={lbl}>Observations</label>
          <textarea rows={4} value={log.skinObs||""} onChange={e=>upd("skinObs",e.target.value)} placeholder={"Redness areas\nBreakout location\nTexture + tone\nGlow or dullness"} style={{...inp,resize:"none"}} />
        </div>
      </div>

      {/* Concerns */}
      <div style={card}>
        <SHead>Concern Flags</SHead>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {concerns.map(c=>{const active=(log.skinConcerns||[]).includes(c);const col=c==="Good skin day"?C.sage:C.accent;return(<button key={c} onClick={()=>{const l=log.skinConcerns||[];upd("skinConcerns",active?l.filter(x=>x!==c):[...l,c]);}} style={{padding:"4px 12px",borderRadius:18,fontSize:11,cursor:"pointer",background:active?col+"22":"transparent",border:`1px solid ${active?col+"88":C.border}`,color:active?col:C.muted,fontWeight:active?500:400}}>{c}</button>);})}
        </div>
      </div>

      {/* 21-day trend */}
      {history.length>1&&(
        <div style={card}>
          <SHead>21-Day Trend</SHead>
          <div style={{display:"flex",alignItems:"flex-end",gap:4,height:70}}>
            {history.map((d,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><div style={{width:"100%",borderRadius:"2px 2px 0 0",minHeight:3,height:((d.rating/10)*58)+"px",background:d.rating>=8?C.sage+"99":d.rating>=5?C.gold+"99":C.accent+"99"}} title={d.k+": "+d.rating+"/10"} /><div style={{fontSize:9,color:C.faint}}>{d.label}</div></div>)}
          </div>
        </div>
      )}

      {/* Cycle-phase diff: same cycle day, previous cycle */}
      {cyclePhaseMatch&&(
        <div style={card}>
          <SHead right={<span style={{fontSize:11,color:C.faint}}>same phase · previous cycle</span>}>Cycle Phase Compare</SHead>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div>
              <div style={{...lbl,marginBottom:8}}>Today · Day {getCyclePhase(cycleStart,cycleLength)?.day}</div>
              {(log.skinPhotoFront||log.skinPhoto)?<img src={log.skinPhotoFront||log.skinPhoto} alt="today" style={{width:"100%",aspectRatio:"1",objectFit:"cover",borderRadius:9}} />:<div style={{aspectRatio:"1",background:C.surface,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",color:C.faint,fontSize:12}}>No photo today</div>}
              {log.skinRating&&<div style={{...serif,fontSize:20,color:C.accent,marginTop:6}}>{log.skinRating}<span style={{fontSize:11,color:C.muted}}>/10</span></div>}
              {(log.skinConcerns||[]).length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:4}}>{(log.skinConcerns||[]).map(c=><span key={c} style={{fontSize:10,padding:"2px 7px",borderRadius:8,background:C.accent+"18",color:C.accent}}>{c}</span>)}</div>}
            </div>
            <div>
              <div style={{...lbl,marginBottom:8}}>{cyclePhaseMatch.date} · Day {cyclePhaseMatch.cycleDay}</div>
              <img src={cyclePhaseMatch.photo} alt={cyclePhaseMatch.date} style={{width:"100%",aspectRatio:"1",objectFit:"cover",borderRadius:9}} />
              {cyclePhaseMatch.rating&&<div style={{...serif,fontSize:20,color:C.accent,marginTop:6}}>{cyclePhaseMatch.rating}<span style={{fontSize:11,color:C.muted}}>/10</span></div>}
              {cyclePhaseMatch.concerns.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:4}}>{cyclePhaseMatch.concerns.map(c=><span key={c} style={{fontSize:10,padding:"2px 7px",borderRadius:8,background:C.accent+"18",color:C.accent}}>{c}</span>)}</div>}
            </div>
          </div>
          <div style={{fontSize:11,color:C.faint,marginTop:10}}>Comparing like-for-like cycle days across months to isolate hormonal skin patterns.</div>
        </div>
      )}

      {/* Compare mode */}
      {compareMode&&photos.length>=2&&(
        <div style={card}>
          <SHead>Side-by-Side Compare</SHead>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            {[{d:compareA,setD:setCompareA,label:"Photo A"},{d:compareB,setD:setCompareB,label:"Photo B"}].map(({d,setD,label})=>{
              const p=d?getP(d):null;
              return(<div key={label}><div style={{marginBottom:8}}><label style={lbl}>{label}</label><select value={d} onChange={e=>setD(e.target.value)} style={inp}><option value="">Select date</option>{photos.map(p=><option key={p.date} value={p.date}>{p.date}</option>)}</select></div>{p?<div><img src={p.photo} alt="" style={{width:"100%",aspectRatio:"1",objectFit:"cover",borderRadius:9}} /><div style={{display:"flex",justifyContent:"space-between",marginTop:6}}><span style={{fontSize:11,color:C.muted}}>{p.date}</span>{p.rating&&<span style={{...serif,fontSize:16,color:C.accent}}>{p.rating}/10</span>}</div></div>:<div style={{aspectRatio:"1",background:C.surface,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",color:C.faint,fontSize:12}}>Select a date</div>}</div>);
            })}
          </div>
        </div>
      )}

      {/* Gallery by month */}
      {photos.length>0&&(
        <div>
          <div style={{...serif,fontSize:20,color:C.white,marginBottom:14}}>Photo History</div>
          {Object.entries(byMonth).map(([ym,monthPhotos])=>{
            const isOpen=openMonths[ym]!==false; // default open
            const [y,m]=ym.split("-");
            const monthName=new Date(+y,+m-1,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});
            return(
              <div key={ym} style={{marginBottom:10,borderRadius:12,overflow:"hidden",border:`1px solid ${C.border}`}}>
                <button onClick={()=>toggleMonth(ym)} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",background:C.card,border:"none",cursor:"pointer",color:C.text}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{...serif,fontSize:16,color:C.white}}>{monthName}</span><span style={{fontSize:11,color:C.muted}}>{monthPhotos.length} photo{monthPhotos.length!==1?"s":""}</span></div>
                  <span style={{fontSize:14,color:C.muted}}>{isOpen?"▾":"▸"}</span>
                </button>
                {isOpen&&(
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,padding:"6px 10px 10px"}}>
                    {monthPhotos.map(p=>(
                      <div key={p.date} onClick={()=>setExpanded(p)} style={{cursor:"pointer",borderRadius:8,overflow:"hidden",background:C.surface,border:`1px solid ${C.border}`}}>
                        <img src={p.photo} alt={p.date} style={{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block"}} />
                        <div style={{padding:"5px 7px"}}>
                          <div style={{fontSize:10,color:C.muted}}>{p.date.slice(5)}</div>
                          {p.rating&&<div style={{...serif,fontSize:13,color:p.rating>=8?C.sage:p.rating>=5?C.gold:C.accent}}>{p.rating}</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {expanded&&(
        <Modal onClose={()=>setExpanded(null)}>
          <div style={{...card,padding:0,overflow:"hidden"}}>
            {(()=>{const slots=[{src:expanded.photoLeft,label:"← Left"},{src:expanded.photo,label:"Front"},{src:expanded.photoRight,label:"Right →"}].filter(p=>p.src);return slots.length>0&&(<div style={{display:"grid",gridTemplateColumns:`repeat(${slots.length},1fr)`,gap:2}}>{slots.map(p=>(<div key={p.label} style={{position:"relative"}}><img src={p.src} alt={p.label} style={{width:"100%",aspectRatio:"3/4",objectFit:"cover",display:"block"}} /><div style={{position:"absolute",bottom:0,left:0,right:0,textAlign:"center",fontSize:9,color:"#ffffffbb",padding:"5px",background:"linear-gradient(transparent,#00000055)"}}>{p.label}</div></div>))}</div>);})()}
            <div style={{padding:"14px 18px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{...serif,fontSize:18,color:C.white}}>{expanded.date}</div>{expanded.rating&&<div style={{...serif,fontSize:26,color:C.accent}}>{expanded.rating}/10</div>}</div>
              {expanded.concerns.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:8}}>{expanded.concerns.map(c=><span key={c} style={{fontSize:11,padding:"2px 9px",borderRadius:10,background:C.accent+"18",color:C.accent}}>{c}</span>)}</div>}
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// HAIR & BEAUTY (combined)
// ═══════════════════════════════════════════════════════════════════════════════
function HairBeautyTab({dailyLogs,beautyLogs,setBeautyLogs,intervals,setIntervals}){
  const [washLogs,setWashLogs]=useLS("nm_hair",[]);
  const [form,setForm]=useState({date:todayStr(),method:"air dry",conditioner:"regular",products:[],notes:""});
  const [histOpen,setHistOpen]=useState(false);
  const hairProds=["Olaplex No.3","Olaplex No.4","Olaplex No.5","K18 Mask","Heat Protectant","Dry Shampoo","Hair Oil","Scalp Serum","Leave-in Conditioner","No products"];
  const sorted=[...washLogs].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const last=sorted[sorted.length-1];
  const daysSince=last?Math.round((new Date()-new Date(last.date+"T12:00:00"))/86400000):null;

  // Month calendar — show current month with wash days highlighted
  const now=new Date();
  const yr=now.getFullYear(), mo=now.getMonth();
  const firstDay=new Date(yr,mo,1).getDay(); // 0=Sun
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const monthName=now.toLocaleDateString("en-US",{month:"long",year:"numeric"});

  // Build set of wash dates for this month
  const washDates={};
  washLogs.forEach(w=>{
    const d=new Date(w.date+"T12:00:00");
    if(d.getFullYear()===yr&&d.getMonth()===mo){
      washDates[d.getDate()]={method:w.method,conditioner:w.conditioner||"regular"};
    }
  });
  // Also check daily logs for hairWash
  Object.entries(dailyLogs).forEach(([ds,v])=>{
    if(v&&v.hairWash&&v.hairWash!=="no"){
      const d=new Date(ds+"T12:00:00");
      if(d.getFullYear()===yr&&d.getMonth()===mo){
        if(!washDates[d.getDate()]) washDates[d.getDate()]={method:"",conditioner:v.hairWash};
      }
    }
  });

  return(
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      <PTitle>Hair & Beauty</PTitle>

      {/* Month calendar */}
      <div style={card}>
        <SHead right={<div style={{display:"flex",gap:12}}><div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.muted}}><div style={{width:10,height:10,borderRadius:2,background:C.gold+"99"}} />conditioner</div><div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.muted}}><div style={{width:10,height:10,borderRadius:2,background:C.accent+"99"}} />mask</div></div>}>{monthName}</SHead>
        {daysSince!==null&&<div style={{marginBottom:14,padding:"9px 13px",background:C.surface,borderRadius:8,display:"flex",gap:16,alignItems:"center"}}><div><div style={lbl}>Days since wash</div><div style={{...serif,fontSize:28,color:C.gold,lineHeight:1}}>{daysSince}</div></div>{last&&<div style={{fontSize:12,color:C.muted}}>{last.date} · {last.method}{last.conditioner&&last.conditioner!=="none"?" · "+last.conditioner:""}</div>}</div>}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:5}}>
          {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=><div key={d} style={{textAlign:"center",fontSize:9,color:C.faint,padding:"3px 0"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
          {Array.from({length:firstDay},(_,i)=><div key={"e"+i} />)}
          {Array.from({length:daysInMonth},(_,i)=>{
            const day=i+1;const wd=washDates[day];const isToday=day===now.getDate();
            const bg=wd?wd.conditioner==="mask"?C.accent+"BB":C.gold+"BB":C.border;
            return(
              <div key={day} style={{aspectRatio:"1",borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",background:bg,border:isToday?`1px solid ${C.white}33`:"1px solid transparent",fontSize:10,color:wd?"#0A0908":C.faint,fontWeight:wd?600:400}}>
                {day}
              </div>
            );
          })}
        </div>
      </div>

      {/* Log a wash */}
      <div style={card}>
        <SHead>Log a Wash</SHead>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
          <div><label style={lbl}>Date</label><input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} style={inp} /></div>
          <div><label style={lbl}>Drying Method</label><select value={form.method} onChange={e=>setForm({...form,method:e.target.value})} style={inp}><option value="air dry">Air Dry</option><option value="rough dry">Rough Dry</option><option value="blow out">Blow Out</option></select></div>
          <div><label style={lbl}>Treatment</label><select value={form.conditioner} onChange={e=>setForm({...form,conditioner:e.target.value})} style={inp}><option value="regular">Regular conditioner</option><option value="mask">Hair mask</option><option value="none">Neither</option></select></div>
        </div>
        <div style={{marginBottom:12}}>
          <label style={lbl}>Products</label>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>{hairProds.map(p=><Check key={p} label={p} color={C.gold} checked={form.products.includes(p)} onChange={e=>setForm({...form,products:e.target.checked?[...form.products,p]:form.products.filter(x=>x!==p)})} />)}</div>
        </div>
        <div style={{marginBottom:12}}><label style={lbl}>Notes</label><input value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="How did it look / feel after?" style={inp} /></div>
        <button onClick={()=>{setWashLogs([...washLogs,{...form,id:Date.now()}]);setForm({date:todayStr(),method:"air dry",conditioner:"regular",products:[],notes:""});}} style={{padding:"9px 18px",borderRadius:8,background:C.accent,color:"#0A0908",border:"none",cursor:"pointer",fontSize:13,fontWeight:500}}>Log Wash</button>
      </div>

      {/* Wash history toggle */}
      {sorted.length>0&&(
        <div style={card}>
          <button onClick={()=>setHistOpen(!histOpen)} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",background:"none",border:"none",cursor:"pointer",color:C.text,marginBottom:histOpen?12:0}}>
            <div style={{...serif,fontSize:17}}>Wash History</div>
            <span style={{fontSize:13,color:C.muted}}>{histOpen?"▾":"▸"} {sorted.length} sessions</span>
          </button>
          {histOpen&&[...sorted].reverse().slice(0,20).map((w,i)=>(
            <div key={w.id||i} style={{padding:"9px 0",borderBottom:`1px solid ${C.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontSize:13,fontWeight:500}}>{w.date}</span><span style={{fontSize:12,color:C.muted}}>{w.method}{w.conditioner&&w.conditioner!=="none"?" · "+w.conditioner:""}</span></div>
              {w.products?.length>0&&<div style={{fontSize:11,color:C.muted}}>{w.products.join(" · ")}</div>}
              {w.notes&&<div style={{fontSize:11,color:C.muted,marginTop:1}}>{w.notes}</div>}
            </div>
          ))}
        </div>
      )}

      <Divider />

      {/* Beauty appointments */}
      <div style={{...serif,fontSize:20,color:C.white,marginBottom:4}}>Beauty Schedule</div>
      {BEAUTY_ITEMS.map(item=>{
        const last=beautyLogs[item.id];
        const interval=intervals[item.id]||item.interval;
        const dueDate=last?new Date(new Date(last+"T12:00:00").getTime()+interval*86400000):null;
        const daysLeft=dueDate?Math.ceil((dueDate-new Date())/86400000):null;
        const status=daysLeft===null?"unset":daysLeft<0?"overdue":daysLeft<=5?"soon":"ok";
        const sc={overdue:C.danger,soon:C.gold,ok:C.sage,unset:C.border}[status];
        const pct=last&&dueDate&&interval>0?Math.min(100,Math.max(0,((interval-Math.max(0,daysLeft))/interval)*100)):0;
        return(
          <div key={item.id} style={{...card,borderLeft:`3px solid ${sc}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:dueDate?8:12}}>
              <div style={{display:"flex",alignItems:"center",gap:9}}><span style={{fontSize:18}}>{item.icon}</span><div><div style={{fontSize:14,fontWeight:500}}>{item.label}</div>{dueDate&&<div style={{fontSize:11,color:sc,marginTop:2}}>{status==="overdue"?Math.abs(daysLeft)+"d overdue":status==="soon"?"Due in "+daysLeft+"d — book now":"Next: "+dueDate.toLocaleDateString("en-US",{month:"long",day:"numeric"})}</div>}</div></div>
              {daysLeft!==null&&<div style={{textAlign:"right"}}><div style={{...serif,fontSize:32,color:sc,lineHeight:1}}>{Math.abs(daysLeft)}</div><div style={{fontSize:9,color:C.muted}}>{daysLeft<0?"days over":"days left"}</div></div>}
            </div>
            {last&&<div style={{height:3,background:C.border,borderRadius:2,marginBottom:12,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:sc}} /></div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:9}}>
              <div><label style={lbl}>Last Done</label><input type="date" value={last||""} onChange={e=>setBeautyLogs({...beautyLogs,[item.id]:e.target.value})} style={inp} /></div>
              <div><label style={lbl}>Every (days)</label><input type="number" value={interval} onChange={e=>setIntervals({...intervals,[item.id]:+e.target.value})} style={inp} /></div>
              <div><label style={lbl}>Provider</label><input value={beautyLogs[item.id+"_prov"]||""} onChange={e=>setBeautyLogs({...beautyLogs,[item.id+"_prov"]:e.target.value})} placeholder="Name / location" style={inp} /></div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// CYCLE + BODY (combined)
// ═══════════════════════════════════════════════════════════════════════════════
function CycleTab({dailyLogs}){
  const [cycleStart,setCycleStart]=useLS("nm_cycle_start","");
  const [cycleLength,setCycleLength]=useLS("nm_cycle_length",28);
  const phase=getCyclePhase(cycleStart,cycleLength);
  const pd=phase?PHASES[phase.phase]:null;
  const daysLeft=phase?(phase.phase==="menstrual"?5-phase.day:phase.phase==="follicular"?13-phase.day:phase.phase==="ovulatory"?16-phase.day:cycleLength-phase.day):null;
  const phaseMap=[{p:"menstrual",days:5},{p:"follicular",days:8},{p:"ovulatory",days:3},{p:"luteal",days:cycleLength-16}];

  // Sleep x mood correlation from daily logs
  const corrData=Object.keys(dailyLogs).sort().slice(-12).map(k=>{
    const v=dailyLogs[k];
    return{label:new Date(k+"T12:00:00").toLocaleDateString("en-US",{month:"numeric",day:"numeric"}),values:{sleep:v?.ouraSleep?Math.round(v.ouraSleep/10):null,mood:v?.mood||null}};
  }).filter(d=>d.values.sleep||d.values.mood);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      <PTitle sub="Cycle intelligence + body correlations">Cycle</PTitle>

      <div style={card}>
        <SHead>Setup</SHead>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><label style={lbl}>Last Period Start Date</label><input type="date" value={cycleStart} onChange={e=>setCycleStart(e.target.value)} style={inp} /></div>
          <div><label style={lbl}>Average Cycle Length</label><input type="number" value={cycleLength} onChange={e=>setCycleLength(+e.target.value)} min={21} max={40} style={inp} /></div>
        </div>
      </div>

      {!cycleStart&&<div style={{...card,textAlign:"center",padding:40}}><div style={{fontSize:30,marginBottom:10}}>🌙</div><div style={{color:C.muted}}>Enter your last period start date above.</div></div>}

      {phase&&pd&&(
        <>
          <div style={{...card,borderLeft:`3px solid ${PHASES[phase.phase].color}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
              <div><h2 style={{...serif,fontSize:24,fontWeight:400,color:PHASES[phase.phase].color,margin:0}}>{pd.label} Phase</h2><div style={{fontSize:12,color:C.muted,marginTop:4}}>Day {phase.day} · ~{Math.max(0,daysLeft)} days to next phase</div></div>
              <div style={{textAlign:"right"}}><div style={{...serif,fontSize:40,fontWeight:300,color:PHASES[phase.phase].color,lineHeight:1}}>{phase.day}</div><div style={{fontSize:10,color:C.muted}}>of {cycleLength}</div></div>
            </div>
            <div style={{height:5,background:C.border,borderRadius:3,marginBottom:18,overflow:"hidden"}}><div style={{height:"100%",width:((phase.day/cycleLength)*100)+"%",background:PHASES[phase.phase].color,borderRadius:3}} /></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:14}}>
              <div><div style={lbl}>Eat</div>{pd.eat.map(e=><div key={e} style={{fontSize:12,color:C.sage,marginBottom:5}}>✓ {e}</div>)}</div>
              <div><div style={lbl}>Avoid</div>{pd.avoid.map(e=><div key={e} style={{fontSize:12,color:C.danger,marginBottom:5}}>✗ {e}</div>)}</div>
            </div>
            <Divider />
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
              <div><div style={lbl}>Movement</div><div style={{fontSize:12,lineHeight:1.5}}>{pd.move}</div></div>
              <div><div style={lbl}>Self Care</div><div style={{fontSize:12,lineHeight:1.5}}>{pd.selfcare}</div></div>
            </div>
            <div style={{padding:"11px 14px",background:PHASES[phase.phase].color+"15",borderRadius:9,marginBottom:10}}>
              <div style={lbl}>Vyvanse / Adderall</div>
              <div style={{fontSize:12,lineHeight:1.6,color:phase.phase==="luteal"?C.danger:C.text}}>{pd.vyvanse}</div>
            </div>
            <div style={{padding:"9px 13px",background:C.surface,borderRadius:8}}><div style={lbl}>Expected this phase</div><div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:4}}>{pd.expectedSymptoms.map(s=><span key={s} style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:PHASES[phase.phase].color+"15",color:PHASES[phase.phase].color+"CC"}}>{s}</span>)}</div></div>
          </div>

          {/* Nutrition deep dive */}
          <div style={card}>
            <SHead>Nutrition — Why it Matters Now</SHead>
            {pd.nutrition.map((t,i)=>(
              <div key={i} style={{padding:"10px 0",borderBottom:i<pd.nutrition.length-1?`1px solid ${C.border}`:"none"}}>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}><span style={{fontSize:12,fontWeight:600,color:C.sage}}>{t.food}</span><span style={{fontSize:10,padding:"1px 7px",borderRadius:7,background:C.sage+"18",color:C.sage}}>{t.nutrient}</span></div>
                <div style={{fontSize:11,color:C.muted,lineHeight:1.5}}>{t.reason}</div>
              </div>
            ))}
          </div>

          {/* Cycle map */}
          <div style={card}>
            <SHead>Cycle Map</SHead>
            <div style={{display:"flex",borderRadius:9,overflow:"hidden",height:40}}>
              {phaseMap.map(({p,days})=><div key={p} style={{flex:days,display:"flex",alignItems:"center",justifyContent:"center",background:PHASES[p].color+(phase.phase===p?"CC":"28"),fontSize:10,letterSpacing:"0.04em",color:phase.phase===p?"#0A0908":PHASES[p].color,fontWeight:phase.phase===p?600:400}}>{PHASES[p].label.slice(0,3).toUpperCase()}</div>)}
            </div>
            <div style={{display:"flex",marginTop:5}}>{phaseMap.map(({p,days})=><div key={p} style={{flex:days,textAlign:"center",fontSize:9,color:C.faint}}>{days}d</div>)}</div>
          </div>
        </>
      )}

      {/* Sleep × mood correlation */}
      {corrData.length>=3&&(
        <div style={card}>
          <SHead>Sleep Score × Mood</SHead>
          <div style={{fontSize:11,color:C.muted,marginBottom:14}}>Sleep score (÷10) vs mood rating — last 12 entries</div>
          <MiniChart data={corrData} colors={{sleep:C.sage,mood:C.accent}} height={80} />
          <div style={{display:"flex",gap:14,marginTop:10}}>
            <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.muted}}><div style={{width:9,height:9,borderRadius:2,background:C.sage+"88"}} />Sleep</div>
            <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.muted}}><div style={{width:9,height:9,borderRadius:2,background:C.accent+"88"}} />Mood</div>
          </div>
        </div>
      )}
    </div>
  );
}

// HABITS
// ═══════════════════════════════════════════════════════════════════════════════
function HabitsTab({logs,setLogs,customHabits,setCustomHabits}){
  const [newLabel,setNewLabel]=useState("");
  const [newEmoji,setNewEmoji]=useState("⭐");
  const today=todayStr();
  const allHabits=[...DEFAULT_HABITS,...customHabits];
  const last28=Array.from({length:28},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(27-i));return d.toISOString().split("T")[0];});
  const togHabit=(hid,date)=>{const log=logs[date]||{};const habits=log.habits||[];const has=habits.includes(hid);setLogs({...logs,[date]:{...log,habits:has?habits.filter(h=>h!==hid):[...habits,hid]}});};
  const addHabit=()=>{if(!newLabel.trim())return;setCustomHabits([...customHabits,{id:"c_"+Date.now(),label:newLabel.trim(),emoji:newEmoji}]);setNewLabel("");setNewEmoji("⭐");};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      <PTitle sub="Streaks and 28-day history">Habits</PTitle>
      <div style={card}>
        <SHead>Today — {today}</SHead>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>{allHabits.map(h=><Check key={h.id} label={h.emoji+" "+h.label} color={C.sage} checked={(logs[today]?.habits||[]).includes(h.id)} onChange={()=>togHabit(h.id,today)} />)}</div>
      </div>
      <div style={card}>
        <SHead>Streaks</SHead>
        {allHabits.map(h=>{const streak=getStreak(h.id,logs);const longest=getLongest(h.id,logs);const pct=longest>0?(streak/longest)*100:0;return(<div key={h.id} style={{padding:"11px 0",borderBottom:`1px solid ${C.border}`}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:15}}>{h.emoji}</span><span style={{fontSize:13}}>{h.label}</span></div><div style={{display:"flex",gap:14,alignItems:"center"}}><div style={{textAlign:"center"}}><div style={{...serif,fontSize:20,color:streak>=7?C.sage:streak>=3?C.gold:C.muted,lineHeight:1}}>{streak}</div><div style={{fontSize:9,color:C.faint}}>current</div></div><div style={{textAlign:"center"}}><div style={{...serif,fontSize:20,color:C.muted,lineHeight:1}}>{longest}</div><div style={{fontSize:9,color:C.faint}}>best</div></div></div></div><div style={{height:3,background:C.border,borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:streak>=7?C.sage:C.gold}} /></div></div>);})}
      </div>
      <div style={card}>
        <SHead>28-Day History</SHead>
        <div style={{overflowX:"auto"}}><div style={{minWidth:520}}>
          <div style={{display:"flex",marginBottom:4,paddingLeft:148}}>{last28.map((d,i)=><div key={d} style={{flex:1,textAlign:"center",fontSize:8,color:C.faint}}>{i%4===0?new Date(d+"T12:00:00").getDate():""}</div>)}</div>
          {allHabits.map(h=>(
            <div key={h.id} style={{display:"flex",alignItems:"center",marginBottom:5}}>
              <div style={{width:145,fontSize:11,color:C.muted,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",paddingRight:8}}>{h.emoji} {h.label}</div>
              <div style={{display:"flex",gap:2,flex:1}}>
                {last28.map(d=>{const done=(logs[d]?.habits||[]).includes(h.id);return(<div key={d} title={d} onClick={()=>togHabit(h.id,d)} style={{flex:1,aspectRatio:"1",borderRadius:3,cursor:"pointer",background:done?C.sage+"BB":C.border,border:d===today?`1px solid ${C.sage}`:"1px solid transparent",transition:"all 0.1s"}} />);})}
              </div>
            </div>
          ))}
        </div></div>
      </div>
      <div style={card}>
        <SHead>Add Custom Habit</SHead>
        <div style={{display:"flex",gap:8}}>
          <input value={newEmoji} onChange={e=>setNewEmoji(e.target.value)} placeholder="🌿" style={{...inp,width:55}} />
          <input value={newLabel} onChange={e=>setNewLabel(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addHabit()} placeholder="e.g. 10-min walk, no alcohol..." style={{...inp,flex:1}} />
          <button onClick={addHabit} style={{padding:"9px 16px",borderRadius:8,background:C.accent,color:"#0A0908",border:"none",cursor:"pointer",fontSize:13,fontWeight:500,whiteSpace:"nowrap"}}>+ Add</button>
        </div>
        {customHabits.length>0&&<div style={{marginTop:12}}>{customHabits.map(h=><div key={h.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${C.border}`}}><span style={{fontSize:13}}>{h.emoji} {h.label}</span><button onClick={()=>setCustomHabits(customHabits.filter(c=>c.id!==h.id))} style={{background:"none",border:"none",color:C.faint,cursor:"pointer",fontSize:16}}>×</button></div>)}</div>}
      </div>
    </div>
  );
}

// SPEND
// ═══════════════════════════════════════════════════════════════════════════════
function SpendTab({logs}){
  const [view,setView]=useState("month");
  const allSpend=useMemo(()=>{
    const entries=[];
    Object.entries(logs).forEach(([date,v])=>{
      if(!v)return;
      if(v.spendItems&&v.spendItems.length>0)v.spendItems.forEach(item=>entries.push({date,amount:item.amount,category:item.category||"Other",note:item.note||"",returnLikely:item.returnLikely||false}));
      else if(v.spend&&parseFloat(v.spend)>0)entries.push({date,amount:parseFloat(v.spend),category:v.spendCategory||"Other",note:v.spendNote||"",returnLikely:false});
    });
    return entries.sort((a,b)=>new Date(b.date)-new Date(a.date));
  },[logs]);
  const now=new Date();
  const thisMonth=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  const thisWeekStart=weekStart(todayStr());
  const net=allSpend.filter(s=>!s.returnLikely);
  const monthTotal=net.filter(s=>s.date.startsWith(thisMonth)).reduce((sum,s)=>sum+s.amount,0);
  const weekTotal=net.filter(s=>s.date>=thisWeekStart).reduce((sum,s)=>sum+s.amount,0);
  const todayTotal=net.filter(s=>s.date===todayStr()).reduce((sum,s)=>sum+s.amount,0);
  const pendingRet=allSpend.filter(s=>s.returnLikely).reduce((sum,s)=>sum+s.amount,0);
  const filtered=view==="month"?net.filter(s=>s.date.startsWith(thisMonth)):net.filter(s=>s.date>=thisWeekStart);
  const catTotals={};filtered.forEach(s=>{catTotals[s.category]=(catTotals[s.category]||0)+s.amount;});
  const catSorted=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  const catMax=catSorted.length>0?catSorted[0][1]:1;
  const viewTotal=catSorted.reduce((s,[,v])=>s+v,0);
  const weeks=Array.from({length:8},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(7*(7-i)));const ws=weekStart(d.toISOString().split("T")[0]);const we=new Date(ws+"T12:00:00");we.setDate(we.getDate()+6);return{label:new Date(ws+"T12:00:00").toLocaleDateString("en-US",{month:"numeric",day:"numeric"}),values:{spend:net.filter(s=>s.date>=ws&&s.date<=we.toISOString().split("T")[0]).reduce((sum,s)=>sum+s.amount,0)}};});
  return(
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      <PTitle>Spend</PTitle>
      <div style={{display:"flex",gap:10}}>
        {[{l:"Today",v:todayTotal,c:C.sage},{l:"This Week",v:weekTotal,c:C.gold},{l:"This Month",v:monthTotal,c:C.accent}].map(({l,v,c})=>(
          <div key={l} style={{...card,flex:1,textAlign:"center"}}><div style={lbl}>{l}</div><div style={{...serif,fontSize:26,fontWeight:300,color:c,lineHeight:1}}>${v.toFixed(0)}<span style={{fontSize:11,color:C.muted}}>.{String(Math.round((v%1)*100)).padStart(2,"0")}</span></div></div>
        ))}
      </div>
      {pendingRet>0&&<div style={{...card,padding:"11px 16px",display:"flex",alignItems:"center",gap:10,borderLeft:`3px solid ${C.gold}`}}><span>↩</span><div><div style={lbl}>Pending Returns</div><div style={{fontSize:13,color:C.gold}}>${pendingRet.toFixed(2)} excluded from totals above</div></div></div>}
      <div style={card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{...serif,fontSize:17,color:C.white}}>By Category</div>
          <div style={{display:"flex",gap:5}}>{["week","month"].map(v=><button key={v} onClick={()=>setView(v)} style={{padding:"4px 11px",borderRadius:12,fontSize:11,cursor:"pointer",fontWeight:500,background:view===v?C.accent+"22":"transparent",border:`1px solid ${view===v?C.accent:C.border}`,color:view===v?C.accent:C.muted}}>{v==="week"?"Week":"Month"}</button>)}</div>
        </div>
        {catSorted.length===0?<div style={{textAlign:"center",padding:"16px 0",color:C.faint,fontSize:13}}>No spend this period.</div>:catSorted.map(([cat,amt])=>(
          <div key={cat} style={{marginBottom:11}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><div style={{display:"flex",alignItems:"center",gap:7}}><div style={{width:7,height:7,borderRadius:"50%",background:CAT_COLORS[cat]||C.muted}} /><span style={{fontSize:13}}>{cat}</span></div><div style={{display:"flex",gap:9,alignItems:"center"}}><span style={{fontSize:11,color:C.muted}}>{Math.round((amt/viewTotal)*100)}%</span><span style={{...serif,fontSize:15,color:CAT_COLORS[cat]||C.muted}}>${amt.toFixed(0)}</span></div></div>
            <div style={{height:4,background:C.border,borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:((amt/catMax)*100)+"%",background:(CAT_COLORS[cat]||C.muted)+"BB"}} /></div>
          </div>
        ))}
      </div>
      {allSpend.length>=4&&<div style={card}><SHead>Weekly Trend</SHead><MiniChart data={weeks} colors={{spend:C.gold}} height={75} /><div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>{weeks.map((w,i)=><div key={i} style={{flex:1,textAlign:"center",fontSize:9,color:C.faint}}>{w.label}</div>)}</div></div>}
      <div style={card}>
        <SHead>Recent</SHead>
        {allSpend.length===0?<div style={{textAlign:"center",padding:"16px 0",color:C.faint,fontSize:13}}>No spend logged yet.</div>:allSpend.slice(0,25).map((s,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${C.border}`,opacity:s.returnLikely?0.5:1}}>
            <div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:7,marginBottom:1,flexWrap:"wrap"}}><div style={{width:6,height:6,borderRadius:"50%",background:CAT_COLORS[s.category]||C.muted,flexShrink:0}} /><span style={{fontSize:11,color:C.muted}}>{s.category}</span><span style={{fontSize:10,color:C.faint}}>· {s.date}</span>{s.returnLikely&&<span style={{fontSize:9,color:C.gold,background:C.gold+"18",borderRadius:7,padding:"1px 5px"}}>↩</span>}</div>{s.note&&<div style={{fontSize:12,color:C.text,paddingLeft:13}}>{s.note}</div>}</div>
            <div style={{...serif,fontSize:16,color:s.returnLikely?C.gold:C.text,marginLeft:10,textDecoration:s.returnLikely?"line-through":"none"}}>${s.amount.toFixed(2)}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

            {loading?<div style={{fontSize:16,color:C.faint}}>Fetching...</div>:error?<div style={{fontSize:13,color:C.danger}}>{error}</div>:rate?(<><div style={{...serif,fontSize:40,fontWeight:300,color:rateColor,lineHeight:1}}>{rate.toFixed(4)}</div><div style={{fontSize:12,color:rateColor,marginTop:4}}>{{strong:"Favorable for EUR spend",neutral:"Moderate — watch it",weak:"Weak USD — budget pressure"}[rateStatus]||""}</div></>):<div style={{...serif,fontSize:28,color:C.faint}}>—</div>}
            {fetched&&<div style={{fontSize:10,color:C.faint,marginTop:6}}>Updated {fetched}</div>}
          </div>
          <button onClick={refresh} disabled={loading} style={{padding:"6px 13px",borderRadius:7,background:"transparent",border:`1px solid ${C.border}`,color:C.muted,cursor:"pointer",fontSize:11}}>↻ Refresh</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <div><label style={lbl}>EUR Amount</label><div style={{display:"flex",alignItems:"center",gap:7}}><span style={{...serif,fontSize:18,color:C.muted}}>€</span><input type="number" value={eurAmount} onChange={e=>setEurAmount(e.target.value)} placeholder="5000" style={{...inp,...serif,fontSize:18}} /></div></div>
          <div><label style={lbl}>USD Equivalent</label><div style={{display:"flex",alignItems:"center",gap:7}}><span style={{...serif,fontSize:18,color:C.muted}}>$</span><div style={{...inp,...serif,fontSize:18,color:usdResult?C.sage:C.faint,display:"flex",alignItems:"center"}}>{usdResult||(rate?"—":"need rate")}</div></div></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5}}>
          {[5000,10000,25000,50000,75000,100000].map(eur=>(
            <button key={eur} onClick={()=>setEurAmount(String(eur))} style={{padding:"7px 5px",borderRadius:7,cursor:"pointer",textAlign:"center",background:eurAmount==eur?C.accent+"22":C.surface,border:`1px solid ${eurAmount==eur?C.accent:C.border}`,color:eurAmount==eur?C.accent:C.muted}}>
              <div style={{fontSize:11,fontWeight:500}}>€{eur/1000}k</div>
              {rate&&<div style={{fontSize:9,color:C.faint,marginTop:1}}>${((eur*rate)/1000).toFixed(0)}k</div>}
            </button>
          ))}
        </div>
      </div>

      {/* Timeline */}
      <div style={card}>
        <SHead>Timeline</SHead>
        {timeline.map((m,i)=>(
          <div key={i} style={{display:"flex",gap:12,padding:"9px 0",borderBottom:`1px solid ${C.border}`,alignItems:"center"}}>
            <div style={{width:4,height:4,borderRadius:"50%",background:m.highlight?C.sage:m.event?C.accent:C.border,flexShrink:0}} />
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:m.event||m.highlight?600:400,color:m.highlight?C.sage:m.event?C.accent:C.text}}>{m.month}</div><div style={{fontSize:11,color:C.muted,marginTop:1}}>{m.note}</div></div>
            <div style={{fontSize:11,color:C.faint}}>{Math.ceil((m.date-new Date())/86400000)>0?Math.ceil((m.date-new Date())/86400000)+"d":"now"}</div>
          </div>
        ))}
      </div>

      {/* Tasks */}
      <div style={card}>
        <SHead>Wedding Tasks</SHead>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr auto",gap:7,marginBottom:14}}>
          <input value={form.text} onChange={e=>setForm({...form,text:e.target.value})} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="What needs to happen..." style={inp} />
          <select value={form.category} onChange={e=>setForm({...form,category:e.target.value})} style={inp}>{cats.map(c=><option key={c} value={c}>{c}</option>)}</select>
          <select value={form.priority} onChange={e=>setForm({...form,priority:e.target.value})} style={inp}><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select>
          <button onClick={add} style={{padding:"9px 16px",borderRadius:8,background:C.accent,color:"#0A0908",border:"none",cursor:"pointer",fontSize:13,fontWeight:500}}>Add</button>
        </div>
        {Object.entries(grouped).map(([cat,tasks])=>(
          <div key={cat} style={{marginBottom:14}}>
            <div style={{...lbl,marginBottom:8}}>{cat}</div>
            {tasks.map(task=>(
              <div key={task.id} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 0",borderBottom:`1px solid ${C.border}`}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:priColors[task.priority],flexShrink:0}} />
                <span style={{fontSize:13,flex:1}}>{task.text}</span>
                <button onClick={()=>setWtasks(wtasks.map(t=>t.id===task.id?{...t,done:true}:t))} style={{padding:"3px 9px",borderRadius:5,background:"transparent",border:`1px solid ${C.border}`,color:C.muted,cursor:"pointer",fontSize:11}}>Done</button>
                <button onClick={()=>setWtasks(wtasks.filter(t=>t.id!==task.id))} style={{background:"none",border:"none",color:C.faint,cursor:"pointer",fontSize:17}}>×</button>
              </div>
            ))}
          </div>
        ))}
        {Object.keys(grouped).length===0&&wtasks.filter(t=>!t.done).length===0&&<div style={{textAlign:"center",padding:"16px 0",color:C.faint,fontSize:13}}>No open tasks ✓</div>}
        {completed.length>0&&(
          <div style={{marginTop:12}}>
            <div style={lbl}>Completed ({completed.length})</div>
            {completed.slice(-5).map(t=><div key={t.id} style={{padding:"5px 0",opacity:0.35,fontSize:12,textDecoration:"line-through"}}>{t.text}</div>)}
            <button onClick={()=>setWtasks(wtasks.filter(t=>!t.done))} style={{fontSize:11,color:C.faint,background:"none",border:"none",cursor:"pointer",marginTop:5}}>Clear {completed.length} completed</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// DATA PANEL (export / import / sync explanation)
// ═══════════════════════════════════════════════════════════════════════════════
function DataPanel({onClose}){
  const [msg,setMsg]=useState("");
  const exportAll=()=>{
    const keys=Object.keys(localStorage).filter(k=>k.startsWith("nm_"));
    const out={};
    keys.forEach(k=>{try{out[k]=JSON.parse(localStorage.getItem(k));}catch{out[k]=localStorage.getItem(k);}});
    const blob=new Blob([JSON.stringify(out,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="nicole-os-"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(url);
    setMsg("Exported ✓");setTimeout(()=>setMsg(""),3000);
  };
  const importFile=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.nm_daily){
          const existing=JSON.parse(localStorage.getItem("nm_daily")||"{}");
          const merged={...data.nm_daily};
          Object.entries(existing).forEach(([d,v])=>{
            if(!merged[d])merged[d]=v;
            else merged[d]={...merged[d],...Object.fromEntries(Object.entries(v).filter(([,val])=>val!=null&&val!==""))};
          });
          data.nm_daily=merged;
        }
        Object.entries(data).forEach(([k,v])=>localStorage.setItem(k,JSON.stringify(v)));
        setMsg("Imported ✓ — reloading...");
        setTimeout(()=>window.location.reload(),1200);
      }catch{setMsg("Invalid file — check format");}
    };
    r.readAsText(f);
  };
  return(
    <Modal onClose={onClose}>
      <div style={{...card,maxWidth:440}}>
        <div style={{...serif,fontSize:22,color:C.white,marginBottom:5}}>Data & Sync</div>
        <div style={{fontSize:12,color:C.muted,lineHeight:1.7,marginBottom:20}}>
          Data is saved <strong style={{color:C.text}}>in this browser only</strong> — your phone and desktop each keep their own copy and don't sync automatically. This is why data you log on your phone won't appear on your desktop (and vice versa).<br/><br/>
          To move everything across devices: <strong style={{color:C.text}}>export on one device → send the file to yourself → import on the other.</strong> Photos are included.
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
          <button onClick={exportAll} style={{padding:"12px 16px",borderRadius:9,background:C.sage+"18",border:`1px solid ${C.sage}44`,color:C.sage,cursor:"pointer",fontSize:13,fontWeight:500,textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span>↓ Export backup</span>
            <span style={{fontSize:11,color:C.muted}}>downloads a .json with all your data + photos</span>
          </button>
          <label style={{padding:"12px 16px",borderRadius:9,background:C.accent+"12",border:`1px solid ${C.accent}33`,color:C.accent,cursor:"pointer",fontSize:13,fontWeight:500,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span>↑ Import backup</span>
            <span style={{fontSize:11,color:C.muted}}>merges a .json — nothing is deleted</span>
            <input type="file" accept=".json" onChange={importFile} style={{display:"none"}} />
          </label>
        </div>
        {msg&&<div style={{fontSize:12,color:C.sage,padding:"8px 12px",background:C.sage+"12",borderRadius:7,marginBottom:12}}>{msg}</div>}
        <div style={{fontSize:11,color:C.faint,lineHeight:1.6,padding:"11px 14px",background:C.surface,borderRadius:8}}>
          <strong style={{color:C.muted}}>How to sync phone → desktop</strong><br/>
          1. Open app on phone → ⊙ Sync → Export backup<br/>
          2. AirDrop or email the .json file to your computer<br/>
          3. Open app on desktop → ⊙ Sync → Import backup
        </div>
      </div>
    </Modal>
  );
}
