const { useState, useEffect, useRef, useMemo } = React;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const todayStr = () => new Date().toISOString().split("T")[0];
const daysUntil = d => Math.max(0, Math.ceil((new Date(d) - new Date()) / 86400000));
const fmt12 = t => { if(!t) return ""; const [h,m]=t.split(":").map(Number); return ((h%12)||12)+":"+String(m).padStart(2,"0")+(h>=12?" PM":" AM"); };

function useLS(key, init) {
  const [v, sv] = useState(() => { try { const s=localStorage.getItem(key); return s?JSON.parse(s):init; } catch{return init;} });
  useEffect(() => { try{localStorage.setItem(key,JSON.stringify(v));}catch(e){} }, [key,v]);
  return [v, sv];
}

function getCyclePhase(startDate, length=28) {
  if (!startDate) return null;
  const elapsed = Math.floor((new Date()-new Date(startDate))/86400000);
  const day = (elapsed % length)+1;
  const phase = day<=5?"menstrual":day<=13?"follicular":day<=16?"ovulatory":"luteal";
  return { phase, day };
}

function sleepDuration(bed, wake) {
  if (!bed||!wake) return null;
  const [bh,bm]=bed.split(":").map(Number), [wh,wm]=wake.split(":").map(Number);
  let mins=(wh*60+wm)-(bh*60+bm); if(mins<0)mins+=1440;
  return { h:Math.floor(mins/60), m:mins%60, total:mins, label:Math.floor(mins/60)+"h"+(mins%60>0?" "+(mins%60)+"m":"") };
}

function getStreak(hid, logs) {
  let n=0; const d=new Date();
  while(true){ const k=d.toISOString().split("T")[0]; if(!(logs[k]?.habits||[]).includes(hid))break; n++; d.setDate(d.getDate()-1); }
  return n;
}

function getLongest(hid, logs) {
  let max=0,cur=0;
  Object.keys(logs).sort().forEach(k=>{ if((logs[k]?.habits||[]).includes(hid)){cur++;max=Math.max(max,cur);}else cur=0; });
  return max;
}

function weekStart(ds) {
  const d=new Date(ds+"T12:00:00"), day=d.getDay(), diff=(day===0?-6:1)-day;
  d.setDate(d.getDate()+diff); return d.toISOString().split("T")[0];
}

// ─── GOOGLE SHEETS SYNC ──────────────────────────────────────────────────────
async function syncToSheets(log, date, sheetsUrl, cycleStart, cycleLength) {
  if (!sheetsUrl) return { ok: false, msg: "Paste your Apps Script URL first" };
  const phase = getCyclePhase(cycleStart, cycleLength);
  const timedMeds = log.timedMeds || {};
  const spendItems = log.spendItems || [];
  const fmtTimes = id => (timedMeds[id] || []).map(d => fmt12(d.time)).join(", ");
  const fmtSymptoms = s => Object.entries(s || {}).map(([k,v]) => k+" ("+v+")").join(", ");
  const sl = sleepDuration(log.bedtime, log.wakeTime);

  const dailyRow = {
    sheet: "Daily Log", date,
    mood: log.mood||"", anxiety: log.anxiety||"", anger: log.anger||"", energy: log.energy||"",
    notes: log.notes||"",
    bedtime: log.bedtime||"", wakeTime: log.wakeTime||"",
    sleepHours: sl ? sl.label : "", sleepQuality: log.sleepQuality||"",
    sleepSupps: (log.sleepSupps||[]).join(", "),
    hairWashed: log.hairWash||"",
    breakfast: log.breakfast||"", breakfastFlags: ((log.mealSensitivity||{}).breakfast||[]).join(", "),
    lunch: log.lunch||"", lunchFlags: ((log.mealSensitivity||{}).lunch||[]).join(", "),
    dinner: log.dinner||"", dinnerFlags: ((log.mealSensitivity||{}).dinner||[]).join(", "),
    snacks: log.snacks||"", snackFlags: ((log.mealSensitivity||{}).snacks||[]).join(", "),
    dayFlags: (log.foodTagsDay||[]).join(", "), foodNotes: log.foodNotes||"",
    symptoms: fmtSymptoms(log.symptoms),
    vyvanse: fmtTimes("vyvanse"), adderallIR: fmtTimes("adderall_ir"),
    adderallXR: fmtTimes("adderall_xr"), ativan: fmtTimes("ativan"), propranolol: fmtTimes("propranolol"),
    supplements: (log.meds||[]).join(", "), habits: (log.habits||[]).join(", "),
    skinRating: log.skinRating||"", skinConcerns: (log.skinConcerns||[]).join(", "),
    skincareAM: ((log.skincare||{}).AM||[]).join(", "), skincarePM: ((log.skincare||{}).PM||[]).join(", "),
    skinNotes: log.skinNotes||"",
    totalSpend: spendItems.reduce((s,i)=>s+i.amount,0).toFixed(2),
    netSpend: spendItems.filter(i=>!i.returnLikely).reduce((s,i)=>s+i.amount,0).toFixed(2),
    cycleDay: phase ? phase.day : "", cyclePhase: phase ? PHASES[phase.phase].label : ""
  };

  const spendRows = spendItems.map(item => ({
    sheet: "Spend Items", date,
    note: item.note||"", category: item.category||"Other",
    amount: item.amount.toFixed(2), returnLikely: item.returnLikely ? "TRUE" : "FALSE"
  }));

  try {
    await fetch(sheetsUrl, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ dailyRow, spendRows })
    });
    return { ok: true, msg: "Synced ✓ " + date };
  } catch(e) {
    return { ok: false, msg: "Network error — check URL" };
  }
}

// ─── EUR/USD ─────────────────────────────────────────────────────────────────
function useEurUsd(){
  const [rate,setRate]=useLS("nm_eurusd_rate",null);
  const [fetched,setFetched]=useLS("nm_eurusd_date",null);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);

  const fetchRate=async()=>{
    setLoading(true); setError(null);
    const urls=[
      "https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/eur.json",
      "https://latest.currency-api.pages.dev/v1/currencies/eur.json"
    ];
    let ok=false;
    for(const url of urls){
      try{
        const res=await fetch(url); if(!res.ok) continue;
        const data=await res.json();
        const usd=data?.eur?.usd; if(!usd) continue;
        setRate(+usd.toFixed(6)); setFetched(todayStr()); ok=true; break;
      }catch(e){ continue; }
    }
    if(!ok) setError("Could not fetch — check internet connection");
    setLoading(false);
  };

  useEffect(()=>{ if(fetched!==todayStr()) fetchRate(); },[]);
  return {rate,fetched,loading,error,refresh:fetchRate};
}

// ─── TIMED MED LOGGER ────────────────────────────────────────────────────────
function TimedMedLogger({log,upd}){
  const timedMeds=log.timedMeds||{};
  const nowT=()=>{const d=new Date();return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");};
  const addDose=id=>{const ex=timedMeds[id]||[];upd("timedMeds",{...timedMeds,[id]:[...ex,{id:Date.now(),time:nowT()}]});};
  const rmDose=(mid,did)=>{const n={...timedMeds};const u=(timedMeds[mid]||[]).filter(d=>d.id!==did);if(u.length===0)delete n[mid];else n[mid]=u;upd("timedMeds",n);};
  const updTime=(mid,did,t)=>upd("timedMeds",{...timedMeds,[mid]:(timedMeds[mid]||[]).map(d=>d.id===did?{...d,time:t}:d)});

  return(
    <div>
      {TIMED_MEDS.map(med=>{
        const doses=timedMeds[med.id]||[];
        const taken=doses.length>0;
        return(
          <div key={med.id} style={{marginBottom:10,borderRadius:10,overflow:"hidden",border:`1px solid ${taken?med.color+"55":C.border}`,background:taken?med.color+"08":"transparent",transition:"all 0.2s"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 14px"}}>
              <div>
                <div style={{fontSize:13,fontWeight:taken?500:400,color:taken?C.text:C.muted}}>{med.label}</div>
                <div style={{fontSize:10,color:med.color+"99",marginTop:2}}>{med.note}</div>
              </div>
              <button onClick={()=>addDose(med.id)} style={{padding:"5px 13px",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:500,background:taken?med.color+"22":C.surface,border:`1px solid ${taken?med.color+"66":C.border}`,color:taken?med.color:C.muted,transition:"all 0.15s"}}>+ Log dose</button>
            </div>
            {doses.length>0&&(
              <div style={{borderTop:`1px solid ${med.color}22`,padding:"8px 14px",display:"flex",flexWrap:"wrap",gap:8}}>
                {doses.map((dose,i)=>(
                  <div key={dose.id} style={{display:"flex",alignItems:"center",gap:6,background:med.color+"14",border:`1px solid ${med.color}33`,borderRadius:8,padding:"5px 10px"}}>
                    <span style={{fontSize:10,color:med.color+"99",fontWeight:500}}>Dose {i+1}</span>
                    <input type="time" value={dose.time} onChange={e=>updTime(med.id,dose.id,e.target.value)} style={{...inp,width:"auto",padding:"2px 6px",fontSize:13,background:"transparent",border:"none",color:med.color,fontWeight:500}} />
                    <span style={{fontSize:11,color:med.color+"88"}}>{fmt12(dose.time)}</span>
                    <button onClick={()=>rmDose(med.id,dose.id)} style={{background:"none",border:"none",color:med.color+"66",cursor:"pointer",fontSize:15,lineHeight:1,padding:0}}>×</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── SPEND LOGGER ────────────────────────────────────────────────────────────
function SpendLogger({log,upd}){
  const [form,setForm]=useState({amount:"",category:"",note:"",returnLikely:false});
  const items=log.spendItems||[];
  const addItem=()=>{
    if(!form.amount||isNaN(parseFloat(form.amount)))return;
    upd("spendItems",[...items,{id:Date.now(),amount:parseFloat(form.amount),category:form.category||"Other",note:form.note,returnLikely:form.returnLikely}]);
    setForm({amount:"",category:"",note:"",returnLikely:false});
  };
  const rmItem=id=>upd("spendItems",items.filter(i=>i.id!==id));
  const togRet=id=>upd("spendItems",items.map(i=>i.id===id?{...i,returnLikely:!i.returnLikely}:i));
  const total=items.reduce((s,i)=>s+i.amount,0);
  const realTotal=items.filter(i=>!i.returnLikely).reduce((s,i)=>s+i.amount,0);
  return(
    <div>
      {items.length>0&&(
        <div style={{display:"flex",gap:16,marginBottom:14,padding:"10px 14px",background:C.surface,borderRadius:10}}>
          <div><div style={lbl}>Total</div><div style={{...serif,fontSize:24,color:C.sage}}>${total.toFixed(2)}</div></div>
          {total!==realTotal&&<div><div style={lbl}>Net (excl. returns)</div><div style={{...serif,fontSize:24,color:C.accent}}>${realTotal.toFixed(2)}</div></div>}
        </div>
      )}
      {items.map(item=>(
        <div key={item.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",marginBottom:6,borderRadius:9,background:item.returnLikely?C.gold+"0A":C.surface,border:`1px solid ${item.returnLikely?C.gold+"33":C.border}`,transition:"all 0.2s"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:CAT_COLORS[item.category]||C.muted,flexShrink:0}} />
              <span style={{fontSize:12,color:C.muted}}>{item.category}</span>
              {item.returnLikely&&<span style={{fontSize:10,color:C.gold,background:C.gold+"18",border:`1px solid ${C.gold}33`,borderRadius:10,padding:"1px 7px"}}>↩ return likely</span>}
            </div>
            {item.note&&<div style={{fontSize:12,color:C.text,paddingLeft:15}}>{item.note}</div>}
          </div>
          <div style={{...serif,fontSize:18,color:item.returnLikely?C.gold:C.text,textDecoration:item.returnLikely?"line-through":"none",opacity:item.returnLikely?0.7:1}}>${item.amount.toFixed(2)}</div>
          <button onClick={()=>togRet(item.id)} style={{background:"none",border:`1px solid ${item.returnLikely?C.gold+"66":C.border}`,borderRadius:6,color:item.returnLikely?C.gold:C.faint,cursor:"pointer",fontSize:12,padding:"3px 8px",flexShrink:0}}>↩</button>
          <button onClick={()=>rmItem(item.id)} style={{background:"none",border:"none",color:C.faint,cursor:"pointer",fontSize:18,lineHeight:1,flexShrink:0}}>×</button>
        </div>
      ))}
      <div style={{marginTop:items.length>0?10:0}}>
        <div style={{display:"grid",gridTemplateColumns:"90px 1fr",gap:8,marginBottom:8}}>
          <div>
            <label style={lbl}>Amount</label>
            <div style={{display:"flex",alignItems:"center",gap:4}}><span style={{color:C.muted,fontSize:14}}>$</span><input type="number" step="0.01" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})} onKeyDown={e=>e.key==="Enter"&&addItem()} placeholder="0.00" style={{...inp,...serif,fontSize:16}} /></div>
          </div>
          <div>
            <label style={lbl}>Category</label>
            <select value={form.category} onChange={e=>setForm({...form,category:e.target.value})} style={inp}>
              <option value="">Category</option>
              {SPEND_CATS.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
          <div style={{flex:1}}>
            <label style={lbl}>Note (optional)</label>
            <input value={form.note} onChange={e=>setForm({...form,note:e.target.value})} onKeyDown={e=>e.key==="Enter"&&addItem()} placeholder="What was it for?" style={inp} />
          </div>
          <button onClick={()=>setForm({...form,returnLikely:!form.returnLikely})} style={{padding:"9px 12px",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:500,flexShrink:0,background:form.returnLikely?C.gold+"22":"transparent",border:`1px solid ${form.returnLikely?C.gold:C.border}`,color:form.returnLikely?C.gold:C.muted,transition:"all 0.15s"}}>↩ Return?</button>
          <button onClick={addItem} style={{padding:"9px 16px",borderRadius:8,background:C.accent,color:"#0A0908",border:"none",cursor:"pointer",fontSize:13,fontWeight:500,flexShrink:0}}>+ Add</button>
        </div>
      </div>
    </div>
  );
}

// ─── CYCLE CARD (top of daily log) ───────────────────────────────────────────
function CycleDailyCard({cycleStart,cycleLength}){
  const phase=getCyclePhase(cycleStart,cycleLength);
  if(!phase) return null;
  const pd=PHASES[phase.phase];
  const col=pd.color;
  const isLateLuteal=phase.phase==="luteal"&&phase.day>=22;
  const mode=isLateLuteal?"gentle":pd.mode;
  const modeNote=isLateLuteal?"Late luteal — protect your energy hard. Limit obligations, prioritize sleep, avoid big decisions.":pd.modeNote;
  const daysLeft=phase.phase==="menstrual"?5-phase.day:phase.phase==="follicular"?13-phase.day:phase.phase==="ovulatory"?16-phase.day:cycleLength-phase.day;
  return(
    <div style={{borderRadius:14,overflow:"hidden",border:`1px solid ${col}33`}}>
      <div style={{background:col+"22",borderBottom:`1px solid ${col}33`,padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div>
            <div style={{fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",color:col+"BB",fontFamily:"'DM Sans', sans-serif",fontWeight:500}}>Cycle Day</div>
            <div style={{...serif,fontSize:44,fontWeight:300,color:col,lineHeight:1}}>{phase.day}</div>
          </div>
          <div style={{width:1,height:44,background:col+"33"}} />
          <div>
            <div style={{...serif,fontSize:20,color:col}}>{pd.label} Phase</div>
            <div style={{fontSize:12,color:col+"99",marginTop:2}}>Days {pd.days} · ~{Math.max(0,daysLeft)} days to next phase</div>
          </div>
        </div>
        <div style={{padding:"8px 16px",borderRadius:24,fontFamily:"'DM Sans', sans-serif",fontWeight:600,fontSize:12,letterSpacing:"0.08em",textTransform:"uppercase",background:mode==="lockin"?C.sage+"22":C.gold+"22",border:`1px solid ${mode==="lockin"?C.sage+"77":C.gold+"77"}`,color:mode==="lockin"?C.sage:C.gold}}>
          {mode==="lockin"?"⚡ Lock In":"🌿 Be Gentle"}
        </div>
      </div>
      <div style={{background:C.surface,padding:"10px 20px",borderBottom:`1px solid ${C.border}`}}>
        <div style={{fontSize:13,color:C.muted,fontStyle:"italic",lineHeight:1.5}}>{modeNote}</div>
      </div>
      <div style={{background:C.card,display:"grid",gridTemplateColumns:"1fr 1fr"}}>
        <div style={{padding:"16px 20px",borderRight:`1px solid ${C.border}`}}>
          <div style={lbl}>What to Expect</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
            {pd.expectedSymptoms.map(s=><span key={s} style={{fontSize:11,padding:"3px 10px",borderRadius:12,background:col+"15",border:`1px solid ${col}33`,color:col+"CC"}}>{s}</span>)}
          </div>
        </div>
        <div style={{padding:"16px 20px"}}>
          <div style={lbl}>Eat This · Why</div>
          {pd.nutrition.map((t,i)=>(
            <div key={i} style={{marginBottom:10,paddingBottom:10,borderBottom:i<pd.nutrition.length-1?`1px solid ${C.border}`:"none"}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                <span style={{fontSize:11,fontWeight:600,color:C.sage}}>{t.food}</span>
                <span style={{fontSize:10,padding:"1px 7px",borderRadius:8,background:C.sage+"18",color:C.sage,border:`1px solid ${C.sage}33`}}>{t.nutrient}</span>
              </div>
              <div style={{fontSize:11,color:C.muted,lineHeight:1.4}}>{t.reason}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════
function Dashboard({dailyLogs,cycleStart,beautyLogs,intervals,allHabits}){
  const phase=getCyclePhase(cycleStart);
  const pd=phase?PHASES[phase.phase]:null;
  const today=dailyLogs[todayStr()]||{};
  const [tasks,setTasks]=useLS("nm_tasks",[]);
  const [newTask,setNewTask]=useState("");
  const {rate,fetched,loading,error,refresh}=useEurUsd();
  const hr=new Date().getHours();
  const greeting=hr<12?"Good morning":hr<17?"Good afternoon":"Good evening";

  const last7=Array.from({length:7},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(6-i));
    const k=d.toISOString().split("T")[0];
    return{label:["Su","Mo","Tu","We","Th","Fr","Sa"][d.getDay()],values:{mood:dailyLogs[k]?.mood||null,anxiety:dailyLogs[k]?.anxiety||null}};
  });

  const upcoming=BEAUTY_ITEMS.map(item=>{
    const last=beautyLogs[item.id]; if(!last)return null;
    const iv=intervals[item.id]||item.interval;
    const due=new Date(last+"T12:00:00"); due.setDate(due.getDate()+iv);
    return{...item,daysLeft:Math.ceil((due-new Date())/86400000)};
  }).filter(Boolean).sort((a,b)=>a.daysLeft-b.daysLeft).slice(0,4);

  const todayHabits=today.habits||[];
  const todaySymptoms=today.symptoms||{};
  const activeSymptoms=Object.entries(todaySymptoms).filter(([,v])=>v!=null);
  const addTask=()=>{if(!newTask.trim())return;setTasks([...tasks,{id:Date.now(),text:newTask,done:false}]);setNewTask("");};

  const rateStatus=!rate?null:rate>=1.15?"strong":rate>=1.10?"neutral":"weak";
  const rateColor={strong:C.sage,neutral:C.gold,weak:C.danger}[rateStatus]||C.muted;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <h1 style={{...serif,fontSize:30,fontWeight:300,color:C.white,margin:0}}>{greeting}, Nicole.</h1>
          <div style={{fontSize:13,color:C.muted,marginTop:5}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}</div>
        </div>
        {phase&&(
          <div style={{display:"inline-flex",alignItems:"center",gap:8,background:PHASES[phase.phase].color+"18",border:`1px solid ${PHASES[phase.phase].color}44`,borderRadius:20,padding:"5px 14px",flexShrink:0}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:PHASES[phase.phase].color}} />
            <span style={{fontSize:11,color:PHASES[phase.phase].color,fontWeight:500}}>{PHASES[phase.phase].label} · Day {phase.day}</span>
          </div>
        )}
      </div>

      {/* Countdowns */}
      <div>
        <div style={lbl}>Wedding Timeline</div>
        <div style={{display:"flex",gap:10}}>
          <Countdown label="Bridal Shower" date="2026-06-27" color={C.accent} />
          <Countdown label="Bachelorette" date="2026-07-30" color={C.gold} />
          <Countdown label="Wedding Day" date="2026-09-17" color={C.sage} sub="Tuscany, Italy" />
        </div>
      </div>

      {/* EUR/USD compact */}
      <div style={{...card,display:"flex",alignItems:"center",gap:16,padding:"14px 18px"}}>
        <div style={{flex:1}}>
          <div style={lbl}>EUR / USD — Live Rate</div>
          {loading?<div style={{fontSize:13,color:C.faint}}>Fetching...</div>:error?<div style={{fontSize:12,color:C.danger}}>{error}</div>:rate?(
            <div style={{display:"flex",alignItems:"baseline",gap:10}}>
              <div style={{...serif,fontSize:28,color:rateColor,lineHeight:1}}>{rate.toFixed(4)}</div>
              <div style={{fontSize:11,color:rateColor}}>{rateStatus==="strong"?"Favorable for EUR spend":rateStatus==="neutral"?"Moderate — watch it":"Weak USD — budget pressure"}</div>
            </div>
          ):<div style={{fontSize:13,color:C.faint}}>—</div>}
          {fetched&&<div style={{fontSize:10,color:C.faint,marginTop:3}}>Updated {fetched}</div>}
        </div>
        <button onClick={refresh} disabled={loading} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,cursor:"pointer",padding:"6px 12px",fontSize:11}}>↻</button>
      </div>

      {/* Phase guidance */}
      {pd&&(
        <div style={{...card,borderLeft:`3px solid ${PHASES[phase.phase].color}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
            <div style={{...serif,fontSize:17,color:PHASES[phase.phase].color}}>{pd.label} Phase</div>
            <div style={{fontSize:11,color:C.muted}}>Days {pd.days}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:12}}>
            <div><div style={lbl}>Eat</div>{pd.eat.slice(0,3).map(e=><div key={e} style={{fontSize:12,color:C.sage,marginBottom:4}}>✓ {e}</div>)}</div>
            <div><div style={lbl}>Avoid</div>{pd.avoid.slice(0,3).map(e=><div key={e} style={{fontSize:12,color:C.danger,marginBottom:4}}>✗ {e}</div>)}</div>
          </div>
          <div style={{padding:"9px 14px",background:PHASES[phase.phase].color+"12",borderRadius:8}}>
            <div style={lbl}>Vyvanse / Adderall</div>
            <div style={{fontSize:12,color:phase.phase==="luteal"?C.danger:C.text,lineHeight:1.5}}>{pd.vyvanse}</div>
          </div>
        </div>
      )}

      {/* Today snapshot */}
      <div style={card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <SHead>Today's Snapshot</SHead>
          <div style={{fontSize:12,color:C.muted}}>{todayStr()}</div>
        </div>
        <div style={{display:"flex",gap:22,flexWrap:"wrap",marginBottom:14}}>
          {[{k:"mood",label:"Mood",col:C.accent},{k:"anxiety",label:"Anxiety",col:C.gold},{k:"anger",label:"Anger",col:C.danger},{k:"energy",label:"Energy",col:C.sage}].filter(x=>today[x.k]).map(x=>(
            <div key={x.k} style={{textAlign:"center"}}>
              <div style={{...serif,fontSize:34,color:x.col,lineHeight:1}}>{today[x.k]}</div>
              <div style={{...lbl,marginTop:4,marginBottom:0}}>{x.label}</div>
            </div>
          ))}
          {(today.spendItems||[]).length>0&&(
            <div style={{textAlign:"center"}}>
              <div style={{...serif,fontSize:34,color:C.sage,lineHeight:1}}>${(today.spendItems||[]).filter(i=>!i.returnLikely).reduce((s,i)=>s+i.amount,0).toFixed(0)}</div>
              <div style={{...lbl,marginTop:4,marginBottom:0}}>Spent</div>
            </div>
          )}
        </div>
        <div style={{marginBottom:activeSymptoms.length>0?12:0}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <div style={lbl}>Habits</div>
            <div style={{fontSize:11,color:todayHabits.length===allHabits.length&&allHabits.length>0?C.sage:C.muted}}>{todayHabits.length}/{allHabits.length}</div>
          </div>
          <div style={{height:4,background:C.border,borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",width:allHabits.length>0?(todayHabits.length/allHabits.length*100)+"%":"0%",background:todayHabits.length===allHabits.length&&allHabits.length>0?C.sage:C.accent,transition:"width 0.4s"}} />
          </div>
        </div>
        {activeSymptoms.length>0&&(
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {activeSymptoms.map(([sym,sev])=><span key={sym} style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:SEV_COLORS[sev]+"18",color:SEV_COLORS[sev],border:`1px solid ${SEV_COLORS[sev]}44`}}>{sym} · {sev}</span>)}
          </div>
        )}
      </div>

      {/* 7-day chart */}
      <div style={card}>
        <SHead>7-Day Mood & Anxiety</SHead>
        <MiniChart data={last7} colors={{mood:C.accent,anxiety:C.gold}} height={72} />
        <div style={{display:"flex",gap:16,marginTop:10}}>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:C.muted}}><div style={{width:10,height:10,borderRadius:2,background:C.accent+"88"}} />Mood</div>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:C.muted}}><div style={{width:10,height:10,borderRadius:2,background:C.gold+"88"}} />Anxiety</div>
        </div>
      </div>

      {/* Upcoming beauty */}
      {upcoming.length>0&&(
        <div style={card}>
          <SHead>Upcoming Beauty</SHead>
          {upcoming.map(item=>(
            <div key={item.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${C.border}`}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}><span>{item.icon}</span><span style={{fontSize:13}}>{item.label}</span></div>
              <span style={{fontSize:13,fontWeight:500,color:item.daysLeft<=0?C.danger:item.daysLeft<=7?C.gold:C.muted}}>{item.daysLeft<=0?Math.abs(item.daysLeft)+"d overdue":item.daysLeft===1?"Tomorrow":item.daysLeft+"d"}</span>
            </div>
          ))}
        </div>
      )}

      {/* Tasks */}
      <div style={card}>
        <SHead>Lingering Tasks</SHead>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          <input value={newTask} onChange={e=>setNewTask(e.target.value)} placeholder="Add a task..." onKeyDown={e=>e.key==="Enter"&&addTask()} style={{...inp,flex:1}} />
          <button onClick={addTask} style={{padding:"9px 16px",borderRadius:8,background:C.accent,color:"#0A0908",border:"none",cursor:"pointer",fontSize:13,fontWeight:500,whiteSpace:"nowrap"}}>+ Add</button>
        </div>
        {tasks.filter(t=>!t.done).length===0&&<div style={{fontSize:13,color:C.faint,textAlign:"center",padding:"14px 0"}}>All clear ✓</div>}
        {tasks.filter(t=>!t.done).map(task=>(
          <div key={task.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
            <input type="checkbox" onChange={()=>setTasks(tasks.map(t=>t.id===task.id?{...t,done:true}:t))} />
            <span style={{fontSize:13,flex:1}}>{task.text}</span>
            <button onClick={()=>setTasks(tasks.filter(t=>t.id!==task.id))} style={{background:"none",border:"none",color:C.faint,cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
          </div>
        ))}
        {tasks.filter(t=>t.done).length>0&&(
          <div style={{marginTop:8}}>
            {tasks.filter(t=>t.done).slice(-3).map(t=><div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"5px 0",opacity:0.35}}><input type="checkbox" checked readOnly /><span style={{fontSize:12,textDecoration:"line-through",flex:1}}>{t.text}</span></div>)}
            <button onClick={()=>setTasks(tasks.filter(t=>!t.done))} style={{fontSize:11,color:C.faint,background:"none",border:"none",cursor:"pointer",marginTop:6}}>Clear {tasks.filter(t=>t.done).length} completed</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// DAILY LOG
// ═══════════════════════════════════════════════════════════════════════════════
function DailyLog({logs,setLogs,allHabits,cycleStart,cycleLength}){
  const [date,setDate]=useState(todayStr());
  const [sheetsUrl,setSheetsUrl]=useLS("nm_sheets_url","");
  const [syncing,setSyncing]=useState(false);
  const [syncMsg,setSyncMsg]=useState("");
  const [syncOk,setSyncOk]=useState(null);
  const log=logs[date]||{};
  const upd=(f,v)=>setLogs({...logs,[date]:{...(logs[date]||{}),[f]:v}});
  const updArr=(f,item,checked)=>{const list=log[f]||[];upd(f,checked?[...list,item]:list.filter(x=>x!==item));};
  const updSkin=(p,tod,checked)=>{const c=log.skincare||{};const l=c[tod]||[];upd("skincare",{...c,[tod]:checked?[...l,p]:l.filter(x=>x!==p)});};
  const handleSync=async()=>{setSyncing(true);setSyncMsg("");const r=await syncToSheets(log,date,sheetsUrl,cycleStart,cycleLength);setSyncing(false);setSyncOk(r.ok);setSyncMsg(r.msg);setTimeout(()=>setSyncMsg(""),5000);};
  const sleep=sleepDuration(log.bedtime,log.wakeTime);
  const cycleSymptom=sym=>{const c=(log.symptoms||{})[sym]??null;const next=SEV_CYCLE[(SEV_CYCLE.indexOf(c)+1)%SEV_CYCLE.length];const s={...(log.symptoms||{})};if(next===null)delete s[sym];else s[sym]=next;upd("symptoms",s);};

  return(
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <PageTitle>Daily Log</PageTitle>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...inp,width:"auto"}} />
      </div>

      {/* Cycle card */}
      {cycleStart&&<CycleDailyCard cycleStart={cycleStart} cycleLength={cycleLength} />}

      {/* Mood */}
      <div style={card}>
        <SHead>Mind & Mood</SHead>
        <Slider label="Mood" emoji="🌙" value={log.mood||5} onChange={v=>upd("mood",v)} color={C.accent} />
        <Slider label="Anxiety" emoji="⚡" value={log.anxiety||5} onChange={v=>upd("anxiety",v)} color={C.gold} />
        <Slider label="Anger / Irritability" emoji="🔥" value={log.anger||5} onChange={v=>upd("anger",v)} color={C.danger} />
        <Slider label="Energy" emoji="✨" value={log.energy||5} onChange={v=>upd("energy",v)} color={C.sage} />
        <div><label style={lbl}>Notes</label><textarea rows={3} value={log.notes||""} onChange={e=>upd("notes",e.target.value)} placeholder="Anything on your mind today..." style={inp} /></div>
      </div>

      {/* Sleep */}
      <div style={card}>
        <SHead>Sleep</SHead>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
          <div><label style={lbl}>Bedtime</label><input type="time" value={log.bedtime||""} onChange={e=>upd("bedtime",e.target.value)} style={inp} /></div>
          <div><label style={lbl}>Wake Time</label><input type="time" value={log.wakeTime||""} onChange={e=>upd("wakeTime",e.target.value)} style={inp} /></div>
        </div>
        {sleep&&(
          <div style={{padding:"10px 14px",background:"#8A9BAA18",borderRadius:8,marginBottom:14,display:"flex",alignItems:"center",gap:12}}>
            <div style={{...serif,fontSize:28,color:"#8A9BAA",lineHeight:1}}>{sleep.label}</div>
            <div style={{fontSize:12,color:C.muted}}>{sleep.total<360?"Under 6h — recovery risk":sleep.total>=420&&sleep.total<=540?"Optimal range":sleep.total>540?"Long sleep — check readiness":"Slightly below target"}</div>
          </div>
        )}
        <div style={{marginBottom:14}}><Slider label="Sleep Quality" emoji="🌙" value={log.sleepQuality||5} onChange={v=>upd("sleepQuality",v)} color="#8A9BAA" /></div>
        <div style={{marginBottom:12}}>
          <div style={lbl}>Sleep Supplements</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {SLEEP_SUPPS.map(s=><Check key={s} label={s} color="#8A9BAA" checked={(log.sleepSupps||[]).includes(s)} onChange={e=>updArr("sleepSupps",s,e.target.checked)} />)}
          </div>
        </div>
        <div><label style={lbl}>Notes</label><input value={log.sleepNotes||""} onChange={e=>upd("sleepNotes",e.target.value)} placeholder="Woke up at 3am, vivid dreams..." style={inp} /></div>
      </div>

      {/* Hair wash */}
      <div style={{...card,padding:"14px 20px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:14,color:C.text,fontWeight:500}}>Washed hair today?</div>
            {log.hairWash&&log.hairWash!=="no"&&<div style={{fontSize:11,color:C.muted,marginTop:3}}>Logged ✓</div>}
          </div>
          <div style={{display:"flex",gap:6}}>
            {[{v:"no",label:"No",col:C.faint},{v:"conditioner",label:"Yes — conditioner",col:C.gold},{v:"mask",label:"Yes — mask",col:C.accent}].map(opt=>(
              <button key={opt.v} onClick={()=>upd("hairWash",log.hairWash===opt.v?null:opt.v)} style={{padding:"6px 12px",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:500,transition:"all 0.15s",background:log.hairWash===opt.v?opt.col+"22":"transparent",border:`1px solid ${log.hairWash===opt.v?opt.col+"88":C.border}`,color:log.hairWash===opt.v?opt.col:C.muted}}>{opt.label}</button>
            ))}
          </div>
        </div>
      </div>

      {/* Food */}
      <div style={card}>
        <SHead>Food & Meals</SHead>
        {[["breakfast","Breakfast"],["lunch","Lunch"],["dinner","Dinner"],["snacks","Snacks"]].map(([k,label])=>{
          const mealTags=(log.mealSensitivity||{})[k]||[];
          const togTag=tag=>{const c=log.mealSensitivity||{};const l=c[k]||[];upd("mealSensitivity",{...c,[k]:l.includes(tag)?l.filter(t=>t!==tag):[...l,tag]});};
          return(
            <div key={k} style={{marginBottom:14,paddingBottom:14,borderBottom:k!=="snacks"?`1px solid ${C.border}`:"none"}}>
              <label style={lbl}>{label}</label>
              <input value={log[k]||""} onChange={e=>upd(k,e.target.value)} placeholder="What did you eat?" style={{...inp,marginBottom:8}} />
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {MEAL_SENSITIVITY.map(tag=><Pill key={tag} label={tag} active={mealTags.includes(tag)} color={C.danger} onClick={()=>togTag(tag)} />)}
              </div>
            </div>
          );
        })}
        <div style={{marginTop:6}}>
          <div style={lbl}>Day flags</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>
            {DAY_FLAGS.map(tag=><Pill key={tag} label={tag} active={(log.foodTagsDay||[]).includes(tag)} color={C.sage} onClick={()=>{const l=log.foodTagsDay||[];upd("foodTagsDay",(l.includes(tag)?l.filter(t=>t!==tag):[...l,tag]));}} />)}
          </div>
        </div>
        <div><label style={lbl}>Notes</label><textarea rows={2} value={log.foodNotes||""} onChange={e=>upd("foodNotes",e.target.value)} placeholder="Bloating after lunch, energy crash at 3pm..." style={inp} /></div>
      </div>

      {/* Symptoms */}
      <div style={card}>
        <SHead>Symptoms</SHead>
        <div style={{fontSize:12,color:C.muted,marginBottom:12}}>Tap to cycle: none → mild → moderate → severe</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
          {SYMPTOMS.map(sym=>{
            const sev=(log.symptoms||{})[sym];
            return(
              <button key={sym} onClick={()=>cycleSymptom(sym)} style={{padding:"5px 13px",borderRadius:20,fontSize:12,cursor:"pointer",background:sev?SEV_COLORS[sev]+"18":"transparent",border:`1px solid ${sev?SEV_COLORS[sev]+"66":C.border}`,color:sev?SEV_COLORS[sev]:C.muted,fontWeight:sev?500:400,transition:"all 0.15s"}}>
                {sym}{sev?" · "+sev:""}
              </button>
            );
          })}
        </div>
        {Object.keys(log.symptoms||{}).length>0&&(
          <div style={{marginTop:12}}><label style={lbl}>Symptom Notes</label><input value={log.symptomNotes||""} onChange={e=>upd("symptomNotes",e.target.value)} placeholder="Context, timing..." style={inp} /></div>
        )}
      </div>

      {/* Meds */}
      <div style={card}>
        <SHead>Medications & Supplements</SHead>
        <div style={{marginBottom:16}}>
          <div style={lbl}>Timed medications</div>
          <TimedMedLogger log={log} upd={upd} />
        </div>
        <div style={{marginBottom:14}}>
          <div style={lbl}>Supplements</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {SUPPLEMENTS.map(med=><Check key={med} label={med} color={C.sage} checked={(log.meds||[]).includes(med)} onChange={e=>updArr("meds",med,e.target.checked)} />)}
          </div>
        </div>
        <input value={log.medNote||""} onChange={e=>upd("medNote",e.target.value)} placeholder="Notes..." style={inp} />
      </div>

      {/* Habits */}
      <div style={card}>
        <SHead>Habits</SHead>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          {allHabits.map(h=><Check key={h.id} label={h.emoji+" "+h.label} color={C.sage} checked={(log.habits||[]).includes(h.id)} onChange={e=>updArr("habits",h.id,e.target.checked)} />)}
        </div>
      </div>

      {/* Skincare */}
      <div style={card}>
        <SHead>Skincare</SHead>
        {["AM","PM"].map(tod=>{
          const list=tod==="AM"?SKINCARE_AM:SKINCARE_PM;
          return(
            <div key={tod} style={{marginBottom:16}}>
              <div style={lbl}>{tod}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                {list.map(p=><Check key={p} label={p} color={C.accent} checked={((log.skincare||{})[tod]||[]).includes(p)} onChange={e=>updSkin(p,tod,e.target.checked)} />)}
              </div>
            </div>
          );
        })}
        <div><label style={lbl}>Skin Notes</label><textarea rows={2} value={log.skinNotes||""} onChange={e=>upd("skinNotes",e.target.value)} placeholder="Redness, texture, breakouts..." style={inp} /></div>
      </div>

      {/* Spend */}
      <div style={card}>
        <SHead>Daily Spend</SHead>
        <SpendLogger log={log} upd={upd} />
      </div>

      {/* Sync to Sheets */}
      <div style={{...card, borderLeft:`3px solid ${syncOk===true?C.sage:syncOk===false?C.danger:C.border}`}}>
        <SHead>Sync to Google Sheets</SHead>
        <div style={{fontSize:12,color:C.muted,marginBottom:14,lineHeight:1.5}}>Paste your Apps Script URL once — it saves. Hit Sync to push today's log as a new row.</div>
        <div style={{marginBottom:12}}>
          <label style={lbl}>Apps Script URL</label>
          <input value={sheetsUrl} onChange={e=>setSheetsUrl(e.target.value)} placeholder="https://script.google.com/macros/s/..." style={inp} />
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button onClick={handleSync} disabled={syncing||!sheetsUrl} style={{padding:"9px 22px",borderRadius:8,background:syncing?"transparent":syncOk===true?C.sage:C.accent,color:syncing?C.muted:"#0A0908",border:syncing?`1px solid ${C.border}`:"none",cursor:sheetsUrl?"pointer":"not-allowed",fontSize:13,fontWeight:500,opacity:sheetsUrl?1:0.5,transition:"all 0.2s"}}>
            {syncing?"Syncing...":syncOk===true?"☁ Synced ✓":"☁ Sync Today"}
          </button>
          {syncMsg&&<span style={{fontSize:12,color:syncOk?C.sage:C.danger}}>{syncMsg}</span>}
        </div>
      </div>
    </div>
  );
}

// SKIN TAB
// ═══════════════════════════════════════════════════════════════════════════════
function SkinTab({logs,setLogs}){
  const [date,setDate]=useState(todayStr());
  const log=logs[date]||{};
  const upd=(f,v)=>setLogs({...logs,[date]:{...(logs[date]||{}),[f]:v}});
  const fileRef=useRef();
  const concerns=["Rosacea flare","Breakout","Dryness","Oiliness","Sensitivity","Texture","Dullness","Redness","Puffiness","Good skin day"];
  const history=Array.from({length:21},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(20-i));const k=d.toISOString().split("T")[0];return{k,rating:logs[k]?.skinRating,label:d.getDate()};}).filter(x=>x.rating);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <PageTitle>Skin Journal</PageTitle>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...inp,width:"auto"}} />
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <div onClick={()=>fileRef.current.click()} style={{...card,cursor:"pointer",minHeight:220,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",padding:0}}>
          <input ref={fileRef} type="file" accept="image/*" capture="user" onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>upd("skinPhoto",ev.target.result);r.readAsDataURL(f);}} style={{display:"none"}} />
          {log.skinPhoto?<img src={log.skinPhoto} alt="skin" style={{width:"100%",height:"100%",minHeight:220,objectFit:"cover",borderRadius:14}} />:<div style={{textAlign:"center",color:C.faint,padding:30}}><div style={{fontSize:36,marginBottom:10}}>📸</div><div style={{fontSize:13}}>Morning photo</div><div style={{fontSize:11,marginTop:4}}>Tap to upload</div></div>}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={card}>
            <div style={lbl}>Skin Rating</div>
            <div style={{display:"flex",alignItems:"center",gap:12}}><input type="range" min={1} max={10} value={log.skinRating||5} onChange={e=>upd("skinRating",+e.target.value)} /><span style={{...serif,fontSize:30,color:C.accent,minWidth:40}}>{log.skinRating||5}</span></div>
          </div>
          <div style={{...card,flex:1}}><label style={lbl}>Observations</label><textarea rows={7} value={log.skinObs||""} onChange={e=>upd("skinObs",e.target.value)} placeholder={"Redness areas\nBreakout location\nTexture + tone\nGlow or dullness"} style={{...inp,resize:"none"}} /></div>
        </div>
      </div>
      <div style={card}>
        <SHead>Concern Flags</SHead>
        <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
          {concerns.map(c=>{const active=(log.skinConcerns||[]).includes(c);const col=c==="Good skin day"?C.sage:C.accent;return(<button key={c} onClick={()=>{const l=log.skinConcerns||[];upd("skinConcerns",active?l.filter(x=>x!==c):[...l,c]);}} style={{padding:"5px 12px",borderRadius:20,fontSize:11,cursor:"pointer",background:active?col+"22":"transparent",border:`1px solid ${active?col+"88":C.border}`,color:active?col:C.muted,fontWeight:active?500:400}}>{c}</button>);})}
        </div>
      </div>
      {history.length>1&&(
        <div style={card}>
          <SHead>21-Day Trend</SHead>
          <div style={{display:"flex",alignItems:"flex-end",gap:5,height:80}}>
            {history.map((d,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><div style={{width:"100%",borderRadius:"3px 3px 0 0",minHeight:4,height:((d.rating/10)*68)+"px",background:d.rating>=8?C.sage+"99":d.rating>=5?C.gold+"99":C.accent+"99"}} title={d.k+": "+d.rating+"/10"} /><div style={{fontSize:9,color:C.faint}}>{d.label}</div></div>)}
          </div>
        </div>
      )}
    </div>
  );
}

// GALLERY
// ═══════════════════════════════════════════════════════════════════════════════
function GalleryTab({logs}){
  const [compareMode,setCompareMode]=useState(false);
  const [dateA,setDateA]=useState("");
  const [dateB,setDateB]=useState("");
  const [expanded,setExpanded]=useState(null);
  const photos=useMemo(()=>Object.entries(logs).filter(([,v])=>v&&v.skinPhoto).map(([date,v])=>({date,photo:v.skinPhoto,rating:v.skinRating,concerns:v.skinConcerns||[]})).sort((a,b)=>new Date(b.date)-new Date(a.date)),[logs]);
  const getP=d=>photos.find(p=>p.date===d);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <PageTitle sub={photos.length+" photos logged"}>Skin Gallery</PageTitle>
        <button onClick={()=>setCompareMode(!compareMode)} style={{padding:"7px 14px",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:500,background:compareMode?C.accent+"22":"transparent",border:`1px solid ${compareMode?C.accent:C.border}`,color:compareMode?C.accent:C.muted}}>⊞ Compare</button>
      </div>
      {compareMode&&(
        <div style={card}>
          <SHead>Side-by-Side Comparison</SHead>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            {[{d:dateA,setD:setDateA,label:"Date A"},{d:dateB,setD:setDateB,label:"Date B"}].map(({d,setD,label})=>{
              const p=d?getP(d):null;
              return(<div key={label}><div style={{marginBottom:10}}><label style={lbl}>{label}</label><select value={d} onChange={e=>setD(e.target.value)} style={inp}><option value="">Select date</option>{photos.map(p=><option key={p.date} value={p.date}>{p.date}</option>)}</select></div>{p?(<div><img src={p.photo} alt={p.date} style={{width:"100%",aspectRatio:"1",objectFit:"cover",borderRadius:10}} /><div style={{marginTop:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,color:C.muted}}>{p.date}</span>{p.rating&&<span style={{...serif,fontSize:18,color:C.accent}}>{p.rating}/10</span>}</div>{p.concerns.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>{p.concerns.map(c=><span key={c} style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:C.accent+"18",color:C.accent}}>{c}</span>)}</div>}</div>):(<div style={{aspectRatio:"1",background:C.surface,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",color:C.faint,fontSize:13}}>Select a date</div>)}</div>);
            })}
          </div>
        </div>
      )}
      {photos.length===0?<div style={{...card,textAlign:"center",padding:48}}><div style={{fontSize:36,marginBottom:12}}>📸</div><div style={{color:C.muted}}>No photos yet — add from the Skin tab.</div></div>:(
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          {photos.map(p=>(
            <div key={p.date} onClick={()=>setExpanded(p)} style={{cursor:"pointer",borderRadius:10,overflow:"hidden",background:C.card,border:`1px solid ${C.border}`}}>
              <img src={p.photo} alt={p.date} style={{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block"}} />
              <div style={{padding:"8px 10px"}}><div style={{fontSize:11,color:C.muted}}>{p.date}</div>{p.rating&&(<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:3}}><div style={{height:3,flex:1,background:C.border,borderRadius:2,marginRight:8,overflow:"hidden"}}><div style={{height:"100%",width:(p.rating/10*100)+"%",background:p.rating>=8?C.sage:p.rating>=5?C.gold:C.accent}} /></div><span style={{...serif,fontSize:14,color:p.rating>=8?C.sage:p.rating>=5?C.gold:C.accent}}>{p.rating}</span></div>)}</div>
            </div>
          ))}
        </div>
      )}
      {expanded&&<Modal onClose={()=>setExpanded(null)}><div style={{...card,padding:0,overflow:"hidden"}}><img src={expanded.photo} alt={expanded.date} style={{width:"100%",maxHeight:600,objectFit:"contain",background:"#0A0908"}} /><div style={{padding:"16px 20px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{...serif,fontSize:20,color:C.white}}>{expanded.date}</div>{expanded.rating&&<div style={{...serif,fontSize:28,color:C.accent}}>{expanded.rating}/10</div>}</div>{expanded.concerns.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:10}}>{expanded.concerns.map(c=><span key={c} style={{fontSize:11,padding:"3px 10px",borderRadius:10,background:C.accent+"18",color:C.accent}}>{c}</span>)}</div>}</div></div></Modal>}
    </div>
  );
}

// HABITS
// ═══════════════════════════════════════════════════════════════════════════════
function HabitsTab({logs,setLogs,customHabits,setCustomHabits}){
  const [newLabel,setNewLabel]=useState("");
  const [newEmoji,setNewEmoji]=useState("⭐");
  const today=todayStr();
  const allHabits=[...DEFAULT_HABITS,...customHabits];
  const last28=Array.from({length:28},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(27-i));return d.toISOString().split("T")[0];});
  const togHabit=(hid,date)=>{const log=logs[date]||{};const habits=log.habits||[];const has=habits.includes(hid);setLogs({...logs,[date]:{...log,habits:has?habits.filter(h=>h!==hid):[...habits,hid]}});};
  const addHabit=()=>{if(!newLabel.trim())return;setCustomHabits([...customHabits,{id:"custom_"+Date.now(),label:newLabel.trim(),emoji:newEmoji}]);setNewLabel("");setNewEmoji("⭐");};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <PageTitle sub="Streaks, patterns, and 28-day history">Habits</PageTitle>
      <div style={card}>
        <SHead>Today — {today}</SHead>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          {allHabits.map(h=><Check key={h.id} label={h.emoji+" "+h.label} color={C.sage} checked={(logs[today]?.habits||[]).includes(h.id)} onChange={()=>togHabit(h.id,today)} />)}
        </div>
      </div>
      <div style={card}>
        <SHead>Streaks</SHead>
        {allHabits.map(h=>{
          const streak=getStreak(h.id,logs);const longest=getLongest(h.id,logs);const pct=longest>0?(streak/longest)*100:0;

// SPEND
// ═══════════════════════════════════════════════════════════════════════════════
function SpendTab({logs}){
  const [view,setView]=useState("month");
  const allSpend=useMemo(()=>{
    const entries=[];
    Object.entries(logs).forEach(([date,v])=>{
      if(!v) return;
      if(v.spendItems&&v.spendItems.length>0) v.spendItems.forEach(item=>entries.push({date,amount:item.amount,category:item.category||"Other",note:item.note||"",returnLikely:item.returnLikely||false}));
      else if(v.spend&&parseFloat(v.spend)>0) entries.push({date,amount:parseFloat(v.spend),category:v.spendCategory||"Other",note:v.spendNote||"",returnLikely:false});
    });
    return entries.sort((a,b)=>new Date(b.date)-new Date(a.date));
  },[logs]);
  const now=new Date();
  const thisMonth=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  const thisWeekStart=weekStart(todayStr());
  const netSpend=allSpend.filter(s=>!s.returnLikely);
  const monthTotal=netSpend.filter(s=>s.date.startsWith(thisMonth)).reduce((sum,s)=>sum+s.amount,0);
  const weekTotal=netSpend.filter(s=>s.date>=thisWeekStart).reduce((sum,s)=>sum+s.amount,0);
  const todayTotal=netSpend.filter(s=>s.date===todayStr()).reduce((sum,s)=>sum+s.amount,0);
  const pendingReturns=allSpend.filter(s=>s.returnLikely).reduce((sum,s)=>sum+s.amount,0);
  const filtered=view==="month"?netSpend.filter(s=>s.date.startsWith(thisMonth)):netSpend.filter(s=>s.date>=thisWeekStart);
  const catTotals={};filtered.forEach(s=>{catTotals[s.category]=(catTotals[s.category]||0)+s.amount;});
  const catSorted=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  const catMax=catSorted.length>0?catSorted[0][1]:1;
  const viewTotal=catSorted.reduce((s,[,v])=>s+v,0);
  const weeks=Array.from({length:8},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(7*(7-i)));const ws=weekStart(d.toISOString().split("T")[0]);const we=new Date(ws+"T12:00:00");we.setDate(we.getDate()+6);const weStr=we.toISOString().split("T")[0];return{label:new Date(ws+"T12:00:00").toLocaleDateString("en-US",{month:"numeric",day:"numeric"}),values:{spend:netSpend.filter(s=>s.date>=ws&&s.date<=weStr).reduce((sum,s)=>sum+s.amount,0)}};});
  return(
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <PageTitle>Spend Tracker</PageTitle>
      <div style={{display:"flex",gap:10}}>
        {[{label:"Today (net)",val:todayTotal,col:C.sage},{label:"This Week (net)",val:weekTotal,col:C.gold},{label:"This Month (net)",val:monthTotal,col:C.accent}].map(({label,val,col})=>(
          <div key={label} style={{...card,flex:1,textAlign:"center"}}><div style={lbl}>{label}</div><div style={{...serif,fontSize:28,fontWeight:300,color:col,lineHeight:1}}>${val.toFixed(0)}<span style={{fontSize:13,color:C.muted}}>.{String(Math.round((val%1)*100)).padStart(2,"0")}</span></div></div>
        ))}
      </div>
      {pendingReturns>0&&<div style={{...card,padding:"12px 18px",display:"flex",alignItems:"center",gap:12,borderLeft:`3px solid ${C.gold}`}}><span style={{fontSize:16}}>↩</span><div><div style={lbl}>Pending Returns</div><div style={{fontSize:13,color:C.gold}}>${pendingReturns.toFixed(2)} flagged — excluded from net totals</div></div></div>}
      <div style={card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <SHead>Category Breakdown</SHead>
          <div style={{display:"flex",gap:6}}>
            {["week","month"].map(v=><button key={v} onClick={()=>setView(v)} style={{padding:"4px 12px",borderRadius:14,fontSize:11,cursor:"pointer",fontWeight:500,background:view===v?C.accent+"22":"transparent",border:`1px solid ${view===v?C.accent:C.border}`,color:view===v?C.accent:C.muted}}>{v==="week"?"This Week":"This Month"}</button>)}
          </div>
        </div>
        {catSorted.length===0?<div style={{textAlign:"center",padding:"20px 0",color:C.faint,fontSize:13}}>No spend logged for this period.</div>:catSorted.map(([cat,amt])=>(
          <div key={cat} style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:8,height:8,borderRadius:"50%",background:CAT_COLORS[cat]||C.muted}} /><span style={{fontSize:13}}>{cat}</span></div><div style={{display:"flex",gap:10,alignItems:"center"}}><span style={{fontSize:11,color:C.muted}}>{Math.round((amt/viewTotal)*100)}%</span><span style={{...serif,fontSize:16,color:CAT_COLORS[cat]||C.muted}}>${amt.toFixed(0)}</span></div></div>
            <div style={{height:4,background:C.border,borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:((amt/catMax)*100)+"%",background:(CAT_COLORS[cat]||C.muted)+"CC",transition:"width 0.5s"}} /></div>
          </div>
        ))}
      </div>
      {allSpend.length>=3&&(
        <div style={card}><SHead>Weekly Trend</SHead><MiniChart data={weeks} colors={{spend:C.gold}} height={80} /><div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>{weeks.map((w,i)=><div key={i} style={{flex:1,textAlign:"center",fontSize:9,color:C.faint}}>{w.label}</div>)}</div></div>
      )}
      <div style={card}>
        <SHead>Recent Entries</SHead>
        {allSpend.length===0?<div style={{textAlign:"center",padding:"20px 0",color:C.faint,fontSize:13}}>No spend logged yet. Add items in the Daily Log.</div>:allSpend.slice(0,25).map((s,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.border}`,opacity:s.returnLikely?0.5:1}}>
            <div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2,flexWrap:"wrap"}}><div style={{width:7,height:7,borderRadius:"50%",background:CAT_COLORS[s.category]||C.muted,flexShrink:0}} /><span style={{fontSize:12,color:C.muted}}>{s.category}</span><span style={{fontSize:11,color:C.faint}}>· {s.date}</span>{s.returnLikely&&<span style={{fontSize:10,color:C.gold,background:C.gold+"18",borderRadius:8,padding:"1px 6px"}}>↩ return</span>}</div>{s.note&&<div style={{fontSize:12,color:C.text,paddingLeft:15}}>{s.note}</div>}</div>
            <div style={{...serif,fontSize:18,color:s.returnLikely?C.gold:C.text,marginLeft:12,textDecoration:s.returnLikely?"line-through":"none"}}>${s.amount.toFixed(2)}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// EUR/USD TAB
// ═══════════════════════════════════════════════════════════════════════════════
function EurUsdTab(){
  const {rate,fetched,loading,error,refresh}=useEurUsd();
  const [eurAmount,setEurAmount]=useState("");
  const usdResult=eurAmount&&rate?(parseFloat(eurAmount)*rate).toFixed(2):null;
  const rateStatus=!rate?null:rate>=1.15?"strong":rate>=1.10?"neutral":"weak";
  const rateColor={strong:C.sage,neutral:C.gold,weak:C.danger}[rateStatus]||C.muted;
  const rateLabel={strong:"Favorable for EUR spend",neutral:"Moderate — watch it",weak:"Weak USD — budget pressure"}[rateStatus]||"";
  return(
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <PageTitle sub="Live via CDN API · refreshes once daily on open">EUR / USD Tracker</PageTitle>
      <div style={{...card,borderLeft:`3px solid ${rate?rateColor:C.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
          <div>
            <div style={lbl}>Current Rate</div>
            {loading?<div style={{fontSize:18,color:C.faint}}>Fetching live rate...</div>:error?<div style={{fontSize:14,color:C.danger}}>{error}</div>:rate?(<><div style={{...serif,fontSize:52,fontWeight:300,color:rateColor,lineHeight:1}}>{rate.toFixed(4)}</div><div style={{fontSize:13,color:rateColor,marginTop:6}}>{rateLabel}</div></>):<div style={{...serif,fontSize:36,color:C.faint}}>—</div>}
          </div>
          <div style={{textAlign:"right"}}>
            <button onClick={refresh} disabled={loading} style={{padding:"7px 14px",borderRadius:8,background:"transparent",border:`1px solid ${C.border}`,color:C.muted,cursor:"pointer",fontSize:12}}>↻ Refresh</button>
            {fetched&&<div style={{fontSize:10,color:C.faint,marginTop:8}}>Last updated<br />{fetched}</div>}
          </div>
        </div>
        {rate&&(
          <div style={{display:"flex",gap:6}}>
            {[{label:"≥ 1.15 Favorable",check:rate>=1.15,color:C.sage},{label:"1.10–1.15 Neutral",check:rate>=1.10&&rate<1.15,color:C.gold},{label:"< 1.10 Pressure",check:rate<1.10,color:C.danger}].map(band=>(
              <div key={band.label} style={{flex:1,padding:"6px 10px",borderRadius:8,textAlign:"center",background:band.check?band.color+"22":"transparent",border:`1px solid ${band.check?band.color+"77":C.border}`}}>
                <div style={{fontSize:10,color:band.color}}>{band.label}</div>
              </div>
            ))}
          </div>
        )}
      </div>
      <div style={card}>
        <SHead>Wedding Budget Converter</SHead>
        <div style={{display:"flex",gap:12,alignItems:"flex-end",marginBottom:16}}>
          <div style={{flex:1}}><label style={lbl}>EUR Amount</label><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{...serif,fontSize:20,color:C.muted}}>€</span><input type="number" value={eurAmount} onChange={e=>setEurAmount(e.target.value)} placeholder="5000" style={{...inp,...serif,fontSize:20}} /></div></div>
          <div style={{fontSize:24,color:C.faint,paddingBottom:8}}>→</div>
          <div style={{flex:1}}><label style={lbl}>USD Equivalent</label><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{...serif,fontSize:20,color:C.muted}}>$</span><div style={{...inp,...serif,fontSize:20,color:usdResult?C.sage:C.faint,display:"flex",alignItems:"center"}}>{usdResult||(rate?"—":"Need rate")}</div></div></div>
        </div>
        <div style={{...lbl,marginBottom:10}}>Quick Reference</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
          {[1000,5000,10000,25000,50000,75000,100000,150000].map(eur=>(
            <button key={eur} onClick={()=>setEurAmount(String(eur))} style={{padding:"8px 6px",borderRadius:8,cursor:"pointer",textAlign:"center",background:eurAmount==eur?C.accent+"22":C.surface,border:`1px solid ${eurAmount==eur?C.accent:C.border}`,color:eurAmount==eur?C.accent:C.muted,transition:"all 0.15s"}}>
              <div style={{fontSize:11,fontWeight:500}}>€{eur>=1000?(eur/1000)+"k":eur}</div>
              {rate&&<div style={{fontSize:10,color:C.faint,marginTop:2}}>${((eur*rate)/1000).toFixed(0)}k</div>}
            </button>
          ))}
        </div>
      </div>
      <div style={{...card,padding:"14px 18px"}}>
        <div style={lbl}>Context</div>
        <div style={{fontSize:12,color:C.muted,lineHeight:1.6}}>Rate refreshes automatically once per day on open. For a September 2026 wedding, monitor monthly — a 5¢ swing on €50k is a $2,500 budget impact. Lock in via a travel card (Wise, Revolut) when the rate is favorable.</div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// WEDDING
// ═══════════════════════════════════════════════════════════════════════════════
function WeddingTab(){
  const [wdates,setWdates]=useLS("nm_wdates",{
    wedding:{date:"2026-09-17",label:"Wedding Day",location:"Tuscany, Italy"},
    bach:{date:"2026-07-30",label:"Bachelorette",location:""},
    bridal:{date:"2026-06-27",label:"Bridal Shower",location:""},
  });
  const [wtasks,setWtasks]=useLS("nm_wtasks",[]);
  const [form,setForm]=useState({text:"",category:"vendors",priority:"high"});
  const cats=["venue","vendors","attire","beauty & wellness","guests","travel & logistics","ceremony","reception","budget","honeymoon","misc"];
  const priColors={high:C.danger,medium:C.gold,low:C.sage};
  const add=()=>{if(!form.text.trim())return;setWtasks([...wtasks,{...form,id:Date.now(),done:false}]);setForm({...form,text:""});};
  const grouped=cats.reduce((acc,c)=>{const ts=wtasks.filter(t=>t.category===c&&!t.done);if(ts.length)acc[c]=ts;return acc;},{});
  const completed=wtasks.filter(t=>t.done);
  const colors={wedding:C.sage,bach:C.gold,bridal:C.accent};
  const timeline=[
    {month:"April 2026",date:new Date(2026,3,1),note:"5 months — final vendor payments, dress fittings begin"},
    {month:"May 2026",date:new Date(2026,4,1),note:"4 months — rehearsal dinner planning, honeymoon booking"},
    {month:"June 2026",date:new Date(2026,5,1),note:"Bridal Shower (June 27)",event:true},
    {month:"July 2026",date:new Date(2026,6,1),note:"Bachelorette (July 30)",event:true},
    {month:"August 2026",date:new Date(2026,7,1),note:"Final month — confirmations, packing, rest"},
    {month:"September 2026",date:new Date(2026,8,1),note:"Wedding Month ✦ Sept 17",highlight:true},
  ];
  return(
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={{...card,background:"linear-gradient(135deg,#1A1814 0%,#1E1C16 100%)",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-20,right:-20,width:120,height:120,borderRadius:"50%",background:C.sage+"08",pointerEvents:"none"}} />
        <div style={{...serif,fontSize:13,color:C.muted,letterSpacing:"0.2em",marginBottom:6}}>SEPTEMBER 2026</div>
        <h1 style={{...serif,fontSize:34,fontWeight:300,color:C.white,margin:0}}>Nicole &amp; [Partner]</h1>
        <div style={{fontSize:13,color:C.muted,marginTop:4}}>Tuscany, Italy · The countdown is on.</div>
      </div>
      <div style={{display:"flex",gap:10}}>
        {Object.entries(wdates).map(([id,ev])=>(
          <div key={id} style={{...card,flex:1,textAlign:"center"}}>
            <div style={lbl}>{ev.label}</div>
            <div style={{...serif,fontSize:50,fontWeight:300,color:colors[id]||C.accent,lineHeight:1.1}}>{daysUntil(new Date(ev.date+"T12:00:00"))}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:4}}>days</div>
            {ev.location&&<div style={{fontSize:10,color:C.faint,marginTop:2}}>{ev.location}</div>}
            <div style={{marginTop:10}}><input type="date" value={ev.date} onChange={e=>setWdates({...wdates,[id]:{...ev,date:e.target.value}})} style={{...inp,fontSize:11,textAlign:"center"}} /></div>
          </div>
        ))}
      </div>
      <div style={card}>
        <SHead>Timeline to Tuscany</SHead>
        {timeline.map((m,i)=>(
          <div key={i} style={{display:"flex",gap:14,padding:"10px 0",borderBottom:`1px solid ${C.border}`,alignItems:"center"}}>
            <div style={{width:4,height:4,borderRadius:"50%",background:m.highlight?C.sage:m.event?C.accent:C.border,flexShrink:0}} />
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:m.event||m.highlight?600:400,color:m.highlight?C.sage:m.event?C.accent:C.text}}>{m.month}</div><div style={{fontSize:11,color:C.muted,marginTop:2}}>{m.note}</div></div>
            <div style={{fontSize:12,color:C.faint}}>{Math.ceil((m.date-new Date())/86400000)>0?Math.ceil((m.date-new Date())/86400000)+"d":"now"}</div>
          </div>
        ))}
      </div>
      <div style={card}>
        <SHead>Wedding Tasks</SHead>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr auto",gap:8,marginBottom:16}}>
          <input value={form.text} onChange={e=>setForm({...form,text:e.target.value})} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="What needs to happen..." style={inp} />
          <select value={form.category} onChange={e=>setForm({...form,category:e.target.value})} style={inp}>{cats.map(c=><option key={c} value={c}>{c}</option>)}</select>
          <select value={form.priority} onChange={e=>setForm({...form,priority:e.target.value})} style={inp}><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select>
          <button onClick={add} style={{padding:"9px 16px",borderRadius:8,background:C.accent,color:"#0A0908",border:"none",cursor:"pointer",fontSize:13,fontWeight:500}}>Add</button>
        </div>
        {Object.entries(grouped).map(([cat,tasks])=>(
          <div key={cat} style={{marginBottom:16}}>
            <div style={{...lbl,marginBottom:10}}>{cat}</div>
            {tasks.map(task=>(
              <div key={task.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:priColors[task.priority],flexShrink:0}} />
                <span style={{fontSize:13,flex:1}}>{task.text}</span>
                <button onClick={()=>setWtasks(wtasks.map(t=>t.id===task.id?{...t,done:true}:t))} style={{padding:"3px 10px",borderRadius:6,background:"transparent",border:`1px solid ${C.border}`,color:C.muted,cursor:"pointer",fontSize:11}}>Done</button>
                <button onClick={()=>setWtasks(wtasks.filter(t=>t.id!==task.id))} style={{background:"none",border:"none",color:C.faint,cursor:"pointer",fontSize:18}}>×</button>
              </div>
            ))}
          </div>
        ))}
        {Object.keys(grouped).length===0&&wtasks.filter(t=>!t.done).length===0&&<div style={{textAlign:"center",padding:"20px 0",color:C.faint,fontSize:13}}>No open tasks ✓</div>}
        {completed.length>0&&(
          <div style={{marginTop:16}}>
            <div style={lbl}>Completed ({completed.length})</div>
            {completed.slice(-6).map(t=><div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0",opacity:0.35}}><span style={{fontSize:12,textDecoration:"line-through",flex:1}}>{t.text}</span></div>)}
            <button onClick={()=>setWtasks(wtasks.filter(t=>!t.done))} style={{fontSize:11,color:C.faint,background:"none",border:"none",cursor:"pointer",marginTop:6}}>Clear {completed.length} completed</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════════════════════════
const TABS=[
  {id:"dashboard",label:"Dashboard"},{id:"daily",label:"Daily Log"},{id:"skin",label:"Skin"},
  {id:"gallery",label:"Gallery"},{id:"habits",label:"Habits"},{id:"hair",label:"Hair"},
  {id:"cycle",label:"Cycle"},{id:"body",label:"Body"},{id:"beauty",label:"Beauty"},
  {id:"spend",label:"Spend"},{id:"eur",label:"EUR/USD"},{id:"wedding",label:"Wedding"},
];

function App(){
  const [tab,setTab]=useState("dashboard");
  const [dailyLogs,setDailyLogs]=useLS("nm_daily",{});
  const [cycleStart]=useLS("nm_cycle_start","");
  const [cycleLength]=useLS("nm_cycle_length",28);
  const [beautyLogs,setBeautyLogs]=useLS("nm_beauty",{});
  const [intervals,setIntervals]=useLS("nm_beauty_intervals",{});
  const [customHabits,setCustomHabits]=useLS("nm_custom_habits",[]);
  const allHabits=[...DEFAULT_HABITS,...customHabits];

  return(
    <div style={{fontFamily:"'DM Sans', sans-serif",background:C.bg,minHeight:"100vh",color:C.text}}>
      <div style={{position:"fixed",inset:0,background:"radial-gradient(ellipse at 15% 40%,#C4856A06 0%,transparent 55%),radial-gradient(ellipse at 85% 20%,#7A9B8A05 0%,transparent 50%)",pointerEvents:"none",zIndex:0}} />
      <div style={{position:"sticky",top:0,zIndex:100,background:C.bg+"F2",backdropFilter:"blur(16px)",borderBottom:`1px solid ${C.border}`}}>
        <div style={{maxWidth:960,margin:"0 auto",padding:"0 20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:16,height:56}}>
            <div style={{fontFamily:"'Cormorant Garamond', serif",fontSize:17,color:C.accent,letterSpacing:"0.2em",fontStyle:"italic",flexShrink:0}}>nicole</div>
            <div style={{display:"flex",gap:3,overflowX:"auto",paddingBottom:2}}>
              {TABS.map(t=>(
                <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"5px 12px",borderRadius:20,fontSize:11,fontWeight:500,letterSpacing:"0.04em",cursor:"pointer",whiteSpace:"nowrap",border:`1px solid ${tab===t.id?C.accent:C.border}`,background:tab===t.id?C.accent+"18":"transparent",color:tab===t.id?C.accent:C.muted,transition:"all 0.15s"}}>
                  {t.label}
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>
      <div style={{position:"relative",zIndex:1,padding:"28px 20px 80px"}}>
        <div style={{maxWidth:960,margin:"0 auto"}}>
          {tab==="dashboard"&&<Dashboard dailyLogs={dailyLogs} cycleStart={cycleStart} beautyLogs={beautyLogs} intervals={intervals} allHabits={allHabits} />}
          {tab==="daily"&&<DailyLog logs={dailyLogs} setLogs={setDailyLogs} allHabits={allHabits} cycleStart={cycleStart} cycleLength={cycleLength} />}
          {tab==="skin"&&<SkinTab logs={dailyLogs} setLogs={setDailyLogs} />}
          {tab==="gallery"&&<GalleryTab logs={dailyLogs} />}
          {tab==="habits"&&<HabitsTab logs={dailyLogs} setLogs={setDailyLogs} customHabits={customHabits} setCustomHabits={setCustomHabits} />}
          {tab==="hair"&&<HairTab />}
          {tab==="cycle"&&<CycleTab />}
          {tab==="body"&&<BodyTab dailyLogs={dailyLogs} />}
          {tab==="beauty"&&<BeautyTab beautyLogs={beautyLogs} setBeautyLogs={setBeautyLogs} intervals={intervals} setIntervals={setIntervals} />}
          {tab==="spend"&&<SpendTab logs={dailyLogs} />}
          {tab==="eur"&&<EurUsdTab />}
          {tab==="wedding"&&<WeddingTab />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
