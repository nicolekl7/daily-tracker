// APP
// ═══════════════════════════════════════════════════════════════════════════════
const TABS=[
  {id:"dashboard",label:"Dashboard"},
  {id:"daily",label:"Daily Log"},
  {id:"skin",label:"Skin"},
  {id:"hair",label:"Hair & Beauty"},
  {id:"cycle",label:"Cycle"},
  {id:"habits",label:"Habits"},
  {id:"spend",label:"Spend"},
  {id:"wedding",label:"Wedding"},
];

function App(){
  const [tab,setTab]=useState("dashboard");
  const [dailyLogs,setDailyLogs]=useLS("nm_daily",{});
  const [cycleStart]=useLS("nm_cycle_start","");
  const [cycleLength]=useLS("nm_cycle_length",28);
  const [beautyLogs,setBeautyLogs]=useLS("nm_beauty",{});
  const [intervals,setIntervals]=useLS("nm_beauty_intervals",{});
  const [customHabits,setCustomHabits]=useLS("nm_custom_habits",[]);
  const allHabits=[...DEFAULT_HABITS,...customHabits];
  const [showData,setShowData]=useState(false);
  const [showSaved,setShowSaved]=useState(false);
  const savedSkip=useRef(true);
  useEffect(()=>{
    if(savedSkip.current){savedSkip.current=false;return;}
    setShowSaved(true);
    const t=setTimeout(()=>setShowSaved(false),2000);
    return()=>clearTimeout(t);
  },[dailyLogs]);

  return(
    <div style={{fontFamily:"'DM Sans', sans-serif",background:C.bg,minHeight:"100vh",color:C.text}}>
      <div style={{position:"fixed",inset:0,background:"radial-gradient(ellipse at 15% 40%,#C4856A05 0%,transparent 55%),radial-gradient(ellipse at 85% 20%,#7A9B8A04 0%,transparent 50%)",pointerEvents:"none",zIndex:0}} />
      <div style={{position:"sticky",top:0,zIndex:100,background:C.bg+"F4",backdropFilter:"blur(16px)",borderBottom:`1px solid ${C.border}`}}>
        <div style={{maxWidth:960,margin:"0 auto",padding:"0 20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,height:54}}>
            <div style={{fontFamily:"'Cormorant Garamond', serif",fontSize:16,color:C.accent,letterSpacing:"0.22em",fontStyle:"italic",flexShrink:0}}>nicole</div>
            <div style={{display:"flex",gap:3,overflowX:"auto",paddingBottom:2,flex:1}}>
              {TABS.map(t=>{
                const tl=dailyLogs[todayStr()];const noSkinPhoto=t.id==="skin"&&!(tl?.skinPhoto||tl?.skinPhotoFront||tl?.skinPhotoLeft||tl?.skinPhotoRight);
                return(
                  <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"5px 13px",borderRadius:20,fontSize:11,fontWeight:500,letterSpacing:"0.04em",cursor:"pointer",whiteSpace:"nowrap",border:`1px solid ${tab===t.id?C.accent:C.border}`,background:tab===t.id?C.accent+"18":"transparent",color:tab===t.id?C.accent:C.muted,transition:"all 0.15s",position:"relative"}}>
                    {t.label}
                    {noSkinPhoto&&<span style={{position:"absolute",top:3,right:3,width:6,height:6,borderRadius:"50%",background:C.accent,display:"block"}} />}
                  </button>
                );
              })}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
              <span style={{fontSize:11,color:C.sage,transition:"opacity 0.4s",opacity:showSaved?1:0,pointerEvents:"none"}}>✓ saved</span>
              <button onClick={()=>setShowData(true)} title="Data sync &amp; export" style={{padding:"4px 10px",borderRadius:14,fontSize:11,cursor:"pointer",border:`1px solid ${C.border}`,background:"transparent",color:C.muted,whiteSpace:"nowrap",transition:"all 0.15s"}}>⊙ Sync</button>
            </div>
          </div>
        </div>
      </div>
      {showData&&<DataPanel onClose={()=>setShowData(false)} />}
      <div style={{position:"relative",zIndex:1,padding:"26px 20px 80px"}}>
        <div style={{maxWidth:960,margin:"0 auto"}}>
          {tab==="dashboard"&&<Dashboard dailyLogs={dailyLogs} setDailyLogs={setDailyLogs} cycleStart={cycleStart} cycleLength={cycleLength} beautyLogs={beautyLogs} intervals={intervals} allHabits={allHabits} />}
          {tab==="daily"&&<DailyLog logs={dailyLogs} setLogs={setDailyLogs} allHabits={allHabits} cycleStart={cycleStart} cycleLength={cycleLength} />}
          {tab==="skin"&&<SkinTab logs={dailyLogs} setLogs={setDailyLogs} cycleStart={cycleStart} cycleLength={cycleLength} />}
          {tab==="hair"&&<HairBeautyTab dailyLogs={dailyLogs} beautyLogs={beautyLogs} setBeautyLogs={setBeautyLogs} intervals={intervals} setIntervals={setIntervals} />}
          {tab==="cycle"&&<CycleTab dailyLogs={dailyLogs} />}
          {tab==="habits"&&<HabitsTab logs={dailyLogs} setLogs={setDailyLogs} customHabits={customHabits} setCustomHabits={setCustomHabits} />}
          {tab==="spend"&&<SpendTab logs={dailyLogs} />}
          {tab==="wedding"&&<WeddingTab />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
